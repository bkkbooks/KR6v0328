body:
  text: 宗喀巴大師造釋法尊譯頂禮曼殊室利童子摩訶薩埵敬禮大悲所勵意荷難行擔無量刼到無上位發大音醒覺眾生無明眠佛法王位所囑受紹勝法王地自在阿逸多尊淨事業唯願將護諸含識慈尊雙足悅意蓮接者吉祥皆增廣恭敬頂戴紹勝子稽首聖者無著足無勝口傳勝教授謂誓受學佛子行正修次第此中釋樂大乘者當敬聽頗有自許為大乘然於佛子進止處慧眼瞑閉有餘者雖誦論文於要處樂修大乘為佛子唯一淨道勝教授未能獲得決定解棄捨佛制放逸行猶如醉象無鈎制彼心於此無愛樂大乘種力不下劣有善根者增歡喜此如曼殊室利根本經授記云無著苾芻者善巧諸論義了不了義經分別為多種照了諸世人釋經為本性其所成明咒名薩羅使女此由咒勢力發生賢妙慧為聖教久住攝經真實義年活百五十身壞生天趣流轉生死中恆受諸安樂大士最後邊當得大菩提謂廣發大願住持正法多生修積無量資糧獲得法流妙三摩地已到自他宗海彼岸擇法慧力餘難測量名聖無著此從慈尊總得聽聞無量法門特廣聽聞大乘道果總攝此義著一大論曰菩薩地雖其如是然於大乘宿少修習觀慧下劣精進微弱效於此論猶不能學由見是已為利彼故菩薩地中戒品之義令諸狹慧易解而釋先如教授發菩提心是為佛子諸行所依次若不以受菩薩學受律為先學菩薩學無時能趣無上菩提故此即是三世菩薩唯一大道菩薩地中說三聚戒後云過去菩薩求大菩提已於中學未來當學普於十方無邊無際諸世界中現在今學戒品釋亦云若有士夫已發無上大菩提心入大乘門為利自他勤修福德智慧資糧如是士夫許為大乘應當安住菩薩律儀菩薩學者經中說為波羅蜜多等若於此中不學不信縱謂大乘亦唯隨逐自許而轉非真實者又雖發菩提心若於學處不勤修學決定不能得大菩提故求菩提當學學處而為心要聖三律儀經云迦葉若善男子若善女人入菩薩乘聞如是法若不無間殷重修行此定不能現證無上正等菩提所以者何迦葉要勤修行乃證無上正等菩提非無修行迦葉若無修行能證無上正等菩提貓兔亦當現證無上正等菩提所以者何迦葉若無修行彼證無上正等菩提迦葉聲於無上正等菩提現等覺故云當成佛無量有情皆當成佛若謂已受菩薩律儀修菩薩學是入波羅蜜多乘者若入密咒則不須爾故非一切菩薩共道此乃最大邪執三補止經金剛空行經金剛頂經等皆云我發最殊勝無上菩提心戒學攝善法及饒益有情我於三聚戒別別堅固持此說若受金剛乘律儀須先發心受學三戒續乃受持五部律儀堪為依據曼陀羅軌亦多宣說受共不共二種律儀其共同者即菩薩律儀故又發心已受菩薩學如其所學除學三學或六度外波羅蜜多大乘中亦無餘道故四部密咒隨入何門皆須此故故發大心與六度道是金剛乘與波羅蜜多乘二所共道諸密咒師於一切種不應棄捨如曼殊室利根本經云若具三法咒行圓滿何等為三謂不棄捨一切有情守護菩薩淨戒律儀不捨自咒金剛頂經云六波羅蜜行如次應當學具足有情利而行菩薩行金剛幕第十二品云我發最勝菩提心希有請喚諸有情正行菩提殊勝行為利眾生願成佛故二大乘雖有少分開遮不等多分共同故當了知波羅蜜多乘及密咒乘隨入何門決定須受如是律儀今釋戒品其中分二甲一攝為嗢柁南二釋嗢柁南義初者科目甲乙及一二等為便觀閱譯者所加云何菩薩戒如略攝戒嗢柁南云自性一切難一切門善士一切種遂求二世樂清淨如是九種相是名略說戒謂九種相其自性戒者謂戒總相一切戒者謂廣宣說戒事差別難行戒者謂入難行不共差別一切門戒者謂由何入或如何入所有差別善士戒者謂修行者所依差別一切種戒者謂相差別遂求戒者或如大疏謂除苦作用或境及所作二事差別二世樂戒及清淨戒者謂果差別如其次第斷證差別甲二釋嗢柁南義分六乙初自性略標二一切廣釋三釋其差別四尸羅勝利五尸羅總攝六尸羅所作乙初分二丙初自性二殊勝丙初自性分四丁初功德數量論曰云何菩薩自性戒謂若略說具四功德當知是名菩薩自性戒何等為四一從他正受二善淨意樂三犯已還淨四深敬專念無有違犯論文係將奘師譯者加入以便對閱云何自性戒謂若略說具四功德一從他正受功德二善淨意樂功德三犯已還淨功德四深敬專念無有犯違功德丁二功德所作論曰由諸菩薩從他正受故於所學戒若有違犯即外觀他深生愧恥由諸菩薩善淨意樂故於所學戒若有違犯即內自顧深起慚羞由諸菩薩於諸學處犯已還淨深敬專念初無違犯二因緣故離諸惡作如是菩薩從他正受善淨意樂為依止故生起慚愧由慚愧故能善防護所受尸羅由善防護所受戒故離諸惡作由從他受若於學處犯緣現前外恐他訶便於惡行深生愧恥由淨意樂若於學處犯緣現前內顧自法即於惡行深生慚羞由犯還淨初無違犯二因緣故離諸惡作謂由正受及淨意樂為所依故生起慚愧若有慚愧由初無犯及犯還淨守護尸羅由如是護見無毀犯即無惡作此等正為顯示斯義謂受律儀者須以如理觀察妙慧於自相續任何觀察全不見有粗細違犯相續清淨意無憂悔能如是者須從最初勵力無犯由忘念等設有誤犯不宜捨置當由悔除及防護等還淨還出能有此者必須具足最大慚愧能生此者受律儀時須於具相知識而受能受意樂須由誠心非為隨逐他人轉等須以殊勝意樂而受非活命等下劣意樂故於初二因當殷重學有釋說云初德為受後三是護然本論中說初二德是能護因律儀二十頌亦云此以勝意樂從智住律儀有能師前受故初二德能受品攝後二功德守護品攝又此律儀未遇師時想佛菩薩於彼前受雖亦能生然說從他受者顯示若有師可得時求善知識定當從受從師受者於護學處易於生起愛樂恭敬淨尸羅故如集學論云受律儀者當從樂修菩薩學處具律前受若如是受違越學處深生羞慚恐誑師長深生怖畏無須特修能生喜敬故諸菩薩此學處中欲修何學於如來前而正受取丁三此諸功德因果道理論曰又於是中從他正受善淨意樂此二是法犯已還淨深敬專念無有違犯此二是前二法所引前二功德能引後二故當了知前二為因後二是果引生道理如前所說丁四德數決定論曰又於是中從他正受善淨意樂深敬專念無有違犯由此三法應知能令不毀菩薩所受淨戒犯已還淨由此一法應知能令犯已還出何故功德決定為四答尸羅清淨定須二事謂初無違犯及犯已還淨從他正受清淨意樂專念無犯由此三法令無違犯犯已還淨由此一法犯已還出故四決定諸釋論中攝四功德凡有四說初一為受後三隨護是初家義意樂有一加行有三是二家義淨意為受三為戒性其能受中凡有三受一自語威肅二為他福田三得自在力不損眾生戒性亦三一謂所受戒所還淨戒所守護戒是三家義二為清淨尸羅之因二為其果是四家義丙二戒殊勝分四丁初妙善二無量三饒益四大果勝利初者論曰如是菩薩具四功德自性尸羅應知即是妙善淨戒正受隨學能利自他利益安樂無量眾生哀愍世間諸天人等令得義利利益安樂故正受隨學具四功德自性尸羅有何功德答能利他等其聲聞等自利益者為見聖諦永斷煩惱及諸苦故少事少業寂靜調伏而修正行菩薩自利者謂二斷二智利益他者謂初發心時即修利益有性無性二類有情解釋利益無種性中利益無量眾生者謂暫救惡趣其不善法未生不生生已令斷安樂無量眾生者謂安立善趣所有善法未生令生生已令長哀愍世間者謂無種性諸眾生中於憎聖教及無善根并雖是法器然已顛倒墮落往諸惡趣猶如旅客者不捨利益安樂意樂待可度時解釋利益有種性中諸天人等令得義利者謂立有種性者入沙門道令得利益者謂令住資糧道及加行道以此能行諸沙門道令得安樂者謂由輕安身心適悅現法樂住及解脫樂由如是等諸因相故善為無欺諸釋論中雖多異說姑且不錄丁二無量論曰應知即是無量淨戒攝受無量菩薩所學故總攝菩薩無量學處丁三饒益論曰應知即是饒益一切有情淨戒現前能作一切有情利益安樂故於因果位皆能利益安樂有情丁四大果勝利論曰應知即是能獲大果勝利淨戒攝受隨與無上正等菩提果故是名菩薩自性戒於菩薩時能自攝受大菩提果是名大果於成佛時隨與他果名大勝利又諸聲聞所有三學是初善等菩薩唯戒即有三善初發心時利益自他及其廣釋是名初善饒益有情是名中善大果勝利是名後善乙二一切廣釋分三丙初釋所受戒二釋受戒法三釋守護理丙初分四丁初差別二自性三圓滿之因四攝義初者論曰云何菩薩一切戒謂菩薩戒略有二種一在家分戒二出家分戒是名一切戒又即依此在家出家二分淨戒略說三種一律儀戒二攝善法戒三饒益有情戒何等名為菩薩淨戒此中有二戊初所依差別者廣說所依雖有多種總略為二一在家菩薩分攝二出家菩薩分攝此等身中所有淨戒名一切戒以是菩薩在家出家一切之身所學戒故最勝子云三趣之中惡趣天趣法性所得是在家戒於人趣中有二種戒傳為雲海所作釋云惡趣色界無從他受有法性得是在家戒欲天及人有法性得及從他受故有在家出家二分菩薩律儀死沒不捨隨生何處有由法性所得淨戒總之菩薩律儀死沒隨行通三趣有雖為應理然判在家出家二分者是依菩薩具與不具勤策男等出家五眾律儀而說戊二自性差別者又依二分所有淨戒略為三種謂律儀戒攝善法戒饒益有情戒此三盡攝菩薩所護一切戒故何故淨戒定分為二諸釋論中多作是說為令隨順聲聞乘中三律儀數一壓伏煩惱為別解脫二有緣現前暫令不起為靜慮律儀三斷其相續為無漏律儀然諸菩薩唯二所作謂為成熟自內相續及他相續初作所中二事決定遠離惡行攝集妙行即律儀戒及攝善法成熟他中須饒益有情戒故三決定若作此說則為善哉何故三種淨戒次第如是決定如傳為雲海釋云共諸聲聞能斷即防非義淨戒為後二因不共戒中若自未度而欲度他不應正理經說自未寂靜不能靜他故未先修攝善法戒不能利他故次第決定此說應理丁二自性分三戊初律儀戒論曰律儀戒者謂諸菩薩所受七眾別解脫律儀即是苾芻戒苾芻尼戒正學戒勤策男戒勤策女戒近事男戒近事女戒如是七種依止在家出家二分如應當知是名菩薩律儀戒七眾別解脫律儀中苾芻男女及正學女勤策男女所有淨戒是出家分近事男女所有淨戒是在家分別解脫戒雖有八眾然未宣說近住戒者如律儀二十頌釋難論云受一晝夜非難行故非遠欲故於長夜中不隨轉故非此所應故未宣說傳為雲海釋說謂是近事住於近住近事中攝故未宣說正學女律是苾芻尼律儀中攝未見應理設作是問菩薩所有律儀戒中除七眾戒有無餘戒若有則違菩薩地中除七眾戒未說餘戒若為無者別解脫戒死沒即捨具菩薩律死沒即應無律儀戒天身菩薩應不可受菩薩律學三聚戒答若是出家具菩薩律五眾隨一別解脫戒是律儀戒若是在家近事男女具菩薩律二眾隨一別解脫戒為律儀戒例如天人其身不堪受別解脫律儀具菩薩戒斷十不善或斷身語七種不善是律儀戒此七能斷斷除性罪共同七眾別解脫戒非是真實別解脫律如道炬論釋云律儀戒者謂護制罪七眾別解脫律儀及護性罪護十不善初是真實別解脫戒後者唯是共同七眾別解脫戒莊嚴密意論亦云其律儀戒亦是遮戒謂以七支能斷為相無貪無瞋正見三法是彼發起又云若具發起尸羅增上為十善業道律儀二十頌釋難論云如菩薩地說七眾別解脫為律儀戒其義當知別解脫律儀即是菩薩律儀之支是為一分故若具足別解脫律儀即成正受菩薩律儀之器亦當授與如此學處離遮殺生等非是餘戒若尚不能遮殺生等亦非正受菩薩所有律儀之器謂若不樂離殺生等非生菩薩律儀之器離殺生等之理意為共同別解脫戒故釋菩薩地義謂七眾別解脫是為菩薩律儀一分具菩薩律如下當說雖有開許身語七支殺生等時然殺生等非有不共別解脫過譬如除酒餘諸制罪雖開病人然總具足苾芻律儀皆應遮止又如正受苾芻律儀無定支分須盡斷一切罪欲樂而受身語七支除例外時如別解脫乃至失命守護莫犯故道炬論云恆具餘律儀七眾別解脫有菩薩律儀善根而非餘此頌顯示初發業者若無七眾別解脫戒隨一則無善根發生殊勝淨戒律儀若無共同七眾別解脫斷除性罪全無善根生菩薩律儀非說七眾真別解脫若無一種即便不生菩薩律儀道炬論釋云今欲顯示淨戒律儀殊勝所依又此頌文是攝前引菩提賢釋所有略義即廿頌釋難論又於此義昔有二家一菩薩律儀若生若住須別解脫為所依止名有依家二執別解脫為聲聞戒說能障礙菩薩律儀為無依家有依家云經說菩薩別解脫戒故大小乘俱有七眾別解脫戒總以七眾別解脫戒不損害他為所依止凡饒益他皆不損故又大小乘別解脫戒所有差別謂以能相續隨護他心犯可還淨為求利他意樂所顯及此相違若謂離別決定無總然小乘別解脫非其所依大乘別解脫即菩薩學處自為自依亦有違者無此相違失寶雲經說別解脫律儀異菩薩學處故又大乘七眾戒受及守護等俱如毗奈耶此不應理若須七眾別解脫戒為生起依天應不生菩薩律儀若為住依及是死沒相續不捨天及傍生亦應有苾芻等又菩薩律儀不須別解脫為生起依者莊嚴能仁密意論云若作是說安住隨一別解脫律儀謂近事男近事女勤策男勤策女正學女苾芻苾芻尼乃至命存七眾別解脫律儀乃可正受菩薩律儀非餘可受餘者不生菩薩律儀故此於大乘未多劬勞若無別解脫律儀即便不生菩薩律儀則菩薩藏及其釋論應當說此為彼根本此定當說譬如大乘乃至菩提歸依三寶故菩薩地律儀戒時說為七眾別解脫者應當了知俱通二分謂真七眾別解脫戒及別解脫與菩薩律二所共同斷除性罪不當執為單說七眾其斷性罪共別解脫律儀戒者與受菩薩律儀同時而生故與菩薩律儀全無所依能依之義雖未先受真實七眾別解脫戒菩薩律儀亦能生起然是堪受別解脫身定當先受在家出家隨一別解脫戒不爾則與佛教漸次成相違故譬如未受勤策律儀即便直受苾芻律儀雖能生起然不應爾無依家云若未止息自利意樂菩薩律儀決定不生是生障礙若先具足菩薩律儀起自利心即失律儀是住障礙此是未判別解脫律儀與小乘意樂二者差別所起錯誤謂生菩薩律儀雖須棄捨小乘意樂然別解脫非所應捨又先具足大乘律儀發小乘心雖失大乘然亦非捨別解脫戒以別解脫兩乘共故又彼意樂為令棄捨別解脫因不應理故又若先具別解脫律之身受上律儀最圓滿故由是因緣若說住上律儀即捨下者是為斬斷佛教根本是大冰雹摧殘眾生利樂稼穡是邪分別未了上下經論扼要故當遠離為欲遮此邪分別故聖三律儀經云故當隨順如所宣說別解脫戒迦葉若思違背別解脫戒即思違背佛力無畏若思違背佛力無畏即思違背去來現在諸佛世尊所得菩提此異熟苦盡其三千大千世界所有有情受那落迦極大苦受百分不及一千百千百千俱胝數計算喻鄔波尼殺曇分亦不及一若欲遠離如此憂苦即當遠離彼苾芻行千踰繕那雖所發聲尚當遠離何況觀聽皆當遠離妙臂問經云如一切穀依大地無諸過失善生長如是依戒悲水潤殊勝白法善生長佛說調伏別解脫清淨尸羅盡無餘在家咒師除相軌所餘諸戒皆當修此說唯除出家相狀羯摩軌則不共制外毗奈耶中諸取捨處在家咒師尚當修持何況出家咒師及具菩薩戒律儀者又迦濕彌羅善逝頂珠智祥友大論師亦數破此最下邪執分別如不應違越尸羅律儀三昧耶論云先依出家身住咒到彼岸後由愚癡故住毗奈耶論聲聞等律儀別解脫問年於彼說學處多分不能護便執與菩薩律儀為相違現棄彼而住又云捨出家律儀不應受咒律及施等律儀又云諸菩薩苾芻殊勝具慧者一切善方便雖夢莫思違又諸經中說有眾多轉輪聖王在家菩薩於菩薩行已久修行尚求捨家出家近圓故總別解脫尤於出家律儀住大乘者善當愛護戊二攝善法戒分三己初略標論曰攝善法戒者謂諸菩薩受律儀戒後所有一切為大菩提由身語意積集諸善總說名為攝善法戒菩薩正受尸羅之後為大菩提由其身語積集諸善如是一切總說名為攝善法戒有多論說受律儀戒後此中分三一時者云後經中說云隨所積集一切諸善由住淨戒為欲顯示唯由住戒善法乃生安住增長義為正受菩薩律儀所積諸善故先當堅固律儀淨戒二所緣者云為大菩提此依成就自內佛法故攝善法為自成熟饒益有情為成熟他是其差別三相或自性者云由其身語積集諸善不言意者餘釋雖云攝善法戒時戒唯屬身語然廣釋中數說意善德光論師釋中亦說意善故當說為正說身語意可例知故未宣說律儀二十頌釋難論與道炬論釋以原論文為有意字解奘師譯本亦有意字如是遂有三業之中由一一業及二二業具通三業攝善法戒己二廣釋分八庚初發生三慧論曰此復云何謂諸菩薩依戒住戒於聞於思於修止觀於樂獨處精勤修學若諸菩薩依止安住律儀淨戒次當無散聽聞正法尋求聞慧從聞積集觀察思惟次修止觀轉入修慧此又觀待身離憒鬧心離諸惡不善尋思故樂獨處律儀二十頌釋難論為專一愛樂其奢摩他是為定學其聞思慧及毗鉢舍那是為慧學謂從尸羅引生二學庚二於殊勝田積集資糧論曰如是時時於諸尊長精勤修習合掌起迎問訊禮拜恭敬之業即於尊長勤修敬事於疾病者悲愍殷重瞻侍供給見諸尊長當離憍慢含笑敬問或訊平安身行禮拜起立讓座表示恭敬疾起奉迎又見來前及眼見處或修禮拜或修合掌或作使役恭敬承事又於病者悲愍瞻侍此有三田謂諸恩造尊長痛苦初為父母次為二師後為病人以是在家出家二分菩薩生福之處故名為田庚三隨喜功德及有德者論曰於諸妙說施以善哉於有功德補特伽羅真誠讚美於十方界一切有情一切福業以勝意樂起淨信心發言隨喜當於無謬宣說佛語及於稱讚三寶德者施以善哉真誠讚美具聞等德補特伽羅於諸有情所有善業以勝意樂發言隨喜又善知他真實福田發隨喜心遠離嫉妬雖自未作所獲福德與作無差又令隨逐善業轉故於自所作亦當慶喜庚四習近堪忍論曰於他所作一切違犯思擇安忍於他所作一切怨害當審思擇為自宿業起大悲心不當報瞋不當報怨庚五迴向發願論曰以身語意已作未作一切善根迴向無上正等菩提時時發起種種正願為令已作不失壞故及為引生異類福故已作未作三業眾善迴大菩提又為引發無量功德於時時中發十地經說十種大願或普賢願庚六供養三寶論曰以一切種上妙供具供佛法僧於三寶所以一切種財物正行二種供養非以下劣當興上妙廣大供養庚七修不放逸論曰於諸善品恆常勇猛精進修習於身語意住不放逸恆常無間勇猛勤修六度善品庚八修資糧道所依之善論曰於諸學處正念正知正行防守密護根門於食知量初夜後夜常修覺悟親近善士依止善友於自愆犯審諦了知深見過失既審了知深見過已其未犯者專意護持其已犯者於佛菩薩同法者所至心發露如法悔除於諸學處意當具足正念正知身語正行而徧防守又不護根隨逐可意不可意境便生貪瞋於彼護心名護根門又若太飽及以太飢即便不能勤發精進不墮二邊為住身故中量而食名食知量又於一夜分為三分中夜眠息初後二分及於永日若勤讀誦若修觀行名初後夜勤修覺悟又當親近遮不善處安立善處勝善丈夫及授經等諸善知識又當於自自作知識於自愆犯審諦觀察深見愆犯現後過失對治遣除諸誤犯者若有善根遇佛菩薩即當對彼若無善根當對像前請白諸佛菩薩證知發露悔除於同法友亦如是行己三攝義論曰如是等類所有引攝護持增長諸善法戒是名菩薩攝善法戒所有尸羅而能引攝護持增長如是等類一切善法是名菩薩攝善法戒此文與奘師譯全同唯以尸羅是能引等如是等類加在所引其引攝者謂諸新生如生三慧護持者謂已生者令不失壞如修堪忍若不滅瞋由此能壞所積善故增長者謂已護持更令增長廣大強盛猶如迴向及發弘願戊三饒益有情戒論曰云何菩薩饒益有情戒當知此戒略有十一相何等十一謂諸菩薩於諸有情能引義利彼彼事業與作助伴於諸有情隨所生起疾病等苦瞻侍病等亦作助伴又諸菩薩依世出世種種義利能為有情說諸法要先方便說先如理說後令獲得彼彼義利又諸菩薩於先有恩諸有情所善守知恩隨其所應現前酬報又諸菩薩於墮種種師子虎狼鬼魅王賊水火等畏諸有情類皆能救護令離如是諸怖畏處又諸菩薩於諸喪失財寶親屬諸有情類善為開解令離愁憂又諸菩薩於有匱乏資生眾具諸有情類施與一切資生眾具又諸菩薩隨順道理正與依止如法御眾又諸菩薩隨順世間事務言說呼召去來談論慶慰隨時往赴從他受取飲食等事以要言之遠離一切能引無義違意現行於所餘事心皆隨轉又諸菩薩若隱若露顯示所有真實功德令諸有情歡喜進學又諸菩薩於有過者內懷親昵利益安樂增上意樂調伏訶責治罰驅擯為欲令其出不善處安置善處又諸菩薩以神通力方便示現那落迦等諸趣等相令諸有情厭離不善方便引令入佛聖教歡喜信樂生希有心勤修正行云何菩薩饒益有情戒當知此戒略有十一相謂於須助伴者愚方便者有恩造者遭怖畏者被憂惱者乏資具者求依止者樂隨心者正善行者邪惡行者應以神通所調伏者如其所應為作義利丁三圓滿之因分三戊初律儀戒圓滿因論曰云何菩薩住律儀戒住攝善法戒住饒益有情戒善護律儀戒善修攝善法戒善行一切種饒益有情戒此文通徵三戒云何菩薩住律儀戒如何乃成善護其戒此中有十己初不顧過去諸欲論曰謂諸菩薩住別解脫律儀戒時捨轉輪王而出家已不顧王位如棄草穢如有貧庶為活命故棄下劣欲而出家已不顧劣欲不如菩薩清淨意樂捨輪王位而出家已不顧一切人中最勝轉輪王位謂諸菩薩雖得人中最勝妙欲轉輪王位棄捨出家既出家已不顧彼欲如棄草穢是所欲故說名為欲謂外物欲即資財等由此欲故說名為欲謂煩惱欲即貪愛心此中初欲如以糞掃想所棄腐草不復重顧如是見此亦無可愛堅實先已棄者更不重顧又如以不淨想所棄糞穢不復重顧如是見煩惱欲如同糞穢更不重顧若先棄捨在家資財既出家已後仍顧彼所有律儀不能清淨故當住二種想如前二喻更修無貪己二不樂未來諸欲論曰又諸菩薩住律儀戒於未來世天魔王宮所有妙欲不生喜樂亦不願求彼諸妙欲修行梵行於彼妙欲尚如實觀猶如趣入廣大種種恐畏稠林況餘諸欲若於未來尚不希願魔天所攝他化自在所有欲塵為求彼欲而修梵行何況除彼為餘諸欲不樂彼相謂如實觀猶如趣入虎豹等獸充滿稠林不顧過去說人中欲不說天者以律儀戒重在出家天中無有出家事故不樂未來而說天欲不說人者以是顯示不樂後世欲塵之時諸欲塵中除魔天欲無過上故總之善護清淨出家律儀要能不為未來諸欲而修梵行僅能不顧先捨諸欲尤非滿足己三不著現在諸欲論曰又諸菩薩既出家已於現在世尊貴有情種種上妙利養恭敬正慧審觀尚如變吐曾不味著何況於餘卑賤有情所有下劣利養恭敬若於國王長者尊貴有情上妙欲事利養恭敬尚不味著何況於餘卑賤有情利養恭敬此如不著食後變吐正慧觀察見亦同彼此中要義謂若希後欲而修梵行唯成善願不成別解脫律儀然其棄捨先得欲塵及不著現在非是在家律儀戒中必不容少於出家眾必不可少若不能修生死過患特修欲塵所有過患如前所說而遮其心則定不能善護尸羅應當於此引決定解己四樂住遠離論曰又諸菩薩常樂遠離若獨靜處若在眾中於一切時心專遠離寂靜而住不唯於是尸羅律儀而生喜足依戒住戒勤修無量菩薩等持為欲引發證得自在身常遠離樂獨靜處若在眾中遠離欲等尋思而住不唯以戒便生喜足當依淨戒勤修菩薩無量等持為新引發及已引發為得自在此文顯示唯淨尸羅便生喜足若不進求上勝功德所有尸羅猶非圓滿己五言論尋思悉皆清淨論曰又諸菩薩雖處雜眾而不樂為乃至少分不正言論居遠離處不起少分諸惡尋思或時失念暫爾現行尋便發起猛利悔愧深見其過數數悔愧深見過故雖復暫起不正言論諸惡尋思而能速疾安住正念於彼獲得無復作心由此因緣則能拘檢習拘檢故漸能如昔於彼現行深生喜樂於今安住彼不現行喜樂亦爾又能違逆令不現起處雜眾時不發諸惡雜染言論居遠離時善為防護不起少分諸惡尋思謂貪欲等設由忘念暫爾現行尋便發起猛利惡作深見過患若能如是數數修習依此因緣諸惡語意現行無間能生正念獲不作心便能棄捨習捨棄故漸能如昔於彼二事深生喜樂如是其後於彼現行能不喜樂改換二心先當勤修令不現行設暫現行不當忍受深見過患猛利惡作前後二心換其處所此即遮止諸非所作清淨尸羅無上教授己六不自輕襪論曰又諸菩薩於諸菩薩一切學處及聞已入大地菩薩廣大無量不可思議長時最極難行學處心無驚懼亦不怯劣唯作是念彼既是人漸次修學於諸菩薩一切學處廣大無量不可思議淨身語等諸律儀戒成就圓滿我亦是人漸次修學決定無疑當得如彼淨身語等諸律儀戒成就圓滿若聞已入大地菩薩三聚淨戒寬弘廣大學處無量超諸計數非分別境不可思議歷經多劫超諸數量或非短促須長時修布施身等最極難行於此學處皆當滅除驚懼怯劣及自輕懱念我弗能如何滅除者當作是念而發勇悍謂彼是人漸次修學乃能成就此諸學處非從最初即便能爾我若漸次精勤修學而不廢捨決定無疑亦當得此若聞如是無量學處云誰能學此即便棄捨又作是念此是諸餘菩薩之事非是我事而便棄捨是為增長種性堪能最大障礙當如前說破除怯劣現能行者猛利勤行暫未能者念我何時能修學此多修勇悍又於此因勤積資糧淨治罪障廣發大願己七柔和論曰又諸菩薩住律儀戒常察己過不伺他非普於一切凶暴犯戒諸有情所無損害心無瞋恚心菩薩於彼由懷上品法大悲故現前發起深憐愍心欲饒益心常察己過不伺他非不生他苦若爾他過如是置耶不爾云何謂當緣彼是煩惱法而生大悲悲如何生謂此非是補特伽羅所有過失由煩惱力令無自在普於一切暴惡犯戒無損害心無瞋恚心上品哀愍欲作饒益謂作知識必當令其發菩提心不隨煩惱自在而轉永離煩惱證得無上正等菩提己八堪忍論曰又諸菩薩住律儀戒雖復遭他手足塊石刀杖等觸之所加害於彼尚無少恚恨心況當於彼欲出惡言欲行加害況復發言毀辱訶責以少苦觸作不饒益雖復遭他手足塊石杖等加害尚無恚心何況更出彈螫惡言或行捶打此文如次謂意語身三業清淨傳為雲海釋云如是大苦亦能堪忍況全無益於他毀罵瞋令止住定不更以如是損惱令心憂苦而能安忍本論則云況復毀辱瞋恚訶責以微少苦作不饒益此說他打尚不少起瞋恚報復況以此等故是顯示他作微少不饒益事心不恚惱當正安住四沙門法己九不放逸論曰又諸菩薩住律儀戒具足成就五支所攝不放逸行一前際俱行不放逸行二後際俱行不放逸行三中際俱行不放逸行四先時所作不放逸行五俱時隨行不放逸行謂諸菩薩於菩薩學正修學時若於過去已所違犯如法悔除是名菩薩前際俱行不放逸行若於未來當所違犯如法悔除是名菩薩後際俱行不放逸行若於現在正所違犯如法悔除是名菩薩中際俱行不放逸行若諸菩薩先於後時當所違犯發起猛利自誓欲樂謂我定當如如所應行如如所應住如是如是行如是如是住令無所犯是名菩薩先時所作不放逸行若諸菩薩即以如是先時所作不放逸行為所依止如如所應行如如所應住如是如是行如是如是住不起毀犯是名菩薩俱時隨行不放逸行此有五種謂前際後際中際俱行先時所作俱時隨轉不放逸行此五如次於過去時諸已違犯如法悔除於未來時殷重思惟亦如是行於現在時當無忘念亦如是行力勵自誓謂我如如若行若住能無違犯即當如是如是行住由依此故如是如是若行若住此中重在別解脫中所說學處不放逸行又此五中第四為本若有第四能生第五設未生五誤起違犯如其次第如法還淨己十軌則正命清淨分二一軌則清淨或行清淨論曰又諸菩薩住律儀戒覆藏自善發露己惡少欲喜足堪忍眾苦性無憂慼不掉不躁威儀寂靜不為名聞宣揚自善不行覆藏發露己惡獲得劣少無憂少欲於得妙多不求知足堪忍寒熱飢渴等苦未得利養性無憂慼諸根不掉調伏寂靜不隨境轉名不躁動威儀端嚴如理作意威儀寂靜二正命清淨者論曰離矯詐等一切能起邪命之法離矯詐等五種邪命論曰菩薩成就如是十支名住律儀戒善護律儀戒謂不顧戀過去諸欲又不希求未來諸欲又不躭著現在諸欲又樂遠離不生喜足又能掃滌不正言論諸惡尋思又能於己不自輕懱又性柔和又能堪忍又不放逸又能具足軌則淨命此結文藏文未列科德光論師說由六因緣雖已防護而非善護一唯以少許便生喜足二語及發起未能清淨三自行輕懱四不攝眷屬五不悔違犯六未能清淨軌則正命初中有二一雖護身語於三世欲未護其心二雖已護心不求依戒引發等持不攝眷屬者謂不攝堪忍尸羅眷屬戊二攝善法戒圓滿之因論曰又諸菩薩已能安住攝善法戒若於身財少生顧戀尚不忍受何況其多又於一切犯戒因緣根本煩惱少分煩惱忿恨等生亦不忍受又於他所發生恚害怨恨等心亦不忍受又於所起懈怠懶惰亦不忍受又於所起等至味著等至煩惱亦不忍受又於五處如實了知謂如實知善果勝利又能如實了知善因又能如實知善因果倒與無倒又如實知攝善法障是諸菩薩能於善果見大勝利尋求善因為攝善故如實了知倒與無倒由此菩薩獲得善果不於無常妄見為常不於其苦妄見為樂不於不淨妄見為淨不於無我妄見為我如實了知攝善法障為攝善故速疾遠離菩薩由此十種相故名住攝善法戒速能攝善一切種相謂施漸次若戒漸次若忍漸次若精進漸次若靜慮漸次及五種慧有二五種前五度漸次者如其次第五度逆品若於身財少生懼貪尚不忍受又於一切犯戒因緣惑及隨惑忿恨等生亦不忍受又於惡害怨恨等生亦不忍受又生懈怠不修善行及於睡眠臥樂倚樂不敬懶惰亦不忍受又於所起靜慮昧著彼地煩惱或心沈沒及掉舉等皆不忍受總此逆品初生之時定當依止對治滅除決不隨彼增上而轉慧漸次者謂如實知善果勝利又知善因又於善果知倒無倒又如實知攝善法障斷五無知及諸障礙其勝利者謂人天果及三菩提因者即十善等增上生因決定勝因謂依善友聽聞正法及思修等若於所得善果見為常樂我淨是為顛倒與此相違是名無倒菩薩當于所得善果無顛倒見由是因緣了知六度善果勝利及彼善因又能了知前說障礙六度逆品斷除逆品攝集六度所有善根即能速疾攝一切善以世出世一切善法於六度中無不攝故又若斷除六度逆品能速攝故此中漸次義為速生施等之因戌三饒益有情戒圓滿之因分十一論曰又諸菩薩由十一相名住一切種饒益有情戒於一一相中成就一切種由十一相名住一切種饒益有情戒於一一相中成就一切種此如於一應作助伴或為助伴一切有情須助伴者或作一切助伴之相又如報恩時說於十一類一一有情如其所應皆為成辦十一種事己初饒益求助伴者分二庚初助伴事業二助伴有苦初助伴事業論曰謂諸菩薩於諸有情彼彼事業皆為助伴謂於思量所作事業及於功用所作事業悉能與彼而作助伴或於道路若往若來或於無倒事業加行或於守護所有財物或於和合展轉乖離或於義會或於修福皆為助伴此中分八一思量事業者謂於何事若作不作能致盛衰而正思量二決擇事業者謂從現在定作彼事助伴此二之法謂代思量及自荷負助伴之擔三於道路若往若來諸無侶伴無隨從者謂當助伴而為導路四於事邊際助加行者謂正開示善務農等無罪方便五護財物者謂於已集所有財物開示方便不為盜等之所劫取六合乖離者謂解怨恨七於義會者謂有定期所修福業八於修福者謂無定期所興福業皆為助伴德光論師云由其初二未得資財能令獲得事業邊際及守護者增長守護最後二者既增長已令供福田庚二助伴有苦論曰於諸救苦亦為助伴謂於遭遇疾疫有情瞻侍供給盲者啟導聾者撝義手代言者曉以想像迷方路者示以隅途支不具者惠以荷乘其愚騃者誨以勝慧為貪欲纏所苦有情開解令離貪欲纏苦如是若為瞋恚惛沈睡眠掉舉惡作疑纏所苦有情開解令離疑纏等苦欲尋思纏所苦有情開解令離欲尋思苦如欲尋思恚害親里國土不死輕侮相應族姓相應所有尋思當知亦爾他蔑他勝所苦有情開解令離被蔑勝苦行路疲乏所苦有情施座施處調身按摩令其止息勞倦眾苦此中分二初身苦有四一於有病者謂施藥瞻侍二於根壞者謂啟導盲者所欲往道又於聾者以手撝示應取應捨手代言者曉以想像藏文與聾為一段迷方路者示以隅途藏文中無三於缺支者謂以身荷或以騎乘送往欲處四行路疲乏者施食施處調身按摩其愚騃者誨以勝慧藏文中無二心苦分三一蓋障苦者謂貪欲等五蓋所纏開示教授令其除遣二無間缺苦者謂八尋思所纏苦者以對治法開示令離八尋思者謂欲恚害親里國土不死尋思他侮尋思族姓尋思謂於財位種姓圓滿貪欲增上云我族姓高貴三他蔑勝苦者謂當開示戰鬬勝敗世間常事及無我等出世間法而為除遣己二饒益愚於正理者論曰又諸菩薩為諸有情如理宣說謂於樂行惡行有情為欲令斷諸惡行故以相應文句助伴隨順清亮有用相稱應順常委分資糧法而為宣說或復方便善巧宣說如於樂行惡行有情為欲令斷諸惡行故如是於行慳行有情為欲令彼斷慳行故於現法中求財寶者為欲令彼正少功力集多財寶守護無失於佛聖教懷憎嫉者為欲令彼得清淨信證清淨見超諸惡趣盡一切結越一切苦應知亦爾於惡行果成熟苦者為說正法令其受戒止息惡行說法之相者謂以相應文句等八德光論師說於三問具足四德酬答而說一不知故問者相應文句及以助伴謂無倒義及連續義而為酬答二相違問者隨順清亮謂順法性前後意趣無違而答三俱問者有用相稱謂有方便令其了悟稱所化機而令知解又具應順常委資糧謂順引發世間功德及以聖道資糧而答言常委者即是恆常力勵委悉以從諸漏恆常殷重守護心故勝子亦同又後二德德光師說依證增上答問教授最勝子說依得增上如此二師雖云三問顯是四問德光師說又相應者以助伴訓釋前後順故又隨順者以清亮訓釋順法性故又有用者以相稱訓釋稱所化故又應順者以常委訓釋順梵行故譬如甚深和雅可意了解應聞五支佛語如次即以雷聲悅耳歡喜顯了無不隨順而為訓釋每二語中以後釋前由此顯示於一切問具足四種功德而答謂前後無違不違法性不違所化與殊勝義而相係屬此論又云或復方便善巧宣說謂如前犯戒諸惡行者為令止息諸惡行故以八文句而為說法令慳等者修施等故亦如是說或由方便令無厭憎而為說法名善方便又於現法為說方便正少功力集多財寶守護無失又於聖教懷憎恚者令發正信趣入聖教已趣入者為令斷除見斷煩惱以清淨見超惡趣故說正勝法得見道者為說進斷餘結方便己三饒益有恩論曰又諸菩薩於其有恩諸有情所深知恩惠常思酬報暫見申敬讚言善來怡顏歡慰吐誠談謔祥處設座正筵令坐若等若增財利供養現前酬答非以下劣於彼事業雖不求請尚應伴助況乎有命如於事業如是於苦於如理說於方便說於濟怖畏於衰惱處開解愁憂於惠資具於與依止於隨心轉於顯實德令深歡悅於懷親愛方便調伏於現神通驚恐引攝如應廣說當知亦爾見時申敬讚言善來歡顏慶慰祥處設座正筵令坐次以利敬較其恩惠若等若增現前酬答非以下劣於彼事業雖未請求尚為助伴何況有命如是乃至於現神通恐怖引攝諸餘饒益皆應為作己四救濟怖畏論曰又諸菩薩於遭怖畏諸有情類能為救護謂於種種禽獸水火王賊怨敵家主宰官不活惡名大眾威德非人起屍魍魎等畏皆能救護令得安隱藏論無火字有摩羯陀魚獅子虎等陸居旁生或實水患或諸水族摩羯魚等水居旁生為旁生二畏又有勢力治罰之王若明若闇劫財盜賊障礙財等或怨或敵管理少分家主宰官為人中四畏又不具足三種可愛謂無資財乏少妙行不具辯說有不活畏及惡名畏眾威德畏非人有二初由生差別生非人中二明咒差別以咒起屍從此怖畏皆當救護己五開解憂惱論曰又諸菩薩於處衰惱諸有情類能善開解令離愁憂或依親屬有所衰亡所謂父母兄弟妻子奴婢僮僕宗長朋友內外族因親教軌範及餘尊重時有喪亡善為開解令離憂惱或依財寶有所喪失謂或王賊之所侵奪或火所燒或水所溺或為矯詐之所誑誘或由事業無方損失或為惡親非理橫取或家生火之所耗費於如是等財寶喪失善為開解令離憂惱由是因緣諸有情類生輭中上三品愁憂菩薩皆能正為開解或為矯詐之所誘惑句藏文為或未善藏以致失壞此中分二庚初喪親生憂二耗財生憂初中分五一喪能生親謂喪父母二喪失攝受及果脈親謂死妻子藏文無兄弟二字三失使命親謂死奴婢及死僮僕四離諸有恩慈愛之親謂喪宗長朋友餘族五失離開導利益之親謂喪親教軌範尊長同梵行者所生憂愁庚二耗財分二辛初一切世人共同苦因二一類不共初共一切者謂王賊侵奪火燒水溺辛二不共分二壬初由自未善二因他令失初中分二一未善守護所有財寶者謂未善藏護以致失壞二於諸財寶未善招集者謂由事業無方損失壬二因他令失分二一由他受用之所致苦謂為惡親非理橫取二由自家室所起憂苦謂家生火之所耗費有論釋為純生敗壞種姓之嗣不知受用散失財寶若由如是親財等事引生上中下品愁憂曉示無常而令開解喪父母等所生為上死奴婢等所起為中耗損財寶所生為下或以所須及所珍愛應當了知己六饒益匱乏資具者論曰又諸菩薩備資生具隨有來求即皆施與謂諸有情求食與食求飲與飲求乘與乘求衣與衣求莊嚴具施莊嚴具求諸什物施以什物求鬘塗香施鬘塗香求止憩處施止憩處求諸光明施以光明此中分六一於生活匱乏苦者謂求飲食惠施飲食二於勞倦苦者謂求乘騎即施乘騎三於羞慚苦者謂求衣服莊嚴具等即施彼等以無衣服及莊嚴具生羞慚故四於無資具苦者謂求什物即施什物五於惡臭者謂求燒香花鬘塗香即施彼等六於乏憩處光明苦者謂求憩處及發精進求燈明者即施彼等己七饒益求依止者論曰又諸菩薩性好攝受諸有情類如法御眾方便饒益以無染心先與依止以憐愍心現作饒益然後給施如法衣服飲食臥具病緣醫藥資身什物若自無有應從淨信長者居士婆羅門等求索與之於已以法所獲如法衣服飲食諸坐臥具病緣醫藥資身什物與眾同用自無隱費於時時間以其隨順八種教授而正教授五種教誡而正教誡此中所說教授教誡當知如前力種性品已廣分別此中分二初以何意樂攝受大眾者非為名聞利養恭敬悲心為先以無染心先與依止二以何加行攝受分二初以財攝受二以法攝受初中分二一從他求者為利所攝受諸徒眾故從諸淨信長者居士求索衣服飲食臥具病緣醫藥二於己資具共同用者謂自如法所獲衣等與彼同用二以法攝受分二一施與教授有八心未住者為令心住所緣境故有五教授謂於上品貪瞋癡慢及尋思者如其次第不淨慈悲緣起界別及以隨念阿那波那心已住者為令獲得自義利故為說能治常斷二見遠離二邊處中之行為一教授為令捨除於道未作而謂已作於果未得而謂已得諸增上慢為二教授此為安住正方便道捨棄留難三中所攝二施與教誡有五一遮止有罪現行二開許無罪現行三若有行所遮止諫誨止息四雖已如是諫誨若仍不捨如法治罰五若有正行開遮讚令歡喜譯者註關於辯諍稍有減略終
