body:
  text: 宗喀巴大師造釋法尊譯己八饒益求隨心轉分二庚初略標論曰又諸菩薩於有情心性好隨轉隨心轉時先知有情若體若性知體性已隨諸有情所應共住即應如是與其共住隨諸有情所應同行即應如是與彼同行若體若性藏文為意樂自性界菩薩隨順利有情時先當了知有情意樂及性并界隨諸有情所應共住即如是住隨諸有情所應同行即如是行意樂謂思觀具善惡及瞋慈等何等意樂性謂勝解觀於何乘而有勝解順其勝解界謂隨眠順其隨眠庚二廣釋分七第一論曰若諸菩薩欲隨所化有情心轉當審觀察若於如是如是相事現行身語生他憂苦如是憂苦若不令其出不善處安立善處菩薩爾時於如是事現行身語護彼心故方便思擇勵力遮止令不現行如是憂苦若能令其出不善處安立善處菩薩爾時於如是事現行身語住哀愍心不隨如是有情心轉方便思擇勵力策發要令現行復審觀察若於如是他有情事現行身語令餘有情發生憂苦如是憂苦若不令他或餘有情或不令二出不善處安立善處菩薩爾時於如是事現行身語護餘心故方便思擇勵力遮止令不現行如是憂苦若能令他或餘有情或能令二出不善處安立善處菩薩爾時於如是事現行身語住哀愍心不隨如是有情心轉方便思擇勵力策發要令現行復審觀察若於如是菩薩自事現行身語生他憂苦如是現行身語二業非諸菩薩學處所攝不順福德智慧資糧如是憂苦不能令他出不善處安立善處菩薩爾時於如是事現行身語護他心故方便思擇勵力遮止令不現行與此相違現行身語如前應知如生憂苦如是廣說生於喜樂隨其所應當知亦爾若隨有情心轉之時身語現行能令有情現生憂苦當審觀察由此憂苦不令有情出不善處安立善處菩薩勵力遮止令不現行隨他心轉由此憂苦若能令他安立善處則當於他懷哀愍心要令現行不應隨順他心而轉究竟於彼有利益故如是若由如是現行於所隨轉他有情所雖不生苦然於餘者生苦之時為捨不捨如是現行如前應知若為自利現行身語非為隨他生他憂苦若此非是學處所攝又不成就二種資糧亦不令他出不善處安立善處為護他心應當捨棄若違此三住哀愍心應當現行不隨他心如是若有身語現行令他發生現前喜樂究竟利益即應現行究竟衰損則不隨他轉如前應知第二論曰又隨他心而轉菩薩知他有情忿纏所纏現前忿纏難可捨離尚不讚歎何況毀訾即於爾時亦不諫誨又若菩薩隨有情轉見他現為忿纏所纏乃至其忿未息以來尚不稱讚何況毀訾亦不諫誨第三論曰又隨他心而轉菩薩他雖不來談論慶慰尚應自往談論慶慰何況彼來而不酬報若諸粗鄙不間世情他雖不來談論慶慰尚往談論而相慶慰況彼來此談論慶慰第四論曰又隨他心而轉菩薩終不故意惱觸於他唯除訶責諸犯過者起慈悲心諸根寂靜如應訶責令其調伏訶責他時無恚惱心唯應於他住哀愍心諸根寂靜而正訶責第五論曰又隨他心而轉菩薩終不嗤誚輕弄於他令其赧愧不安隱住亦不令其心生憂悔雖能摧伏得勝於彼而不彰其墮在負處彼雖淨信生於謙下終不現相而起自高於大衆中終不輕誚令其赧愧怯懼不安是輕毀因故亦不令悔不樂住故雖已摧伏得勝於彼而不彰其墮在負處令羞恥故於謙下前不顯自高令恐怖故第六論曰又隨他心而轉菩薩於諸有情非不親近不極親近亦不非時而相親近於他人所非不親近無識友故不極親近恆常共住障其事業令不喜故亦不非時而相親近以時親近如是三者為令遠離斷絶係屬第七論曰又隨他心而轉菩薩終不現前毀他所愛亦不現前讚他非愛非情交者不吐實誠不屢希望知量而受若先許應他飲食等終無假託不赴先祈為性謙沖如法曉喻不於他前毀其所愛讚其非愛他不喜故非情交者不吐實誠他異思故不於他所屢往乞求縱來惠施當知量受令他厭患不信譏誚惱不更施後縱施與而輕毀故請飲食等亦不棄捨以不障礙他意樂故或以如法而相辭謝謂以讀誦或修靜慮或受近圓令無不喜於此每段之首皆有菩薩隨他心轉己九饒益正行論曰又諸菩薩性好讚揚真實功德令他歡喜於信功德具足者前讚揚信德令其歡喜於戒功德具足者前讚揚戒德令其歡喜於聞功德具足者前讚揚聞德令其歡喜於捨功德具足者前讚揚捨德令其歡喜於慧功德具足者前讚揚慧德令其歡喜於諸具足信戒聞捨慧德者前以彼彼言讚揚令喜戒及惠捨能感圓滿身及財位是增上生因慧是決定勝因聞能生慧信於二者為能入因己十饒益邪行論曰又諸菩薩性好悲愍以調伏法調伏有情若諸有情有下品過下品違犯內懷親愛無損惱心以軟訶責而訶責之若諸有情有中品過中品違犯內懷親愛無損惱心以中訶責而訶責之若諸有情有上品過上品違犯內懷親愛無損惱心以上訶責而訶責之如訶責法治罰亦爾若諸有情有下中品應可驅擯過失違犯菩薩爾時為教誡彼及餘有情以憐愍心及利益心權時驅擯後還攝受若諸有情有其上品應可驅擯過失違犯菩薩爾時盡壽驅擯不與共住不同受用憐愍彼故不還攝受勿令其人於佛聖教多攝非福又為教誡利餘有情於下中上三品過失違犯有情無損惱心無瞋恚心以軟中上三品訶責治罰亦爾又於軟中過失違犯為哀愍彼及餘有情權時驅擯一月兩月或一二年後還攝受於上品過悲愍彼故勿令攝集衆多非福亦為利益餘有情故盡壽驅擯不與共住不共受用不還攝受言非福者謂不如理受用信施及受同梵行者禮拜等事過失謂不行應理違犯謂行不應理是德光論師所釋己十一饒益應現神通調伏之有情分二庚初以神通恐怖論曰又諸菩薩為欲饒益諸有情故現神通力或為恐怖或為引攝謂為樂行諸惡行者方便示現種種惡行諸果異熟謂諸惡趣小那落迦大那落迦寒那落迦熱那落迦既示現已而告之言汝當觀此先於人中造作增長諸惡行故今受如是最極暴惡辛楚非愛苦果異熟彼見是已恐怖厭患離諸惡行復有一類無信有情菩薩衆中隨事故問彼作異思拒而不答菩薩爾時或便化作執金剛神或復化作壯色大身巨力藥叉令其恐怖由是因緣捨慢生信恭敬正答其餘大衆聞彼正答亦皆調伏現諸寒熱那落迦苦而告之曰汝當觀此先於人中作集惡行感非愛果令其厭怖遠離惡行又有有情處於菩薩大衆會中問責之時拒而不答菩薩當現執金剛神或當化作壯色大身巨力藥叉令其恐怖信仰恭敬善答所問其餘大衆聞彼答故亦皆調伏最勝子等說此是處大衆之中故於菩薩起損惱心拒而不答為令正答所問事故現通恐怖逼令正答庚二以神通引攝論曰或現種種神通變化或一為多或多為一或以其身穿過石壁山巖等障往還無礙如是廣說乃至梵世身自在轉現無量種神變差別或復現入火界定等或復示現共聲聞等種種神通方便引攝令諸有情踊躍歡喜諸未信者方便安處信具足中諸犯戒者方便安處戒具足中諸少聞者方便安處聞具足中多慳吝者方便安處捨具足中諸惡慧者方便安處慧具足中如是菩薩成就一切種饒益有情戒或一為多或多為一以身穿過石壁山巖及城垣等往還無礙乃至梵世身自在轉或上身出火下身出水等現多神變或復現入火界定等引令歡喜諸未信者犯戒少聞慳吝惡慧如次安立信戒聞捨慧圓滿中又十一種饒益之數諸餘釋論雖有異說然前所說者是如律儀二十頌釋難論論中亦將助伴事業侍病助苦攝三為一極相符合最勝子云為增自福是攝善法饒益有情意樂亦成饒益有情淨戒此說雖未現前利他緣利他故亦成饒益有情戒然此論說現實利他又現未作利有情時亦無失壞不具饒益有情戒之過譬如散亂睡眠等位現無防罪之心然有律儀戒發心儀軌云初發業者以律儀戒為上首故名誓願行勝解行者攝善法戒為上首故名等至行入大地者饒益有情為上首故名心喜行此雖說有輕重之別然從初受律儀即須學習饒益有情唯未具足神通之時所行利他難成主要故此論師明了宣說所利有情之差別及能義利有情之方便最為重要善了知已隨順此等而行利他如是菩薩成就一切種饒益有情戒丁四攝義論曰是名菩薩三種戒藏亦名無量大功德藏謂律儀戒所攝戒藏攝善法戒所攝戒藏饒益有情戒所攝戒藏菩薩所有三種戒藏謂律儀戒攝善法戒利有情戒所攝戒藏總能攝集無邊淨戒故學此者亦能成就無量福德此上皆是菩薩地說又攝決擇菩薩地說毗奈耶略有三聚謂律儀戒等三初律儀戒如佛所說別解脫經及其廣釋應當修學攝善法戒謂於六心觀察修學攝決擇分云當知毗奈耶略有三聚初律儀戒毗奈耶聚如薄伽梵為諸聲聞所化有情略說毗奈耶相當知即此毗奈耶聚云何攝善法戒毗奈耶聚謂諸菩薩於攝善法戒勤修習時略於六心應善觀察何等為六一輕蔑心二懈怠俱行心三有覆蔽心四勤勞倦心五病隨行心六障隨行心若諸菩薩於善法中所有輕心無勝解心及凌蔑心名輕蔑心若有懶惰憍醉放逸所纏繞心名懈怠俱行心若貪欲等隨有一蓋或諸煩惱及隨煩惱所纏繞心名有覆蔽心若住勇猛增上精進身疲心倦映蔽其心名勤勞倦心若有諸病損惱其心無有力能不堪修行名病隨行心若有喜樂談論等障隨逐其心名障隨行心如是六心現起之時忍不忍受有無罪犯即彼論云菩薩於此六種心中應正觀察我於如是六種心中為有隨一現前行耶為無有耶前三心起菩薩一向不應忍受若有忍受而不棄捨遍於一切皆名有罪勤勞倦心現在前時由此心故捨善方便若為暫息身心疲惱當於善法多修習者當知無罪若於一切畢竟捨離謂我何用修此善法令我現前安住此苦無知有罪病隨行心現在前時菩薩於此無有自在不隨所欲修善加行雖復忍受而無有罪障隨行心現在前時若不隨欲墮在其中或正觀見有大義利雖復忍受而無有罪若隨所欲故入其中或正觀見無有義利或少義利而故忍受當知有罪如是六心前三生已而忍受者一向有罪病隨行心雖復忍受一向無罪所餘二心若生起已而忍受者或是有罪或是無罪行利有情當觀六處攝決擇分云若諸菩薩勤修饒益有情戒時當正觀察六處攝行所謂自他財衰財盛法衰法盛是名六處言財衰者謂衣食等未得不得得已斷壞與此相違當知財盛言法衰者謂越學處於先未聞勝義所攝如來所說微妙法句不得聽聞如不聽聞先所未聞如是於先所未思惟不得思惟有聽聞障有思惟障設得聞思尋復忘失於所未證修所成善而不能證設證還退與此相違當知法盛自他是法財盛衰所依觀察六處進止之法及於此等有罪無罪即彼論云此中菩薩作自法衰令他財盛此不應為如令財盛法盛亦爾此中義者越學所攝及能隨順越學所攝若於證法退失所攝當知法衰作自財衰令他財盛若此財盛不引法衰此則應為若引法衰此不應為如令財盛法盛亦爾作自財盛令他財盛此則應為如令財盛法盛亦爾作自法盛令他財盛此則應為如令財盛法盛亦爾於如是事若不修行名為有罪若正修行是名無罪如是且說菩薩所受三種律儀略毗奈耶菩薩於中常應作意思惟修學是故為他補特伽羅或法或財若自違越所受學處雖不違越隨順違越若失已得新得正法雖不利他亦復無罪如是利他作自財衰不引法衰若不為者是名有罪若引法衰則不應為如是能令自財法盛而不為他作此二者皆名有罪又行利他有罪無罪亦如攝決擇分云若諸菩薩於己有恩諸有情所隨順恩想以有染心攝朋黨心相續發起親友意樂當知有罪若於有怨諸有情所隨順怨想以穢濁心執怨敵心相續發起怨讐意樂當知有罪若於無恩無怨諸有情所相續發起中庸意樂放捨意樂當知有罪若有現前求欲出家隨順觀察時有過患劫有過患不度出家當知無罪若有安住悲愍彼心雖度出家亦無有罪如說出家受具足戒與作依止攝為徒衆當知亦爾由此等相菩薩所有三種戒蘊皆得圓滿如是正受諸律儀已雖於三戒皆須修學然最要者於律儀戒共同七衆別解脫學處尤當勤學攝決擇分云此三種戒由律儀戒之所攝持令其和合若能於此精進守護亦能精進守護餘二若有於此不能守護亦於餘二不能守護是故若有毀律儀戒名毀一切菩薩律儀若爾正受菩薩律儀為可隨意受三戒中一律儀耶抑須具受三律儀耶答菩薩律儀唯有一類非有多種如別解脫故受此時無所簡別遍學一切而正受取攝決擇分云於此三種菩薩律儀隨有所缺為當言護菩薩律儀耶當言不護耶當言不護若爾云何集學論說菩薩律儀受一學處如云故當隨自力能雖一善根亦當正受而善守護地藏經云十善業道能得成佛若有盡壽下至不護一善業道然作是言我是大乘我求無上正等菩提此數取趣最為矯詐說大妄語而於一切佛世尊前欺誑世間說斷滅語愚癡而死顛倒墮落故幾時能受即於爾時安住其善此義當觀藥師琉璃光王經答此非說受菩薩律儀是說發願心已若不能受菩薩律儀令熏習故隨力修學少分學處其時乃至能護短時修學故彼律儀當隨力受若不受者則為欺誑諸佛菩薩天人世間為顯此過故引前經其後又云若大有情聽聞是已以慧通達諸菩薩行最為難行為度衆生盡出苦故勇荷此擔此說聽聞受學處已不護過患知菩薩行最為難行然能荷負菩薩學處重擔全無怯懼乃可受持菩薩律儀故其前者是聞過患知難行已不能荷負學處重擔則令漸受一一妙行次第修學慧力增長乃受律儀彼引藥師經證亦可了知丙二釋受戒法分二丁初總義二正義今初龍猛菩薩造發心儀軌而未別造受律儀法然發心儀軌云當發最勝菩提心我請一切諸有情行最可意菩提行為利衆生願成佛如是三說發菩提心又云隨我所有勤行惠施守護淨戒修行忍辱勤發精進安住靜慮觀察妙慧方便善巧如是一切皆為利益安樂一切有情依於無上正等菩提隨順過去未來現在成就大悲正入大乘安住大地菩薩摩訶薩行願諸聖者於我菩薩證是菩薩此說受學諸行隨菩薩行集學處論及入行論說受行發心即受律儀此論亦說受學三世菩薩三聚淨戒即受菩薩律儀覺賢論師無畏論師亦糅兩宗而造受律儀法道炬釋論說尊者所造發心受戒法是合龍猛無著寂天三派之義故龍猛菩薩無著菩薩兩派儀軌除少差別不同者外得律儀法義無差別故言兩派名中觀唯識宗所從受之境能受之法根本等罪皆有不同者是極無觀察也無著菩薩雖說受戒須發願心然除受戒儀軌之外而未別造發心儀軌慈氏五論及世親論中亦未見說勝敵論師造受願行與受律儀二種次第燃燈吉祥亦各別造發心儀軌律儀儀軌黑行論師於集經論釋及入行論釋中亦別安立願行儀軌行心與律儀儀軌異不應理諸先知識以受願心儀軌為先待堅固後次受律儀者是堅固律儀最善方便若爾云何修次中篇中云其世俗者謂由大悲誓願度拔一切有情為利衆生願當成佛先發欲求無上正等菩提行相之心此如戒品所說儀軌當從安住菩薩律儀聰睿前發答此依受學三世菩薩一切學處義有發心故名發心儀軌非說唯是願心儀軌丁二正義分二戊初有師法二無師法初又分三己初加行法二正行法三結行法初又分五庚初請白二修集資糧三勸速授戒四修勝歡喜五詰問障難初又分二辛初補特伽羅差別二受法差別初又分二壬初身差別論曰若諸菩薩欲於如是菩薩所學三種戒藏勤修學者或是在家或是出家先於無上正等菩提發弘願已受戒要須何身為依耶謂諸菩薩或是在家或是出家於前所說菩薩學處三聚淨戒具善樂意誠欲修學於大菩提已發弘願謂如教授已發願心若唯欲受菩薩律儀於菩薩學不欲修學或未發願心則不應授與菩薩律儀論曰又諸菩薩欲受菩薩菩薩戒時先應為說菩薩法藏摩怛履迦菩薩學處及犯處相令其聽受以慧觀察自所意樂堪能思擇受菩薩戒非惟他勸非為勝他當知是名堅固菩薩堪受菩薩淨戒律儀以受戒法如應正授為令如是求受律儀菩薩心堅固故當於未授律儀之前先為宣說菩薩法藏摩怛履迦菩薩地中菩薩學處及犯處相如是說已令自觀察能不能學以慧觀察堪受律儀非自不樂惟由他勸非為勝他當知是名堅固菩薩堪受如是淨戒律儀以受戒法如應正受由是此與毗奈耶異此於未受律儀之前善聽了知若心堅固能護學處乃受律儀若有成就如是意樂律儀乃生若未成就則戒不生如攝分云若有為令他了知故隨順他故由他勸導受菩薩戒非自至心隨觀隨察自生淨信於諸有情住憐愍心愛樂善法受菩薩戒當言此非真實防護亦非圓滿修習善法亦不能得彼果勝利與此相違當知名為真實防護亦名圓滿修習善法亦能獲得彼果勝利壬二境差別論曰當審訪求同法菩薩已發大願有智有力於語表義能授能開於如是等功德具足勝菩薩所須何等境受律儀耶答訪求已發菩薩大願謂已發願心言同法者謂善安住菩薩律儀善巧大乘於受學處作請白等所有語表能持其文能解其義從此而受論曰又諸菩薩不從一切唯聰慧者求受菩薩所受淨戒無淨信者不應從受謂於如是所受淨戒初無信解不能趣入不善思惟有慳貪者慳貪蔽者有大欲者無喜足者不應從受毀淨戒者於諸學處無恭敬者於戒律儀有慢緩者不應從受有忿恨者多不忍者於他違犯不堪耐者不應從受有懶惰者有懈怠者多分耽著日夜睡樂倚樂臥樂好合徒侶樂喜談者不應從受心散亂者下至不能牛乳頃善心一緣住修習者不應從受有暗昧者愚癡類者極劣心者誹謗菩薩素怛纜藏摩怛履迦者不應從受不從誰受耶謂不應從一切聰慧菩薩受菩薩戒謂壞意樂及壞加行壞意樂者謂無淨信於此律儀初無勝解次不趣入後不思維或無功用壞加行者謂若失壞六度加行初者謂於身財有慳貪者慳增上轉慳貪蔽者於所未得有大欲者雖已獲得不知足者忍受布施所有逆品第二者謂犯他勝無餘律儀毀淨戒者現行惡行犯有餘殘於諸學處無敬慢緩第三者謂遇逆緣不能堪忍現惱亂心有忿勃者憶念怨害數數惱亂有懷恨者四沙門法所對治品於他四過不堪忍者第四者謂不樂善法有懶惰者樂所治品有懈怠者為釋此故多分耽著日夜睡樂倚樂臥樂以猥雜言虛耗時日第五者謂心不能住奢摩他等心散亂者下至不能牛乳頃於一善緣修住心者第六者惡慧分二一現行惡慧謂自不能了知真實有暗昧者雖說不解愚癡類者於廣大法不忍怯懼或性愚蒙極劣心者二持惡慧因謂謗菩薩素怛纜藏摩怛履迦不應從此等受戒律儀有釋論云現如是過雖皆略有謂不應從極具足者謂若無重過少有過者亦可從受辛二受法差別分二壬初受者受法之差別論曰先禮雙足如是請言我今欲於善男子所或長老所或大德所乞受一切菩薩淨戒唯願須臾不辭勞倦哀愍聽授如前所說如是之身先應頂禮彼境雙足若不恭敬不生戒故又如勝敵論師無畏論師所說先獻壇供次請白云我今欲於善男子所乞受菩薩淨戒律儀惟願須臾不辭勞倦哀愍聽授若不求受戒不生故勝敵覺賢燃燈無畏諸大論師皆說三返爾時之威儀無畏勝敵論師說為蹲跪合掌或膝據地即如下說隨一威儀壬二境授法之差別論曰爾時有智有力菩薩於彼欲受律儀菩薩先當為說菩薩律儀廣大勝利又為欲受菩薩律儀宣說學處若輕若重為生勇悍如是告言善男子聽汝今為欲令諸有情未度者度未解者解未出者出未涅槃者令般涅槃紹繼佛種令不斷否汝當於此發堅固心立堅固誓見彼不知如是義者為發勇悍故當宣說此段漢論中缺次有力能授淨戒菩薩為彼欲受律儀菩薩當廣宣說菩薩律儀廣大勝利次為欲受律儀菩薩宣說學處諸輕重罪又為令發勇悍之心作是告云善男子聽汝今為欲令諸有情未度者度未解者解未出者出未涅槃者令般涅槃紹繼佛種令不斷否汝當於此發堅固心立堅固誓作此說者由見彼是自不知求受律儀者於受律儀令發勇悍令其荷負學處重擔意樂堅固護持勝利如下所說又集學論云寂靜決定神變經云曼殊室利若於𮀚伽沙數諸佛一一佛所以摩尼寶大自在王充滿𮀚伽沙數佛剎而為供養如是供養復經𮀚伽沙數諸劫恆常供養曼殊室利若餘菩薩聽聞如是種相法已獨往一處思維觀察謂我當學如是正法生樂學欲縱未能學然所生福極為衆多菩薩布施大摩尼寶自在王福非能如是是故菩薩見斯勝利定當不退前經又云曼殊室利譬如三千大千世界極微塵數一切有情一一有情皆為大王王贍部洲如是一切共作契言若有受持讀解大乘我等每日以爪割彼五兩身肉以如是苦令其捨命曼殊室利若此菩薩聞如是語不驚不怖亦不惶恐下至不生一念恐怖之心無怯無弱亦無猶豫受持正法後轉精進精勤讀誦曼殊室利如是菩薩名勇行布施勇護尸羅勇修堪忍勇猛精進勇住靜慮勇修般若勇三摩地曼殊室利若此菩薩於彼殺者不忿不慢不生瞋心曼殊室利如是菩薩等同梵王等同帝釋不可傾動若現在時能敬學處其果尤大如月燈經云經恆沙多劫無量諸佛前供養諸幢幡燈鬘飲食等若於正法壞佛教將滅時日夜持一學其福勝於彼故於學處應恭敬學如是為說學處輕重者根本罪重餘罪為輕當為宣說不護過患集學論云正法念住經說若略思施後不布施當生餓鬼先誓布施後不布施生那落迦何況誓與一切衆生無上菩提後不修行故正法攝經云善男子菩薩應當愛重諦實善男子正說諦實即正說法善男子云何實諦若諸菩薩先於無上正等菩提既發心已後捨其心於諸有情而行邪行此為菩薩最惡妄語海慧經云海慧譬如國王或王大臣先請城邑一切有情謂施飲食後復棄捨不辦飲食此為欺誑一切衆生彼由未能得飲食故譏訶而去海慧若有菩薩先為安慰一切有情未度者度未解者解未出者出未涅槃者令般涅槃後不求多聞亦不勤修所餘善品菩提分法如是菩薩非如言行欺誑天人及諸世間先曾見佛所有諸天見其如是輕笑譏毀先許祠施後能實行如是施主最為希有海慧若語欺誑天人阿修羅等一切世間菩薩不應說如是語受戒不護所有過患謂墮諸惡趣是極妄語欺誑諸佛菩薩一切世間為諸天人之所訶責由見如是勝利過患不捨發心當固誓願而受律儀燃燈論師此處不說勝利輕重從善男子乃至立堅固誓次續問云非為勝他耶非他勸受耶又諸先覺於前四句後亦加欲否而為徵問次更問云汝今受律儀非為勝他耶非自無主唯他勸耶於諸菩薩素怛纜藏摩怛履迦曾聽聞否解否信否能少護否答云略聞等未度等者跋縛跋陀羅釋云聲聞獨覺未度所知障令其度越大梵王等未解癡等二障繫縛令其解脫那落迦等未能出苦令其出苦有情未般無住涅槃安立涅槃庚二修集資糧論曰既作如是無倒請已偏袒右肩恭敬供養十方三世諸佛世尊已入大地得大智慧得大神力諸菩薩衆現前專念彼諸功德隨其所有功德因力生殷淨心或少淨心別解脫戒唯於僧衆起恭敬心即能獲得今此律儀勝出彼故先供一切諸佛菩薩次乃能得故欲受此律儀者當偏袒右肩對佛像前專念過去未來現在諸佛世尊及現住十方已入大地得甚深智獲廣大力諸菩薩衆不共功德皆由成就如是律儀之所獲得又此律儀要由最勝善淨意樂乃能生起故應至心隨自現在功用能力及宿因力發生殷重清淨信心或由彼等因緣之力生少淨心恭敬供養總謂先應灑掃地基善飾莊嚴供大師像及諸聖像猶如十方諸佛菩薩親現在前專念其德生殷重信迎請尊長坐獅子座如儀軌說當作佛想端嚴陳列衆多上妙花香燈燭師引弟子於三寶所及尊長所禮讚為先以曼達羅及諸供物恭敬供養庚三勸速授戒論曰有智有力勝菩薩所謙下恭敬膝輪據地或蹲跪坐對佛像前作如是請唯願大德或言長老或善男子哀愍授我菩薩淨戒次謙恭禮右膝據地或蹲跪坐作如是請若是在家稱善男子若是出家戒臘幼晚稱云具壽奘師譯長老若臘高邁稱云大德唯願哀愍授我菩薩淨戒律儀燃燈論師謂更請云唯願速授及三返請德光論師云論說善男子等三者顯非定須從出家前受及非唯從戒臘高前正受律儀智祥論師云咒及施等道苾芻從有智苾芻前受取非應從餘受此說苾芻若有苾芻可從正受上二律儀則不應從在家等受非說從餘受戒不生庚四修勝歡喜論曰如是請已專念一境長養淨心我今不久當得無盡無量無上大功德藏即隨思惟如是事義默然而住專念一境長養淨心謂我今不久當得無盡無量無上大福德藏隨思此義恭敬合掌默然而住庚五問障難論曰爾時有智有力菩薩於彼能行正行菩薩以無亂心若坐若立而作是言汝如是名善男子聽或法弟聽汝是菩薩不彼應答言是發菩提願未應答言已發有智授者或坐或立以無亂心於能受者作如是言汝如是名善男子聽或法弟聽汝是菩薩不發菩提願未彼應答是兩問之義謂令醒覺種性堪能堅固願心燃燈論師問難之後令生勇悍更續問云欲於我所受諸菩薩一切學處受諸菩薩諸淨戒否弟子亦應答言欲受後授律儀己二正行法論曰自此以後應作是言汝如是名善男子或法弟欲於我所受諸菩薩一切學處受諸菩薩一切淨戒謂律儀戒攝善法戒饒益有情戒如是學處如是淨戒過去一切菩薩已具未來一切菩薩當具普於十方現在一切菩薩今具於是學處於是淨戒過去一切菩薩已學未來一切菩薩當學現在一切菩薩今學汝能受不答言能受能授菩薩第二第三亦如是說能受菩薩第二第三亦如是答此羯磨文與藏文次第稍異又現在一切菩薩今學一句其上似缺普於十方四字校藏文及後無師羯摩文皆有之先善開曉受法文義當如是言汝如是名善男子過去一切菩薩所有學處所有淨戒未來一切菩薩所有學處所有淨戒普於十方現在一切菩薩所有學處所有淨戒於是學處於是淨戒過去一切菩薩已學未來一切菩薩當學普於十方現在一切菩薩今學菩薩所有一切學處菩薩所有一切淨戒謂律儀戒攝善法戒饒益有情戒從我受否如是三說一一皆同彼於一一皆當言受乃至三答言學處者謂所應修學之處言淨戒者謂於學處修學之自性又此文先顯三世菩薩共同修學次言於彼學習之相後總攝成三聚淨戒為所正受己三結行法分四庚初請證論曰能授菩薩作如是問乃至第三授淨戒已能受菩薩作如是答乃至第三受淨戒已能受菩薩不起於座能授菩薩對佛像前普於十方現住諸佛及諸菩薩恭敬供養頂禮雙足作如是白某名菩薩今已於我某菩薩所乃至三說受菩薩戒我某菩薩已為某名菩薩作證唯願十方無邊無際諸世界中諸佛菩薩第一真聖於現不現一切時處一切有情皆現覺者於此某名受戒菩薩亦為作證第二第三亦如是說此與藏文次第亦稍不同對佛像前普於十方現在一切諸佛菩薩頂禮雙足合掌白言某名菩薩今已於我某菩薩所乃至三說求受菩薩淨戒律儀我某菩薩已為某名菩薩作證正受菩薩淨戒律儀唯願十方無邊無際諸世界中第一真聖於諸不現一切時處一切有情皆現覺者亦為作證乃至三說又傳承中弟子不起自當勝解頂禮十方剎土之中佛菩薩足於一一方各禮三禮散華供養次立合掌先請存念云十方一切諸佛菩薩於我存念次請作證禮上下方者觀想上下向東西禮言不現者謂於我等於佛菩薩無不現見庚二讚揚勝利論曰如是受戒羯摩畢竟從此無間普於十方無邊無際諸世界中現住諸佛已入大地諸菩薩前法爾相現由此表示如是菩薩已受菩薩所受淨戒爾時十方諸佛菩薩於是菩薩法爾之相生起憶念由憶念故正智見轉由正智見如實覺知某世界中某名菩薩某菩薩所正受菩薩所受淨戒一切於此受戒菩薩如子如弟生親善意眷念憐愍由佛菩薩眷念憐愍令是菩薩希求善法倍復增長無有退減當知是名受菩薩戒啓白請證又曰如是菩薩所受律儀戒於餘一切所受律儀戒最勝無上無量無邊大功德藏之所隨逐第一最上善心意樂之所發起普能對治於一切有情一切種惡行一切別解脫律儀於此菩薩律儀戒百分不及一千分不及一數分不及一計分不及一算分不及一喻分不及一塢波尼殺曇分亦不及一攝受一切大功德故受戒羯摩圓滿無間普於十方無邊世界現住諸佛及入大地諸菩薩前法爾相現謂座動等由此令憶如是菩薩已受菩薩所受律儀其後遂於何處誰所誰受律儀生起憶念由憶念故正智見轉由正智見如實覺知某世界中某名菩薩某菩薩所正受菩薩淨戒律儀諸佛於此覺其如子菩薩於此覺其如弟生親善意眷念憐愍願無災難衆義成就由眷念故令此菩薩諸善增廣無有退減菩薩受此淨戒律儀於餘一切所受淨戒律儀有四殊勝最為殊勝一更無過上故名曰無上二攝集無量福德果故名為無量大福德藏之所隨逐三為欲利樂一切有情增上意樂所發起故名為第一善心意樂之所發起四普能對治一切有情三業所起一切惡行受別解脫律儀於此菩薩淨戒律儀所有福德百分千分數計算喻塢波尼殺曇分亦不及一庚三禮謝供養論曰如是已作受菩薩戒羯摩等事授受菩薩俱起供養普於十方無邊無際諸世界中諸佛菩薩頂禮雙足恭敬而退師徒俱起普於十方無邊無際諸世界中諸佛菩薩如前供養頂禮雙足庚四不應率爾宣說律儀論曰又諸菩薩於受菩薩戒律儀法雖已具足受持究竟而於謗毀菩薩藏者無信有情終不率爾宣示開悟所以者何為其聞已不能信解大無知障之所覆蔽便生誹謗由誹謗故如住菩薩淨戒律儀成就無量大功德藏彼誹謗者亦為無量大罪業藏之所隨逐乃至一切惡言惡見及惡思惟未永棄捨終不免離次當為說雖於受菩薩律儀儀軌持文解義然於憎恚謗菩薩藏不信不解諸有情所不應率爾不觀法器宣示其文開悟其義所以者何由彼聞已不能信解大無知障之所覆蔽謗為不善不淨無義猶如菩薩安住律儀成就無量大福德藏彼誹謗者乃至一切誹謗惡言意著惡見邪想現行諸惡思維未能一切一切永捨唯為無量大罪業障之所隨逐如燃燈論師將結行法攝為四類論中亦顯又此論師於請證後禮謝供養論則如上若最後供養乃為便易律儀二十頌攝彼義云隨力而供養敬禮佛菩薩住十方三世諸菩薩尸羅一切福德藏當以善意樂從有智有力住律尊長受爾時令善增諸佛及佛子善意恆於彼眷念如愛子初二句文表加行法次六句文說所受戒能受意樂及受戒境次後四句讚揚勝利表結行法戊二無師法論曰又諸菩薩欲受菩薩淨戒律儀若不會遇具足功德補特伽羅爾時應對如來像前自受菩薩淨戒律儀應如是受偏袒右肩右膝著地或蹲跪坐作如是言我如是名仰啓十方一切如來已入大地諸菩薩衆我今欲於十方世界佛菩薩所誓受一切菩薩學處誓受一切菩薩淨戒謂律儀戒攝善法戒饒益有情戒如是學處如是淨戒過去一切菩薩已具未來一切菩薩當具普於十方現在一切菩薩今具於是學處於是淨戒過去一切菩薩已學未來一切菩薩當學普於十方現在一切菩薩今學第二第三亦如是說說已應起所餘一切如前應知若不會遇如前所說具足功德補特伽羅爾時應對如來像前自受菩薩淨戒律儀偏袒右肩右膝著地或蹲跪坐作如是言我如是名仰啓十方一切如來已入大地諸菩薩衆菩薩所有一切學處菩薩所有一切淨戒謂律儀戒攝善法戒饒益有情戒過去一切菩薩已學未來一切菩薩當學普於十方現在一切菩薩今學於尊等前我亦誓受此羯摩文較奘師譯稍有簡略三說而起所餘一切如前應知謂所餘法同有師法諸釋論中於諸餘法取捨之理皆未詳說然問障難等及請作證囑令不應率爾宣說似可放置有師無師集經論釋說若有身命梵行障難近亦如無若無彼難縱遠處有亦當往求新疏中云先受失壞後還淨者及不恭敬欲受律儀不可依於無師之法當須依止有師之法其中後者若有尊長由不恭敬欲自受戒實不應理然還淨者舊疏中謂若有尊長從尊長受若無當依無師法受引菩薩地無師之法以為證成亦即無著菩薩意趣以於律儀還淨之時說不會遇具足功德補特伽羅故現在聖教最極衰微尤入大小乘門正受上下諸律儀已於自學處能多所作勤守護者猶如晨星別解脫戒密咒律儀初受戒法若無尊長無法能受受戒之境況云具足論經所說一切德相能於功德過失之中功德增上亦屬稀少菩薩律儀最初受時若未曾遇具相之師對佛像前以受戒法清淨正受能生圓滿德相之戒初得戒法即與其餘二戒不同故具慧者應於此戒善受善護隨自功能具大勇勢精勤修學寂天菩薩云我今世有果亦善得人身今生佛族中今成諸佛子此說若得如是律儀當思壽未空過獲得人身已取堅實入佛子數又云從今我定當作順種姓業此淨無過種不應令穢濁當發意志念我從今任作何事定不犯戒已釋受戒法丙三釋守護法分二丁初總明守護法二別釋今初論曰又此菩薩安住如是菩薩淨戒先自數數專諦思惟此是菩薩正所應作此非菩薩正所應作既思惟已然後為成正所作業當勤修學又應專勵聽聞菩薩素怛纜藏及以解釋即此菩薩素怛纜藏摩怛履迦隨其所聞當勤修學此段較藏文稍略又此菩薩安住所受菩薩淨戒應數觀察此是菩薩正所應作此非應作當先了知應進止處其後為成正所作業如所決擇即應如是守護勤學又當專勵聽聞菩薩素怛纜藏或此總攝素怛纜藏摩怛履迦以於素怛纜中宣說百千菩薩學處為成辦故如其所聞當勤修學集學論云菩薩律儀者方廣大乘說又云不捨善知識常閲諸契經說由此等方便守護不捨修習菩薩學處善知識者是為第一守護方便應當聽聞素怛纜藏尤應聽聞菩薩地及集學論若此不能定當聽聞戒品若於菩薩所應學處至極蒙昧則言大乘唯是虛名僅能誑惑諸愚夫輩若諸聰睿於大乘中廣大教曲所說修行獲定解者誰生歡喜又聽聞已於諸學處當勤修學莫效貧兒數他財寶集法句論云多說善語人放逸不實行如牧數他畜不得沙門分雖少說善語正行法隨法能離貪瞋癡此得沙門分入行論云此等應身行唯言說何益若唯誦藥方豈益諸病者若爾經中所出學處初發業者當學多少若佛親遮或雖未遮然初業時不能實行除此二外於餘一切菩薩學處若不修學當知有罪集學論云若為菩薩總所宣說然非能修或已遮止初業菩薩不應修學若非此二一切應學又除彼二遍學餘者有不能時亦無有罪即前論云若正勤修此一學處於餘學處未能守護亦無有罪如無盡慧經云若行施時於戒鈍捨乃至廣說然於此中不應故緩十地經說非於所餘不勤修學當隨力能如應而行又若學習此諸學處有犯無犯其理有二一者謂為引生一切有情一切喜樂及為止息一切憂苦若不三業至誠無諂精勤修行而便棄捨當知有犯乃至捨一剎那亦成違犯若雖勤修然不勤求順緣資糧及未勵力對治違緣如前棄捨亦名有犯若為對治大憂大苦不能忍受小憂小苦及為引發廣大義利不能捐棄微小義利剎那棄捨亦名有犯若諸學處非自能學而不修學此無違犯未曾於此制學處故無義利故若反於彼勉力勤學當知有犯又此罪犯總悔中攝即得還出不須別悔若諸學處是所能學而不勤學當知有罪論雖於此說名性罪似就故知犯罪而說二者犯罪之理總諸菩薩略有二犯一未觀察而行成犯二雖已觀察違其所應成犯未觀察而行成犯者若未隨力審諦觀察應不應理率爾發趣或是遮止或復棄捨當知有犯雖已觀察違其所應成犯者謂雖觀察應不應理然故違越應進應止及應捨者於彼倒行下至違越旃陀羅奴所譏笑事亦名有犯集學論總學處時作如是說又律儀二十頌略攝應作非所應作云隨於自及他雖苦若有利及利樂應作不作樂無利其中利者謂無染無罪於當來世感樂異熟樂謂樂受現前安樂究竟利益則於自他定應引發若現前苦究竟無利則於自他定不應為現前雖苦後有利益是所應作譬如遮止善士所呵所有惡行現前似苦猶如辛藥現似有損於病有益故當習近又邪欲行現前似樂然於當來能增多苦猶如甘美雜毒飲食必當遮止如菩薩地利益安樂種類自利利他時應當廣知
