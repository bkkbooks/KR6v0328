body:
  text: 宗喀巴大師造釋法尊譯丁二別釋分六戊初所斷罪犯二從犯護心之法三毀犯還出方便四說貪罪輕之密意五罪犯輕重之差別六樂住之因此中何身生幾類罪耶所依身者論中說云又一切處無違犯者謂若彼心增上狂亂若重苦受之所逼切若未曾受淨戒律儀當知一切皆無違犯謂須具二法一得戒未捨二意樂正住罪之類別唯有二種律儀二十頌舊疏云菩薩律儀罪唯二類一他勝處法攝二惡作法攝非如苾芻淨戒律儀有五類罪新疏與莊嚴能仁密意論亦說唯有二種罪體或名二部此論正義亦實如是故藏地人及黑行論師釋難中云菩薩律儀有他勝處窣堵羅罪諸惡作罪皆當防護說為三類不應道理若應理者中下纏犯應是粗罪然此論說中下纏罪為他勝法及惡作罪故中下纏犯體是惡作類為他勝譬如苾芻他勝罪中粗及惡作皆悉立為他勝類攝戊初所斷罪犯分二己初他勝類二惡作類初又分五庚初他勝自體二他勝所作三三纏差別四可還淨之殊異五捨戒因緣初又分二辛初此論所說二餘論所說今初論曰如是菩薩住戒律儀有其四種他勝處法何等為四以下論文與釋文同者即略其釋文未譯此中他勝略有二支壬初共二不共共者於纏犯時茲當廣說不共分四癸初論曰若諸菩薩為欲貪求利養恭敬自讚毀他是名第一他勝處法此文分三一說所對境二所說事三言說發起今初明境要依此境方成他勝故須異自相續能說解義與自同類之衆生論雖無文義實應爾二所說者謂自功德及他過失即是自讚毀他有德衆生恭敬之處三發起分四一貪求利敬之量二貪心之量三從誰得利養恭敬境之差別四觀察發起須否俱貪利養恭敬初利敬量中利養謂衣服飲食房舍車乘等隨一財利恭敬謂設床座等而為承事二貪心量非為供養三寶及悲貧窮為除貧苦而求利敬是於利養恭敬愛染為性增上貪求三境之差別求利之境非自共産若不爾者自讚毀他全無義故恭敬之境於自徒衆亦可希求故不須異産四觀發起心須否俱貪謂自讚毀他於利養恭敬隨一之事定須貪著然非須俱貪利養恭敬即由如是發起之心隨說自讚或言毀他他解義時皆成第一同他勝法言同他勝者義為類似他勝非真實他勝以上品纏違犯菩薩他勝處法可還出故下文詳明律儀二十頌新疏下稱新疏云他者謂具足功德是諸衆生恭敬之處傳說雲海釋下稱傳釋云他有德者義與前同虛空藏經與此論之別至下當說利養恭敬及貪著者新疏中云有所獲得故名利養謂衣食等善妙承事名曰恭敬若於此等增上貪著是名貪求傳釋亦云利養謂諸飲食衣服寶等恭敬謂敬重承事設床座等癸二論曰若諸菩薩現有資財性慳財故有苦有貧無依無怙正求財者來現在前不起哀憐而修惠捨正求法者來現在前性慳法故雖現有法而不給施是名第二他勝處法此中分四一求者二所求物三所從求境四由何意樂而不惠施初求者有釋論云有苦謂不具材物有貧謂乏無飲食無怙謂無養育者如家主等無依謂無諸親友能饒益者總謂匱乏二種資財除菩薩外現無餘人為除其苦彼由專意前來乞求傳釋中云求者現前二所求物者謂非刀等所不宜物及非毒等諸不淨物此亦是約有害之時三所從求境新疏中云有可施物及了解法謂自現有四不施意樂者謂慳吝所蔽決定不捨論文雖於不捨財中說無哀愍於不施法說由慳吝然新疏及傳釋俱於財法說慳故不施律儀二十頌論亦即如是取其密意極為善哉法尊按漢文性慳財故一句藏論為性貪著故故有此辨論藏師有云自定不捨猶非究竟要待求者斷其希望梵文論中皆無是說義亦不成癸三論曰若諸菩薩長養如是種類忿纏由是因緣不唯發起粗言便息由忿蔽故加以手足塊石刀杖捶打傷害損惱有情內懷猛利忿恨意樂有所違犯他來諫謝不受不忍不捨怨結是名第三他勝處法此中分二第一捶打有二一意樂二加行初意樂者謂菩薩於他發忿粗言唯以粗言忿猶不捨而更長養為忿所蔽二加行者由忿增上若以自身若身所擲若身所持捶打於他若禁閉等而為傷害若以鞭撻及繫縛等而為損惱此境有情為係何趣雖無文明似須同趣能解義者是粗惡語言說境故集學論說捶打犯戒是根本罪故第二不受諫謝分四一行諫謝人二行諫謝法三不受發起四不受自性初行諫謝人者新疏及最勝子釋云先作侵犯悔謝其罪謂於菩薩先為侵犯現前至心欲求悔謝二行諫謝法者謂順時順法求其忍恕三不受發起者謂於先侵犯內懷猛利忿恨意樂四不受自性者謂不聽其語不受忍恕亦不棄捨忿恨之心癸四論曰若諸菩薩謗菩薩藏愛樂宣說開示建立相似正法於相似法或自信解或隨他轉是名第四他勝處法此中分二第一謗大乘有二一所謗事謂總開示甚深廣大菩薩法藏二誹謗之理如下所說而為誹謗二宣說相似法分二一所說事諸餘釋論皆未明說唯傳釋云或小乘法或外道法然論是說相似正法非是說為相似大乘故是一切隨順黑法二宣說之理謂自於此法深生愛樂為他宣說又將他人安立其見總攝此義律儀二十頌云謂由猛利惑失壞戒律儀其罪有四種意同他勝處由貪利敬故自讚而毀他於有苦無怙慳不捨財法由忿不受他諫謝而打他謗毀於大乘宣說相似法猛利惑者謂上品纏言其罪者謂具律儀菩薩之罪覺賢論師云由犯他勝失壞律儀故名他勝唯就同是失律儀因名同他勝非一切捨非如苾芻犯他勝己無可重受此可重故雲海論師云如諸聲聞由淫貪故俱壞自他無苾芻分如是菩薩由其愛著利養恭敬俱壞自他又如聲聞由貪著故盜他財物而成他勝此有財法若不惠施而成他勝聲聞殺人而成他勝此於有情起忿惱心以手足等而行損害及他侵犯不受諫謝是為他勝聲聞實無妄說得法而成他勝此有不說毀謗正法開示非法而成他勝諸餘釋說與別解脫他勝處罪數量發起皆相同故名同他勝又此他勝有說唯四分八非理論說四種他勝處法頌亦說為其罪有四種故若如此說則一一他勝皆俱二法謂讚毀等藏師有云其讚毀等一一別分皆成他勝故成八種更加別解脫四種他勝共為十二若貪利養自讚毀他尚犯他勝何況行淫謂此即是雲海所許然菩薩地釋中全無斯語傳釋雖說若尚不犯貪求利養及恭敬等定不違犯淫欲等四此顯能護別解脫中諸他勝罪並未說彼即是菩薩他勝罪故無一經論可資佐證純屬臆造言四他勝是約意樂謂於利敬而起貪求於諸資財而起慳吝於諸有情起損惱心於諸正法邪行愚癡為四他勝分為八者是約加行謂若自讚毀咨於他不與正法不施財寶捶打有情不受諫謝毀謗正法說相似法皆是他勝故雖說四無害於八如莊嚴能仁密意論云菩薩藏中說有四種根本重罪又說自讚及毀他等四罪各二共為八種此論亦將讚毀等八別別宣說雲海論師於第二他勝處時謂若不施貧苦求者或不施法是他勝處各別分說皆為他勝以此正理於餘三罪亦應爾故無畏論師亦說為八集經論釋云無著菩薩顯然說為八種他勝燃燈智所傳諸先覺亦許為八故當分為八種他勝又集學論及律儀二十頌於第三他勝罪時雖似攝為一然是翻譯之別義實為二律儀二十頌舊疏中文與菩薩地同慧生論師入行論釋中引集學論文亦為由忿打有情若勤求歡喜不忍恕有情若各別分亦成他勝頌說不施於求法不施於求財他罵報罵等棄捨他謝悔毀謗大乘法勤非勤外論精勤復愛樂為惡作罪則為相違答曰無過不施財法他勝處中須以慳吝為發起心二惡作申非以慳吝為發起故新疏於不施法如是釋已次云餘亦由其發起不同而有差別他打報打是為報打他勝之打非待報故惡作之中不受謝悔非由忿恨他勝由恨毀謗大乘他勝惡作之差別如傳釋云若爾與前謗菩薩藏有何差別答前謗一切大乘法藏此於經藏甚深一分不能信解而興誹謗然非唯須毀謗甚深論文自顯勤學外論二惡作中前謂現有佛語可勤修學而不勤學反勤外論是以成犯後謂若諸利根無動覺者常以二分勤學佛語兼勤外論是所聽許未許於彼愛樂而轉故若愛樂犯惡作罪他勝罪中開示建立相似正法者非唯自樂謂自愛樂而更修習又安立他亦令修習如雲海論師云說非正法犯他勝罪言愛樂者是自欲樂如其愛樂亦為他說故名宣說言建立者是令他人修行趣入若爾自讚而毀他云何說為惡作罪耶答此亦由其發起不同至後當說唯應如是斷相違過無慚愧等不能判別設有慚愧縱非他勝亦成隨一中下纏犯故不應理辛二餘論所說集學論中諸根本罪覺賢論師對於虛空藏經所說諸根本罪成立彼等非根本罪破其是根本罪其能立者謂彼諸罪非是能壞所得律儀緣故即彼經云若剎帝利種灌頂大王犯根本罪往昔所種一切善根皆當失壞從人天樂為他所勝當生惡趣此是說斷絶未受戒前所種善根人天樂事其能破者謂受戒已若此諸罪是能失壞律儀之緣則是他勝爾時具足律儀菩薩於此他勝隨犯一種即捨律儀況犯一切則菩薩藏摩怛履迦菩薩地中理當宣說然未說故又為剎帝利種說五根本罪為初發業者說八根本罪若由剎帝利種律儀有別則根本罪亦有異者全非正理此說意謂若彼經文如言取義剎帝利五於初發業應非根本罪初發業八於剎帝利亦應非根本罪然此非理以戒律儀無差別故此上覺賢論師義為第一說下尚有三說後依次漸破無畏論師於虛空藏經與菩薩地根本罪不同斷相違過時說由補特伽羅中下上別說五八四此廣顯示罪之差別又說然於一補特伽羅餘亦犯罪謂於剎帝利種說五罪是依中根補特伽羅於初發業說入罪是依下根補特伽羅菩薩地中說四罪是依上根補特伽羅然於一一補特伽羅亦許立餘諸根本罪次說菩薩地之四罪能攝一切文繁義鮮略而不譯此為第二說藏人有云各各經意是對各各所化之機故當依各別受法若以集學論及入行論受法受戒虛空藏經所說為根本罪若以菩薩地受法而受則菩薩地所說諸罪為根本罪此為第三說又有說者謂以中觀宗與唯識宗宗派異故而成差別此為第四說初新疏宗未見應理與解經義堪為定量寂天之宗成相違故謂寂天論師先立外難其剎帝利與初發業為有為無菩薩律儀若言有者剎帝利五初發業八各別決定不應道理若言無者為彼制罪不應道理又彼諸罪云何得成有律儀者所犯重罪次答彼云依彼易犯故名彼罪為令於罪生怖畏故實於一切皆成罪犯互當斷除此論又說最重性罪令諸未受戒者尚斷善根全無戒分有律儀者尤為重大故說能斷未受戒前所有善根而不壞律儀極為相違又凡是根本罪菩薩地中非能俱說若謂不說則諸菩薩修學學處執唯四種根本罪犯而正修學由餘根本罪壞律儀時自尚未知有不了知守護界過若爾非根本罪則菩薩地亦應說云非根本罪而為斷疑以於非根本罪執為根本罪律儀未壞亦執為壞亦不了知守護界故虛空藏經所說諸罪菩薩地中未全宣說菩薩地中所說惡作集學論中亦未宣說故於彼中非定須說一切學處故菩薩地與集學論俱說須閲素怛纜藏此上破第一說無畏論師許集學論所說為根本罪雖屬善哉然以菩薩地所說四罪攝盡一切多不可憑略去破文此是破第二說藏人所許者集學論中酬答前問若具律儀諸罪各別不應理時亦善破訖此破第三說集經論釋說王五罪非根本罪初業八罪是根本罪及說龍猛無著菩薩二宗不同與集學論互糅諸罪有相違過故當棄捨此上破第四說以下自宗故經所說諸根本罪寂天論師解經義時亦釋為根本罪尤其總攝虛空藏經及菩薩地二義合說唯此應理故當糅合二宗集學論舊譯云為易受持諸根本罪及一類許當說攝頌新譯云為欲安住一類宗故當說攝頌如舊譯者顯然攝集二宗之義若如後譯言一類者謂無著菩薩安住其宗者謂安立故又入行論廣釋亦說為根本罪善天釋亦云先當觀閲虛空藏經應當觀察諸根本罪能壞律儀諸根本罪虛空藏經多所宣說故當觀彼解脫月釋云根本罪者能壞律儀應當觀閲虛空藏經遍照護釋亦同此說故定當許為根本罪集菩薩學論攝諸根本罪頌云劫奪三寶物說為他勝罪若毀謗正法佛說為第二雖犯戒苾芻奪袈裟捶打若令入獄禁及降其出家造作五無間執持邪倒見毀壞聚落等佛說為本罪於未淨修心有情說空法已入佛乘者遮止大菩提令捨別解脫安立於大乘執謂有學乘不能斷貪等亦令他受持讚說自功德為利養恭敬讚頌而毀他謂我得甚深而倒說妄語令治罰沙門施與三寶物及受其施與令捨奢摩他正住諸財寶惠施讀誦者此諸根本罪是大地獄因對虛空藏前夢中當悔除棄捨菩提心不忍慳貪故不施諸求者若勤求歡喜不忍恕有情由忿打有情由惑及順他宣說相似法初他勝謂不與取三寶物他勝此中分六一物主經中唯云若塔若僧若四方僧言塔雙顯佛及佛法故為三寶此中佛者謂佛如來或形像等法謂教法或證正法言若僧者謂有簡別四方僧者謂無簡別又若異生須四苾芻若是聖者一補特伽羅亦名僧伽言三寶者不可執如餘論所說謂實如來無漏滅道諸聖有學以說塔廟及四方僧故又云或奪塔物或奪施僧及四方僧此顯物主非定須三寶隨一即犯二所取物經無明文故田舍等處所及飲食乘等隨一資具物量大小亦無明文義亦難定當如何量成不與取業道即以彼量為下邊際墮資具數又云施僧故隨物主攝未攝持犯罪皆同由其回施三寶隨一即彼為主三能盜人盜僧物時要須自未墮彼僧數四意樂分二一想若發起心有差別者須不錯亂若無差別猶預以上須無錯亂盜有錯誤不成業道是不與取總教義故二發起心謂三寶物非自能主欲令離彼若以悲愍等心為利他故而行奪取如下所說有無犯時雖他律儀諸根本罪於餘律儀容有開許然此律儀諸根本罪即於此律定無開許故此要為自奪或以染污心而為發起有說須貪然不決定五加行經云自奪或教他奪故若自作及教他作皆成違犯又若暗竊或以力奪亦皆成犯如舊譯云竊奪三寶物六不與取量謂起得心此中奪佛物等有三他勝第二他勝謂誹謗正法他勝此中分二一所謗之正法經云或說聲聞出離或說獨覺出離或說大乘出離若自毀謗若令他滅是名第二根本重罪言或者謂顯隨一隨謗三乘相應之經又毀謗大乘法時說謗甚深或廣大神力一分大乘犯惡作罪而菩薩地與此論說謗大乘是他勝罪故此之大乘要雙宣說甚深廣大二分之經如是聲聞出離謂說四諦獨覺出離謂說十二緣起小乘法藏若謗一分小乘義亦犯惡作如謗大乘若作是念謗一分大乘經義犯惡作罪謗聲聞獨覺出離犯他勝罪不應正理以謗前者較謗後者罪尤重故答曰無過隨於上下任何律儀皆不定依罪重罪輕制重制輕如別解脫戒殺平常人制為他勝出佛身血說為粗罪又大乘戒若不與取在家之財未制他勝以慳吝心於有苦求者不施己財制他勝罪二毀謗之理集學論及集經論所引經文為毀謗令滅然經原文為毀謗滅除菩薩地中唯自謗大乘無令他謗由許此二義同故令他謗非必須支自毀謗者謂謗非如來說若爾毀謗聲聞乘犯惡作罪有相違過答彼僅輕蔑非如是謗後當廣說此有謗大乘等三他勝罪第三他勝謂損害出家他勝此中分二一所害境經云隨佛出家或受學處或未受學處或犯尸羅或具尸羅頌中亦有雖字故言犯戒苾芻唯是一例二如何損害分二一發起謂於彼境損害意樂即雜染心二加行謂奪袈裟逼令還俗降其出家隨行一事又說捶打禁閉令捨命根犯他勝者是捶打傷害損惱他勝所攝又奪袈裟物主是出家有律儀者須未滿足四苾芻數若滿四數則是第一根本罪攝此有奪取袈裟及逼降出家二他勝罪第四他勝謂作無間罪他勝有弒父母及阿羅漢破和合僧出佛身血五種無間根本重罪又除破僧其餘四罪是菩薩地第五他勝所攝第五他勝謂持邪見他勝謗無黑白業果前生後世略起此見即斷善根故受行十不善及教他受行非定須之支第六他勝謂壞處所他勝此中分二一所壞處所謂村城邑國四中隨一二能壞中一發起謂以染污心壞彼意樂二加行謂隨以何種摧壞方便而行摧壞又集經論引前五罪為國王罪及以第六而為第二無間以前為大臣五罪經文亦爾若壞村等中有情之根本罪是捶打等他勝所攝若壞其中所有財産之根本罪則為第一或第十三他勝罪攝故此是壞處所有壞村等四根本罪第七他勝謂對非法器者說甚深法他勝此中分三一說所對境謂有未善修心之有情已發大菩提心若為說空返生恐怖二所說法謂離一切戲論之空性三說已如何謂聞說空性深生恐怖退失大菩提心發起小乘之心此約自未審觀法器若已觀察自覺彼人堪為法器然實非器則無他勝第八他勝謂遮止大乘他勝此中分二一所遮境謂已趣佛者即是已發大菩提心入大乘人二遮止之相謂遮止云汝不能行六到彼岸不能成佛當發聲聞獨覺乘心速脫生死此唯遮止即便犯耶抑須退耶答如入行論大疏說若遮無上正等菩提令他發起小乘之心是名第二似須退捨此言第二及下戒之第三者是就初發心八條之第二第三也第九他勝謂謗別解脫他勝此中分二一所對境謂如理修學別解脫調伏二令了解之相謂云何用淨護調伏尸羅當發大菩提心誦大乘經則由煩惱所作三業一切惡行皆得清淨是說發心及誦大乘即能清淨舊譯雖云遮止別解脫及發心令讀大乘然新譯文及虛空藏經所說正確入行論大疏亦云令捨別解脫律說唯發大乘心讀大乘經便得清淨是名第三何故下說若諸菩薩遮聲聞乘不應修學犯惡作罪耶答惡作罪者唯令了解他勝罪中如其遮止要他棄捨第十他勝謂謗聲聞乘他勝此中分二一所謗境謂有學者乘言學者乘即聲聞乘然亦通獨覺乘故謗二乘隨一或總謗二二毀謗之相謂實心謗云隨於小乘如何修學終不能盡煩惱邊際或謂不能無餘永斷經中雖云汝莫聽聞聲聞乘法莫為他說當棄彼法又云唯當信解大乘法教然非必須之支以經又說如是說時若他聞已信受其見其境亦犯根本罪故故頌文亦令他持非必須之支如此戒說其境亦犯根本重罪如是於前第七第八戒時其境若有菩薩律儀亦犯捨菩提心根本重罪下當廣說然非彼戒根本罪數又此他勝與第二謗二乘他勝亦有差別前為謗教此是謗證又前謗為非如來說此則謗為不能永斷三有根本故亦不能出離生死第十一他勝謂自讚毀他他勝此中分四一對說之境集學論引經云於敬彼者前亦由嫉妬故而自稱讚亦字義顯非唯須對所毀之境自讚毀他或對所毀補特伽羅或對信敬所毀處者別譯經中雖無敬彼之文義定應有二所說事謂自功德及他惡名三宣說之相謂為求利養恭敬名稱讀誦宣說大乘經典而行兩舌謂我不顧利養恭敬是大乘人餘則不爾總說上人法自稱讚者須除下戒說上人法此與前二戒皆是自讚四發起心謂由貪著利養恭敬增上力故嫉妬他得利養恭敬經說由其嫉妬而說寂天論師引菩薩地他勝罪時未引初罪意謂同此他勝故菩薩地義當如此戒而釋然就菩薩地文則此戒中猶未能攝似尚須引菩薩地文又讚毀別分及貪利養恭敬隨一皆成違犯義同前說又此讚毀為實為虛耶答經略標時謂行兩舌後攝義時謂由虛妄因緣成大重罪傳釋云實無功德過失說其德失新譯論云讚者謂以正非正德而自稱讚邪妄稱讚就前句文似顯真妄同犯然依後句文則前句義為勝劣功德後句義顯虛妄宣說第十二他勝謂妄說上人法他勝此中分二一對說之境謂能解義補特伽羅二宣說之相謂告彼云此是我證由悲愍故為汝宣說汝亦應當如是修習現證此空與我無異此謂實無如是證德除嫉妬心由餘染污意樂說虛妄語他解義時而成違犯若苾芻身具菩薩律則於同時犯二他勝入行論大疏說若說唯由讀誦能證深法亦勸令他如是受持是根本罪此與經相違第十三他勝謂取三寶物他勝此謂輔臣依仗王勢苛罰沙門既苛罰已令諸沙門盜取補特伽羅物或僧伽物或四方僧物或塔廟物稅交彼等彼等受已轉呈於王王臣俱犯根本重罪其治罰沙門根本罪攝於第三根本罪取三寶物根本罪攝於初罪故今此罪謂取一苾芻或二或三補特伽羅所有財物是其差別餘如前說第十四他勝謂立惡制等他勝此中分二初立惡制一制所對境謂諸如法正行苾芻二安立何制謂於彼等懷損惱心安立惡制令捨隨順止觀作意增長煩惱二不與取修定資財分四一物主謂勤修斷苾芻又此物主若是聖人或滿僧數則成第一根本重罪故非聖人並不滿四二財物謂彼苾芻隨一資財三意樂謂憎彼意樂四加行者謂不與取彼等財物施讀誦者經說彼二俱犯根本重罪言彼二者謂剎帝利及說修斷者惡名之苾芻有說其讀誦者犯根本罪與經相違言此諸者加於後八罪經說此八為初發業者之罪大地獄者謂罪過患夢者謂出罪方便當觀集學論犯根本罪豈非如云應重受律儀由此悔除云何能出答由此悔除雖如經說能免惡趣然還戒時則須重受律儀集學論引善巧方便經說犯根本罪猶可還淨如彼應知此處不說又有異門謂此諸罪共支分中上品纏犯若有所缺則是他勝所攝中下纏犯顯彼由悔除便能還出下當廣說棄捨菩提心者謂捨願心善巧方便經說此是根本罪犯罪之身要有菩薩律儀故捨此心第一剎那猶有律儀第二剎那律儀乃捨非最初捨時便非菩薩於生邪見亦如是知故此二罪初生即犯根本重罪不待共支上品纏犯餘須觀待下當廣說不忍慳貪故等兩句顯於求者不施財法若勤求等三句並翻譯之差別如前已說由惑及隨他一句莊嚴能仁密意論中引文譯為由惑由隨他此說較善菩薩地亦說於相似法或自信解或隨他轉故若加為由惑宣說相似法者顯由自內非理作意故加為由隨他宣說相似法者是隨他轉故庚二他勝所作或過患論曰如是名為菩薩四種他勝處法菩薩於四他勝處法隨犯一種況犯一切不復堪能於現法中增長攝受菩薩廣大菩提資糧不復堪能於現法中意樂清淨是即名為相似菩薩非真菩薩德光論師云言攝受者謂令引發言增長者謂令增盛餘論釋為更無勢力能集大地相近資糧意樂清淨者一切釋論皆謂得地即得初地總之隨犯一種他勝處罪即於現生決定不能證入初地即近初地廣大資糧先已有者不能增長其先無者不能引發況數違犯故不應思犯他勝處仍可重受菩薩律儀當寧捨命定不違犯根本重罪如入行論云如是強罪犯與強菩提心迭次而雜起得地甚遙遠言四他勝者唯就此論所說然集學論所說他勝作業亦同虛空藏經亦說過患如云已入大乘初發業者誤犯如是諸根本罪摧壞夙植一切善根為他所勝退失人天及大乘樂墮諸惡趣於長夜中馳騁生死離善知識庚三三纏差別論曰菩薩若用軟中品纏毀犯四種他勝處法不捨菩薩淨戒律儀上品纏犯即名為捨若諸菩薩毀犯四種他勝處法數數現行都無慚愧深生愛樂見是功德當知說名上品纏犯由何纏犯不名為捨由何纏犯而名為捨謂由軟品及中品纏毀犯四種他勝處法不捨所受淨戒律儀若用上品纏犯即捨他勝處者如前所說就意樂門攝之為四就加行門開之為八謂貪利養恭敬等此八是喻集學論中所說諸罪若不具足上品纏犯理亦非犯他勝處法以謗大乘罪重於無間及貪利敬自讚毀他此論皆說若不具足上品纏犯非他勝故餘亦應爾然生邪見及捨菩提心略生即犯不須具足上品纏犯如前已說故虛空藏經所說諸罪若未具足上品纏犯應知亦是軟中纏犯以此論說他勝罪中諸未能成他勝處者則為下品中品纏故又明上品纏時論說毀犯四種他勝處法數數現行都無慚愧深生愛樂見為功德當知說名上品纏犯此有四支初支謂從毀犯乃至現行言四種者如釋論說非須四種全犯隨犯一種數數現行者藏人有說為犯兩次有就加行正行結尾三事完足然諸釋論全無斯說義亦非爾故應棄捨故謂現行一種犯他勝緣後於彼緣仍欲現行即是數數現行之義如新疏云猛利煩惱謂諸纏犯後仍現行不欲斷絶都不發生微少慚愧傳釋亦云或此四種或四隨一後後輾轉仍欲現行雲海論師及最勝子云由無間斷現行此諸他勝處法便能失壞一切慚愧故云都無此顯數數現行是能失壞慚愧之因義同前二有釋說為不過一時下當廣說第二支謂都無慚愧其慚愧者如菩薩地云菩薩將欲現行罪時若能了知非我應作羞恥名慚又即於此恐他呵責羞恥名愧此二所緣謂自惡行相為羞恥其差別者念此非是我所應作以自為緣羞恥名慚若恐他呵以他為緣羞恥名愧今此二法況中上品即下品者都不生起為於何事而不生耶謂於毀犯他勝之惡行犯他勝處說此二法要全不生倘生少分慚愧隨一即非他勝若爾此二生與不生其時云何謂生能犯他勝之惡行有說是在一時之內然不應理下當廣說第三支謂深生愛樂雲海論師及最勝子云由無慚愧令生愛樂此說若於何事不生慚愧由此惡行令生愛樂或即由其無慚無愧令於彼事深生愛樂如傳釋云即由無慚無愧能生愛樂謂於惡行僅無慚愧猶非完足更以此事令意愛樂言愛樂者雲海論師及最勝子說行彼惡行而不斷除又諸支中以前為基而添後支若後不全仍不圓滿上品纏犯所有支分若謂無不斷除即便斷除若能斷除即生慚愧則亦缺第二支答此不斷者非說深見過患而不斷除是如德光論師云愛謂意樂至心歡喜樂謂加行安住其事愛謂愛其惡行樂謂樂其惡行方便似與此論意趣隨順若爾則與數數現行有重復失謂於後行轉生欲樂答無重復過前為希欲後是樂著此二心所各別異故第四支謂見為功德雲海論師與最勝子釋此義云於彼惡行不見過患設作是念若見過患何能不生羞恥之心何能于彼生愛樂耶答云無違見過患是慚愧之因非慚愧體故又雖見過患愛樂而轉者如具戒人行欲邪行又傳釋中解愛樂義亦同前說唯換愛為樂德光論師云若即於此他勝處法覺為功德是名見為功德此非說於他勝處法執為無過如云欲塵是意所欲而不視為非非所欲品故諸釋論同一意趣又集經論釋說數數現行是乃至一時要無間斷次諸先覺多釋此義謂於一時中不生慚愧不由慚愧令其間斷若自讚等須同類無間太為過失又一時者如塢波離問經云若諸菩薩上午犯罪乃至日中安住不捨大菩提心其戒無邊如是日中犯罪以至下午下午犯罪以至初夜初夜犯罪以至中夜中夜犯罪以至後夜若未捨離大菩提心其戒無邊義中亦有後夜犯罪以至上午是晝三分夜間三分總一晝夜共為六分初且非理數數現行與都無慚愧則成一義論文別說二支故成相違又於此論未說之支更添一時則菩薩地上品纏犯支非圓滿又若他人隨意可添則更可加衆多支分成無窮過後時間建立亦非經義即彼經云塢波離云何菩薩正行大乘所有學處容可還出諸聲聞乘所有學處不可還出耶塢波離此中菩薩正行大乘設若上午有所毀犯至日中時安住不捨一切智心則諸菩薩正行大乘所有戒蘊非為永盡設若以下日中與下午下午與初夜初夜與中夜中夜與後夜如上說已次云塢波離如是菩薩正行大乘所有學處容可還出是故菩薩不應於彼深生惡作深生憂悔塢波離若聲聞乘人數數違犯當知聲聞乘人戒蘊失壞最極失壞悉皆永盡所以者何以聲聞乘人為欲斷除諸煩惱故如救頭然由是因緣聲聞乘人欲求涅槃增上意樂之學處不可還出此說上午犯罪是犯根本罪故云何知是根本罪耶是答大乘與聲聞學處可否還出又彼經攝義云由是菩薩學處容可還淨又云聲聞乘人違犯諸罪不可還淨亦可證知以除根本罪聲聞亦說餘罪可還淨故非是菩薩殊勝特法若謂此不應理犯根本罪而云戒蘊非為永盡成相違過以戒盡是失壞義故答云無過集學論引彼經文譯為戒蘊無邊際義謂菩薩身中之戒若犯根本罪不可重受即為有邊唯爾便盡由可重受故為無邊又經縱說一時然亦非理如許一時者謂於一時之內發生對治經說上午犯罪以至日中此二時分各別異故又此論是說有無慚愧及觀不觀過患經文則說不離願心故若爾云何道炬論釋云六時共為十八分上午時中有三分初二分中若犯罪後分不忘菩提心仍不失其為菩薩後五應知亦如是答此文前云遠離惡友具時分是顯受菩薩戒修道弟子之相言具時分者謂六時中於初二分有所違犯於後分中要能念菩提心而修還淨未能爾者且是退失下根菩薩還出之軌後文又云上士初分能還淨中士還淨於二分後分還淨為下士又非唯爾更說六九五十四種謂上上士於初剎那上中於二上下於三而能還淨然此是說還出之軌非說他勝所待時分若犯根本罪仍可還淨之戒為菩薩律儀耶抑為菩薩身中別解脫戒耶初者則於還淨說須不離願心不應道理雖捨本願後重發心受菩薩律亦能生故後者大小乘經多說毀犯別解脫戒他勝處罪後雖重受亦不能生如先之戒故又加離不離願心之簡別亦非理故答寂天菩薩引此經文證菩提心能淨罪之力謂此經義顯示雖犯根本重罪若不捨願心律可還淨雖犯根本罪能障戒重生然由未離菩提心之力能遮彼障故可證知是別解脫戒以菩薩戒雖捨願心後還生故又如前引入行論於捨菩提心過患之時說有力罪犯與有力菩提心間雜現行離得大地極為遙遠言有力罪犯者謂棄捨願心論云此於諸菩薩罪中最為重言彼與有力願心間雜起者謂犯彼罪已仍發有力願心若還發心無不復生律儀之理故塢波離問經云云何名為聲聞乘人別解脫律儀云何名為獨覺乘人別解脫律儀云何名為菩薩正行大乘別解脫律儀是問菩薩別解脫律儀非問菩薩律儀故答大乘與小乘補特伽羅之別解脫云當說菩薩學處容可還淨聲聞學處不可還淨前引經文即釋此故何故不捨願心容可還淨已捨願心不可還淨有如是差別耶答若凡具足別解脫戒者犯根本罪皆可還淨則無差別然實不爾謂菩薩具足別解脫戒若犯別解脫根本重罪犯罪無間能不捨離先所發心乃可重受雖是菩薩若犯根本罪加行究竟捨所發心則不堪重受倘堪重受則小乘人亦應堪受太為過失言上午者謂從明相出至日未午言日中者是顯犯罪無間之界若犯根本罪而能不捨願心由此心力雖犯根本罪然彼犯罪障礙重生律儀之力未能生起若捨願心則無能遮犯罪力者故不可還淨又於未犯根本罪前先捨願心亦不可還淨故於犯罪無間須未捨願心即先已發未離未捨故經密意說云若能不捨非說爾時若不發心善巧方便經云善男子若諸菩薩方便善巧設由惡友增上力故有違犯時應如是學作是思惟若我此蘊永般涅槃則令我心悉皆憂惱為欲成熟一切有情我當擐甲盡未來際安住生死不應我自逼惱其心我應如如流轉生死如是如是成熟有情此罪亦應如法還淨後不更犯善男子出家菩薩縱犯一切四根本罪由是思惟以此方便善巧除遣我說菩薩非為違犯故犯罪之身要是菩薩若先於餘身犯根本罪後為菩薩亦不可重受別解脫戒上二經文皆說菩薩身中別解脫故頗有誤解此義謂大乘宗之別解脫戒雖犯他勝後可重受得戒同前是妄執大乘宗與大乘人為一成大錯謬又塢波離問經於大小乘別解脫之差別時說三差別一護不護隨他心轉二可不可還淨三常時隨轉及有邊際有說後義謂菩薩身之別解脫戒死後不捨為常隨轉者不應道理以彼經說菩薩不應善根成熟一生盡斷一切煩惱應漸斷除聲聞則以善根成熟如救頭然不願剎那更生三有為常隨轉與有邊際之義故是於三有中受不受生旁論已了今當說正義設作是念上品纏中其所無者要都無慚愧及不見過患之二其應有者須後欲現行及深生愛樂之二其所無二者為應從何時至何時無所有二者亦應從何時至何時有耶答所無二者謂從發趣乃至正行圓滿恆須不起於此中間若慚若愧若見過患隨一現行上品纏犯即不圓滿如是應有之二亦於彼時現起乃至正行未滿以來意須不更厭捨其事非須彼心同類現行太過失故云何應知中下纏犯答雲海論師德光論師最勝子論師律儀二十頌舊疏等皆未宣說唯傳釋中說二宗義一自宗者謂隨順趣向臨入煩惱初為暫生次為生己心趣煩惱後為煩惱勢力增上以為軟中上纏二他宗者謂就三毒軟中上品如寶雲經此論全無前說之義後說於此亦不契合又律儀二十頌新疏於四支上更加他諫而不棄捨完具五支為上品纏他諫即捨為中品纏不待他諫自能速捨為下品纏亦不應理若諸釋論皆許添支則支數量不決定故若爾云何答無著論師僅說三纏有其差別又三纏犯亦須認識若不識者則不了知何對三人何對一人悔罪差別故又於餘處亦未詳說故知是於上品纏中而能了解其深生愛樂後欲現行與不見過患顯見後者煩惱粗重雖有前者然見過患亦能生羞恥若全不見過患決定無生羞恥處故又見過患雖不決定生慚愧心然不見過患則慚愧心定不生故以是上品纏犯支不具時若見過患雖餘三支皆悉完備應知仍是下品纏犯若不見過患當知即是中品纏犯不見過患定無慚愧若有慚愧定見過患故此二支不須別數
