body:
  text: 宗喀巴大師造釋法尊譯庚四可還淨之殊異論曰非諸菩薩暫一現行他勝處法便捨菩薩淨戒律儀如諸苾芻犯他勝法即便棄捨別解脫戒若諸菩薩由此毀犯棄捨菩薩淨戒律儀於現法中堪任更受非不堪任如苾芻住別解脫戒犯他勝法於現法中不任更受言諸菩薩暫一現行他勝處法非即棄捨菩薩律儀者義為不同捨別解脫前文自云如諸苾芻犯他勝法即便棄捨別解脫戒藏文此段在非諸菩薩等之前故云前文是說不同別解脫戒犯他勝法捨已重受不能復生有說犯一次他勝處法猶不捨戒要犯數次乃捨戒者非此論義故論又云若諸菩薩由此毀犯棄捨淨戒於現法中堪任更受非如苾芻犯他勝法不堪更受設作是念犯別解脫他勝處法若無覆心捨棄先戒更重新受豈非亦說是近圓耶何故說彼無所重受答有部說彼若無覆心不成他勝一切他勝皆須覆心若如此說則可直云無所重受此中意趣小乘之身如前已說有說無覆亦名他勝然亦不同菩薩律儀容可重受以菩薩重受能生清淨律儀小乘重受不生清淨苾芻律儀故觀待身境可說為近圓與非近圓故若爾別解脫戒不可還淨菩薩律儀犯他勝法仍可還淨其理云何答雲海論師云諸聲聞人別解脫律儀為一切善法所依處故名根本律儀若斷此者現行無慚無愧由壞慚愧故於現法不復堪任更受律儀菩薩不爾故於現法雖已棄捨菩薩律儀然於現法堪任更受此未失壞慚愧心故此說犯別解脫他勝處法能壞慚愧毀犯菩薩律儀不壞慚愧而為因相又壞慚愧之理謂別解脫是一切善法所依處故最勝子論師與傳釋中亦作是說然於此說若更問云犯別解脫他勝法者受菩薩戒為生不生實難酬答自宗則如前引鄔波離問經於聲聞乘人犯他勝法彼之淨戒永盡之理時謂聲聞乘人為斷一切諸煩惱故如救頭然由是因緣聲聞學處不可還淨善巧方便經亦說此蘊永般涅槃令心煩惱當如是釋又別解脫通大小乘故大小乘皆有別解脫戒然制別解脫正為小乘補特伽羅以小乘人於現法中任隨能否得阿羅漢皆於現法為盡諸漏當擐誓甲精進斷惑如救頭然故受戒時為於現法永盡諸漏設有覆心犯他勝法彼於現法定不能得諸漏永盡失壞受戒所有要義菩薩毀犯菩薩律儀諸根本罪猶非退失受戒要義可否還淨之理當知亦爾前引二經可為證故毘奈耶經廣釋中云為解脫故而受律儀犯他勝者解脫甚遠故雖有戒與無無異庚五捨戒因緣論曰略由二緣捨諸菩薩淨戒律儀一者棄捨無上正等菩提大願二者現行上品纏犯他勝處法若諸菩薩雖復轉身徧十方界在在生處不捨菩薩淨戒律儀由是菩薩不捨無上菩提大願亦不現行上品纏犯他勝處法若諸菩薩轉受餘生忘失本念值遇善友為欲覺悟菩薩戒念雖數重受而非新受亦不新得略由二緣捨菩薩律儀謂棄捨大菩提願及現行上品纏犯他勝處法若爾攝決擇分云何說四如云又捨因緣略有四種一者決定發受心不同分心二者於有識別人前故說棄捨語言三者總別毀犯四種他勝處法四者上品纏總別毀犯四種他勝處法當知棄捨菩薩律儀又後二緣如何分別答菩薩地中說二捨緣攝決擇分數多於彼無無所違以前為本後為釋故第一捨緣之發心者謂發小乘心此與先受戒時為利有情欲求成佛受戒之心決定不同由發相違心即捨彼願心第二捨緣者謂對知義人前說捨戒語彼解其義此與棄捨別解脫戒極不相同若不能持捨別解脫唯斷隨轉律儀之福捨戒自體不生大罪此若棄捨菩薩律儀則斷為欲利益安樂無邊有情所受律儀當墮惡趣長夜流轉以若破壞一有情樂尚感惡趣何況毀壞一切有情安樂如入行論云如是立誓已若不修彼業欺諸眾生故我當感何趣雖少下劣物若先思惠施其人後不施尚說感餓鬼況先至心與無上諸安樂誑一切有情豈能生善趣又云若他障菩薩剎那所修福即損有情利感無邊惡趣壞一有情樂尚使自衰損況壞盡虛空無邊眾生樂此等道理棄捨願心與雖未捨願心然捨荷負菩提行擔所有誓願過患相同故一切種不應捨戒初受戒時當善觀察不爾過患極重集學論引三經證成如前已說第三捨緣雖說總別毀犯四罪及第四捨緣說以上品纏總別毀犯四罪然未具足上品纏者他勝處聚所攝之罪非真他勝不成棄捨律儀之緣若犯第四捨戒之緣亦犯第三故當說以上品纏別犯一種及總犯多種為後二緣即從此文第二緣中開為二故言四種者是舉多種之一例若諸菩薩成就律儀不捨願心不捨學處亦未現行上品纏犯他勝處法雖復轉身上下同等一切生處然不棄捨菩薩律儀若經餘生忘失本念值遇善友為覺念故雖數重受然非新受諸釋論說上為天界同等為人下為惡趣或由願力或為饒益有情或由業力而生其中又最勝子及傳釋說雖受餘生亦終不造不順菩薩之業此是安住律儀之力己二惡作類分二庚初總標論曰如是菩薩安住菩薩淨戒律儀於有違犯及無違犯是染非染輭中上品應當了知其有無犯有違犯中是染非染於惡作時自當宣說輭中上者後當廣釋庚二別釋分二辛初違犯攝善法二違犯饒益有情初又分六壬初違犯布施二持戒三忍辱四精進五靜慮六般若初又分五癸初正障財施論曰若諸菩薩安住菩薩淨戒律儀於日日中若於如來或為如來造制多所若於正法或為正法造經卷所謂諸菩薩素怛纜藏摩怛理迦若於僧伽謂十方界已入大地諸菩薩眾若不以其或少或多諸供養具而為供養下至以身一拜禮敬下至以語一四句頌讚佛法僧真實功德下至以心一清淨信隨念三寶真實功德空度日夜是名有犯有所違越若不恭敬懶惰懈怠而違犯者是染違犯若誤失念而違犯者非染違犯無違犯者謂心狂亂若已證入淨意樂地常無違犯由得清淨意樂菩薩譬如已得證淨苾芻恆時法爾於佛法僧以勝供具承事供養頌曰不三供三寶受歸依者尤以發大菩提心者於日日中供事三寶不應間缺若不供事即成違犯此中分三初供事境中佛謂如來或如來塔法謂正法或法經卷此謂菩薩素怛纜藏或此本母僧謂十方已入大地諸菩薩眾言如來者謂真佛陀塔謂形像正法謂滅道證法經卷謂經論教法菩薩藏者謂大乘法釋僧義云入大地者謂聖菩薩言或如來者顯佛與塔隨一即可言或法者顯教證隨一言若於如來若於正法若於僧伽者顯於三寶隨一之境而行供養為供養中最少邊際能遮犯罪二供養事者謂於彼境所行供養大小皆可下至以身一拜禮敬下至以語一四句頌讚三寶德下至以意發一淨信隨念三寶真實功德此三句中無或字義如三境文故於三寶隨一之所當俱修三事新疏中云當隨所有花等供養下至以身一拜禮敬傳釋中云或晝或夜若不能修諸餘善行及供養等其最少者以身禮拜故供花等亦能遮犯罪三時間者謂未修行如是供養越一晝夜即能生罪故名有犯違菩薩法名有違越言若已證入淨意樂地常無違犯譬如已得淨信苾芻恆時法爾於佛法僧以勝供具承事供養者非說已得清淨意樂極歡喜地雖不供養亦無違犯是說已得入彼地者恆不棄捨供養三寶故定不犯此惡作罪藏文無若心狂亂句又此罪中若於學處以不恭敬心及不信解之懶惰樂為惡行之懈怠而違犯者名染違犯由忘念犯名非染犯新疏中云貪瞋及慢等此說名染犯懈怠忘念等除供餘非染卓瓏巴說瞋等罪重說名為染懈怠等心犯罪略輕於下劣者設以遮辭故惡作中說名非染然此中說懶惰懈怠亦名染者以違決定應行重大事故新疏說此惡作壞前所說攝善法中廣大供養癸二壞慳悋對治論曰若諸菩薩安住菩薩淨戒律儀有其大欲而無喜足於諸利養及以恭敬生著不捨是名有犯有所違越是染違犯無違犯者謂為斷彼生起樂欲發勤精進攝彼對治雖勤遮遏而為猛利性惑所蔽數起現行頌曰隨逐欲心轉謂生大欲及無喜足并貪利敬或三或四隨一而轉忍受不捨是染違犯此中無有非染違犯若為斷除彼心生起欲樂發勤精進攝彼對治雖勤遮遏而為猛利性惑所蔽數數現行無違戒罪非全無罪新疏說此壞律儀戒中少欲喜足不貪利敬癸三違犯無畏施分二子初屬於殊勝境論曰若諸菩薩安住菩薩淨戒律儀見諸耆長有德可敬同法者來憍慢所制懷嫌恨心懷恚惱心不起承迎不推勝座頌曰不敬諸耆德若諸菩薩見有同法依戒臘門較自耆長成就可信真實功德由此二緣可令恭敬與言論等不起承迎不推勝座犯惡作罪子二屬於總境論曰若有他來語言談論慶慰請問憍慢所制懷嫌恨心懷恚惱心不稱正理發言酬對是名有犯有所違越是染違犯非憍慢制無嫌恨心無恚惱心但由懶惰懈怠忘念無記之心是名有犯有所違越非染違犯無違犯者謂遭重病或心狂亂或自睡眠他生覺想而來親附語言談論慶慰請問或自為他宣說諸法論義決擇或復與餘談論慶慰或他說法論義決擇屬耳而聽或有違犯說正法者為欲將護說法者心或欲方便調彼伏彼出不善處安立善處或護僧制或為將護多有情心而不酬對皆無違犯頌曰不正答他問謂有他來令歡喜故與自語言及問病等談論慶慰請問謂問餘義若不如理發言酬對犯惡作罪言如理者有論釋謂不以求利養等酬答新疏釋謂隨順酬答此說為善於前二境未作彼事無違犯中就自身無犯者謂有二事一遭重疾病二自實睡眠他以覺悟之想來語言等雖不酬對而無違犯就時間無犯者謂有三種一自為他人宣說正法或與他人論議決擇二除彼二境正與其餘補特伽羅語言等時三聽聞餘師為己說法或正屬耳聽聞他人論議之時就所為無犯者謂有五種一由起迎等障他聞法護他不喜二恐說法師心生不喜為護其心三以不起等方便調彼出不善處安立善處四為護僧制不許禮拜及言語等五若起恭敬及語言等令多眾生於自嫌恨為護其心除彼諸緣有違犯中染違犯者謂憍慢所制及欲損彼懷嫌恨心自心憤發懷恚惱心不起迎等非染違犯謂以懶惰懈怠無記忘念之所發起新疏說此二惡作罪失壞饒益有情戒中將護他心癸四不為他作布施之緣分二子初不受他請論曰若諸菩薩安住菩薩淨戒律儀他來延請或往居家或往餘寺奉施飲食及衣服等諸資生具憍慢所制懷嫌恨心懷恚惱心不至其所不受所請是名有犯有所違越是染違犯若由懶惰懈怠忘念無記之心不至其所不受所請是名有犯有所違越非染違犯無違犯者或有疾病或無氣力或心狂亂或處懸遠或道有怖或欲方便調彼伏彼出不善處安立善處或餘先請或為無間修諸善法欲護善品令無暫廢或為引攝未曾有義或為所聞法義無退如為所聞法義無退論議決擇當知亦爾或復知彼懷損惱心詐來延請或為護他多嫌恨心或護僧制不至其所不受所請皆無違犯頌曰不受他所請謂他延請或往出家各人宅舍或往僧寺或往居家奉施飲食及衣服等若由憍慢嫌恨恚惱不受所請不往其所是染違犯若由懶惰懈怠增上不往其所非染違犯雖不往赴無違犯中就身有二一病無氣力二先受餘請就道有二一處懸遠不易往赴二道有怖謂有怨敵毒蛇損害就施主者謂懷損惱心詐來延請就所為有六一以不往赴為欲調彼如前所說二因精勤恆修善品為護其障三恐失聽聞先未聞義四如是恐失先所未聞論議決擇五為欲將護多有情心六為護僧制覆鉢羯磨等子二不受資具論曰若諸菩薩安住菩薩淨戒律儀他持種種生色可染摩尼珍珠瑠璃等寶及持種種眾多上妙財利供具殷勤奉施由嫌恨心或恚惱心違拒不受是名有犯有所違越是染違犯捨有情故若由懶惰懈怠妄念無記之心違拒不受是名有犯有所違越非染違犯無違犯者或心狂亂或觀受已心生染著或觀後時彼定追悔或復知彼於施迷亂或知施主隨捨隨受由是因緣定當貧匱或知此物是僧伽物窣堵波物或知此物劫盜他得或知此物由是因緣多生過患或殺或縛或罰或黜或嫌或責違拒不受皆無違犯頌曰拒不受金等謂他施主持來種種金銀珍珠瑠璃等寶殷勤奉施以嫌恨心及恚惱心違拒不受捨有情故是染違犯若以懶惰懈怠不受非染違犯以下諸罪無例外者言二心時應當了知即此二心雖不受取無違犯中就自者謂觀受他物已心生染著就施主有三一恐施後追悔二知彼於施迷亂三知施主惠施一切定當匱乏就物有二一知是迴施僧伽或塔二知是非理劫盜他得由此當生眾多過患或殺或縛或罰或黜或剜眼等損害最勝子說此是受者過患傳釋說是觀彼劫者生此過患拒而不受新疏說此二惡作罪失壞饒益有情戒中助他福業癸五違越法施論曰若諸菩薩安住菩薩淨戒律儀他來求法懷嫌恨心懷恚惱心嫉妬變異不施其法是名有犯有所違越是染違犯若由懶惰懈怠忘念無記之心不施其法是名有犯有所違越非染違犯無違犯者謂諸外道伺求過短或有重病或心狂亂或欲方便調彼伏彼出不善處安立善處或於是法未善通利或復見彼不生恭敬無有羞愧以惡威儀而來聽受或復知彼是鈍根性於廣法教得法究竟深生怖畏當生邪見增長邪執衰損惱壞或復知彼法至其手轉布非人而不施與皆無違犯頌曰不施於求法謂於他求法者若以二心或自性嫉妬增上力故不施法者是染違犯由餘二心非染違犯又雖不施無違犯中就自身有二一遭重疾病二不知其法就所為者謂以不施法方便調彼如前已說就所化有四一非法器謂諸外道伺求過短二心不恭敬語無誠言身惡威儀而來請受三是鈍根性根未成熟聞廣法教覺難受持深生恐怖不能信解反生邪見雖善曉喻亦不忍受增長邪執由此因緣生多非福故名衰損又由彼緣當墮惡趣故名惱壞四知法至彼手轉布其餘非器之人又初伺求過短僅是一例第二不敬等一事便足第三亦非須全具如是第二惡作是作不應作餘六惡作是應作不作又如第二惡作以時以處及惡友等增上力故犯緣現前尤應多起防護之心於一切中皆當了知新疏說此惡作失壞攝善法及饒益有情之布施壬二違犯持戒分三癸初重於違他二重於違自三自他俱違初又分二子初正明重違他二顯於性罪學習之差別初又分三丑初棄捨增上可憐愍境論曰若諸菩薩安住菩薩淨戒律儀於諸暴惡犯戒有情懷嫌恨心懷恚惱心由彼暴惡犯戒為緣方便棄捨不作饒益是名有犯有所違越是染違犯若由懶惰懈怠棄捨由忘念故不作饒益是名有犯有所違越非染違犯何以故非諸菩薩於淨持戒身語意業寂靜現行諸有情所起憐愍心欲作饒益如於暴惡犯戒有情於諸苦因而現轉者無違犯者謂心狂亂或欲方便調彼伏彼廣說如前或為將護多有情心或護僧制方便棄捨不作饒益皆無違犯頌曰棄捨犯戒者謂諸暴惡犯戒有情以彼二緣由二種心方便棄捨不作饒益是染違犯由餘二心方便棄捨由忘念故不作饒益非染違犯何以故謂諸菩薩如於暴惡犯戒住苦因者起憐愍心欲作饒益非於具戒三業寂靜現行有情言暴惡者謂造無間罪等言犯戒者謂犯根本罪傳釋說為瞋恚重者緩學處者雖輕棄捨無所犯中就所為有三一方便調彼二為護多有情心三為護僧制丑二不學共制論曰若諸菩薩安住菩薩淨戒律儀如薄伽梵於別解脫毘奈耶中將護他故建立遮罪制諸聲聞令不造作諸有情類未淨信者令生淨信已淨信者令倍增長於中菩薩與諸聲聞應等修學無有差別何以故以諸聲聞自利為勝尚不棄捨將護他行為令有情未信者信信者增長學所學處何況菩薩利他為勝頌曰不學令他信謂薄伽梵於根本別解脫經及廣釋毘奈耶中除性罪外為護他心建立遮罪制諸學處菩薩應與聲聞共學應無差別如諸聲聞所斷除者如是菩薩亦應斷除護他心者謂為令在家等先未信者發生淨信已淨信者令倍增長制不飲酒斷非時食及掘地觸火等應如聲聞於此修學若不學者非但違犯別解脫戒亦違菩薩律儀犯惡作罪其中理由謂諸聲聞自利為勝尚須修學將護他心況諸菩薩利他為勝新疏中說若於此戒不信不敬不修學者是染違犯由懶惰等不修學者非染違犯又此惡作是否在家出家一切菩薩皆犯答如新疏說是說出家菩薩然在家菩薩亦有眾多單遮同別解脫丑三學不共制論曰若諸菩薩安住菩薩淨戒律儀如薄伽梵於別解脫毘奈耶中為令聲聞少事少業少希望住建立遮罪制諸聲聞令不造作於中菩薩與諸聲聞不應等學何以故以諸聲聞自利為勝不顧利他於利他中少事少業少希望住可名為妙非諸菩薩利他為勝不顧自利於利他中少事少業少希望住得名為妙如是菩薩為利他故從非親里長者居士婆羅門等及恣施家應求百千種種衣服觀彼有情有力無力隨其所施如應而受如說求衣求鉢亦爾如求衣鉢如是自求種種絲縷令非親里為織作衣為利他故應畜種種憍世耶衣諸坐臥具事各至百生色可染百千俱胝復過是數亦應取積如是等中少事少業少希望住制止遮罪菩薩不與聲聞共學安住淨戒律儀菩薩於利他中懷嫌恨心懷恚惱心少事少業少希望住是名有犯有所違越是染違犯若由懶惰懈怠忘念無記之心少事少業少希望住是名有犯有所違越非染違犯頌曰於利他少事謂如大師為令聲聞少事少業少希望住制諸遮罪十日持衣月蓄衣等此不應與聲聞共學若共學者犯惡作罪又由二心行少事等名染違犯由餘二心非染違犯此中理由謂諸聲聞自利為勝修自調伏不顧利他故於利他少事住等可名為妙非諸菩薩利他為勝於一切種唯為利樂一切有情於利他中少事業等得名為妙其少事謂少欲少業謂不執持眾多資具少希望住是住聖種謂於少許粗惡衣食臥具便能知足樂勤修斷名四聖種如是菩薩為利他故從非親里長者居士婆羅門等應求百千種種衣服若得恣施先當觀彼有情有力無力若無力者如應而取傳釋說為觀忍不忍義謂取已施主貧不貧匱及為他人譏不譏嫌然不應理此文是顯過量而受無違犯故如說求衣求鉢亦爾又如求衣自求縷線令非親里為織作衣亦無違犯若如此文則於非親里給價令識似有違犯毘奈耶中以不給價犯此罪故又為利他應畜百千憍世耶衣諸坐臥具應畜金銀百千俱胝復過是數最勝子謂憍世耶臥具及有內絮諸坐臥具由為利他開憍世耶臥具故絲綿黑毛二分黑毛亦皆開許坐臥具者是開六年臥具捨墮於如是等少事少業少希望住所有遮罪不應與諸聲聞共學上二遮罪及下性罪是明苾芻等出家菩薩學別解脫極大教授謂別解脫性罪遮罪二類於性罪學習之規如下當說單遮又分二類一為護他心制者如新疏云菩薩尤應學護他心諸出家者決定當護自受學處此說護心過於聲聞二為少事等制者若為利他則應違越不與聲聞共學以此三種能攝一切別解脫故有未了知如是差別妄云我是菩薩或密咒師雖違越別解脫中諸共戒由上戒能淨放逸而轉若彼具有上二律儀更多違菩薩戒如此論說亦違密咒律儀犯一粗罪如云無義而故違下二律儀制犯窣吐羅罪全不防護二種律儀自許為大乘人豈有所憑故是自以惡分別水污佛聖教諸自愛者遠棄如毒舊疏云言諸苾芻從非親長者或長者婦乞求衣者犯捨墮罪當知此諸學處住二種律儀者開為利他遮為自利上開諸罪若非利他仍犯毘奈耶所說諸罪新疏說此三惡作罪如其次第壞律儀戒攝善法戒饒益有情戒子二顯於性罪學習之差別論曰若諸菩薩安住菩薩淨戒律儀善權方便為利他故於諸性罪少分現行由是因緣於菩薩戒無所違犯生多功德頌曰悲愍無不善今此本論及律儀二十頌舊疏戒品二種釋論除說開殺生等身語七支外未說為利他故若不現行犯惡作罪新疏說四十六惡作亦數此為一惡作罪又彼疏說從不學令他信戒中開出然最勝子及傳釋說此顯於諸性罪菩薩與聲聞所有差別謂於別解脫性罪若諸菩薩善權方便少分現行無所違犯生多功德此復云何謂殺生等身語七支所依身者此論於欲邪行戒說出家菩薩為護聲聞聖所教誡令不壞滅一切不應行非梵行遮出家眾立為在家之身其不與取等餘六學處總說菩薩若爾開殺生等他勝處之菩薩為出家耶抑在家耶若是出家欲邪行與殺人可不可開應無差別以此二戒俱犯他勝罪故若是居家則違此論於欲邪行分其差別於諸餘罪未分別故又集學論云若見有情增上義利應捨學處貪豈能障多劫修習大悲為性善權方便圓滿一切善根菩薩定不能障如善巧方便經說星宿婆羅門童子曾於四萬二千歲修淨梵行行七步已起大悲心念我若因犯禁戒故墮那落迦我寧忍受那落迦苦當令此女安樂存活時星宿婆羅門童子還至其所右手執女告云姊起當隨汝欲豈不相違答曰無過犯不與取他勝罪中須為自利而取菩薩開許彼時唯為利他而開故非開許不與取他勝處故出家菩薩亦不應行殺生與妄語他勝如非梵行若爾何故唯於非梵行分別在家出家差別耶答云無過以雖違犯殺生不與取妄語業道然不定犯他勝處罪若制後苾芻犯非梵行業道則亦定犯根本重罪依此密意說其差別與集學論亦不相違總修梵行即最勝之利他捨此更無增上利他設見別有增上有情義利須犯別解脫根本罪時當捨學處而作故亦是許在家菩薩非許出家若許出家無須先捨學處之義又為利他而作殺生等業之身舊譯集學論說意謂未得大地勤修六度行者非許餘人新疏說為已入大地有說若已得大地則又云修六度行其言無義故舊譯為善似為應理然如前集學論引經所說非未得地前略行六度便以為足必須多劫修道善巧方便成就大悲之菩薩眾此謂正受菩薩戒已如理修學菩薩學處具菩提心愛他過己除殺生等更無救他方便菩薩於此為利他故乃可開許非開一切大乘之人若僅能學菩薩律儀尚不開許況諸自許大乘不護律儀縱有相似悲心及菩提心定不應作譬如別解脫中若病苾芻不非時食於病有損食則有益者雖可開許然餘一切苾芻皆應守護又集學論文雖是說不淨行然殺生等餘根本罪皆應同爾又妄語等四及不與取如下所說於彼有情見有大利無餘方便可得之時如理善護菩薩律儀具足爾時所說發起當審觀察有犯無犯以此唯是諸佛境界最極微細損益重故雲海論師及最勝子并傳釋中殺生時說此是無染獲得自在清淨意樂菩薩所行非少善根智慧駑鈍貪著自利於素怛纜如言取義者之所行境唯是諸佛現量證知非餘所作作而反招非福果故一開殺生論曰謂如菩薩見劫盜賊為貪財故欲殺多生或復欲害大德聲聞獨覺菩薩或復欲造多無間業見是事已發心思惟我若斷彼惡眾生命墮那落迦如其不斷無間業成當受大苦我寧殺彼墮那落迦終不令其受無間苦如是菩薩意樂思惟於彼眾生或以善心或無記心知此事已為當來故深生慚愧以憐愍心而斷彼命由是因緣於菩薩戒無所違犯生多功德境者謂劫賊等為少財故欲害眾多聲聞獨覺菩薩作無間業意樂者見是事已發心思惟我寧殺彼墮那落迦終不令彼有情無間業成墮那落迦為當來故起憐愍心能換自他於正殺時自心或善或無記心當知全無煩惱間雜有說是彼所殺之心者非是論義言深生慚愧者謂法匱乏除彼無餘方便可得由是因緣雖斷彼命而無違犯生多功德二開不與取論曰又如菩薩見有增上增上宰官上品暴惡於諸有情無有慈愍專行逼惱菩薩見已起憐愍心發生利益安樂意樂隨力所能若廢若黜增上等位由是因緣於菩薩戒無所違犯生多功德又如菩薩見劫盜賊奪他財物若僧伽物窣堵波物取多物已執為己有縱情受用菩薩見已起憐愍心於彼有情發生利益安樂意樂隨力所能逼而奪取勿令受用如是財故當受長夜無義無利由此因緣所奪財寶若僧伽物還復僧伽窣堵波物還窣堵波若有情物還復有情又見眾主或園林主取僧伽物窣堵波物言是己有縱情受用菩薩見已思擇彼惡起憐愍心勿令因此邪受用業當受長夜無義無利隨力所能廢其所主菩薩如是雖不與取而無違犯生多功德境分三初者謂諸王臣上品暴惡於諸有情無有悲愍專行逼惱若令久住其位多生非福意樂者謂憐愍心或利益心廢奪王位第二者謂劫盜賊奪他財物若僧伽物若塔廟物取多物已執為己有縱情受用意樂者勿令受用如是財故當受長夜無義無利由是奪已還復僧伽及窣堵波第三者謂見執事人或守園人取僧伽物或塔廟物縱情受用非理耗失意樂者如上所說廢其所主菩薩如是雖不與取而無違犯生多功德三開欲邪行論曰又如菩薩處在居家見有母邑現無繫屬習婬欲法繼心菩薩求非梵行菩薩見已作意思惟勿令心恚多生非福若隨其欲便得自在方便安處令種善根亦當令其捨不善業住慈愍心行非梵行雖習如是穢染之法而無所犯生多功德出家菩薩為護聲聞聖所教誡令不壞滅一切不應行非梵行境者謂見有母邑現無繫屬繼心菩薩求非梵行假使菩薩不隨所欲當致命終諸釋論說無繫屬語顯非邪行然不應理此是開許欲邪行故集學論云或有繫屬或族姓護法護幢護皆不犯欲邪行此說於有夫無夫皆不犯欲邪行故又集學論云諸梵行者為利他故於彼應作母姊之想遠離邪行此說是在家身所行不順苾芻設見殊勝義利應捨學處故義同菩薩地新疏云淫欲行者是有罪犯無間能令墮那落迦令多所化不信聖教諸世間人多住此行由見此故大士不應習近淫欲其殺人等亦不應行意樂者謂勿令此心生嫌恨多生非福若隨其欲便得自在方便安處令種善根亦當令其捨不善業住悲愍心行非梵行無所違犯生多功德四開妄語論曰又如菩薩為多有情解脫命難囹圄縛難刖手足難劓鼻刵耳剜眼等難雖諸菩薩為自命難亦不正知說於妄語然為救脫彼有情故知而思擇故說妄語以要言之菩薩唯觀有情義利非無義利自無染心唯為饒益諸有情故覆想正知而說異語說是語時於菩薩戒無所違犯生多功德境者謂多有情具足命難刖手足難劓鼻刵耳剜眼等難意樂者謂為救脫此諸患難身者謂此菩薩若為自利雖至命難亦不正知故說妄語然為利他知而思擇故說妄語總謂唯觀有情義利非無義利自無染心純利他心覆想正知而說妄語無所違犯生多功德五開離間語論曰又如菩薩見諸有情為惡朋友之所攝受親愛不捨菩薩見已起憐愍心發生利益安樂意樂隨能隨力說離間語令離惡友捨相親愛勿令有情由近惡友當受長夜無義無利菩薩如是以饒益心說離間語乖離他愛無所違犯生多功德境者謂見有情為惡朋友之所攝受意樂者謂勿令有情由近惡友當受長夜無義無利故說離間語令離惡友如是離間無所違犯生多功德六開粗惡語論曰又如菩薩見諸有情為行越路非理而行出麤惡語猛利訶擯方便令其出不善處安立善處菩薩如是以饒益心於諸有情出麤惡語無所違犯生多功德境者謂諸有情行越正路非理而行意樂者謂由出粗惡語方便能令出不善處安立善處由是因緣出粗惡語無所違犯生多功德傳釋說行十不善或雖善知大乘道而行小乘道及知小乘而行外道名越路行雖知正理而於學處不敬緩漫名非理行七開綺語論曰又如菩薩見諸有情信樂倡妓吟詠歌諷或有信樂王賊飲食婬蕩街衢無義之論菩薩於中皆悉善巧於彼有情起憐愍心發生利益安樂意樂現前為作綺語相應種種倡妓吟詠歌諷王賊飲食婬衢等論令彼有情歡喜引攝自在隨屬方便獎導出不善處安立善處菩薩如是現行綺語無所違犯生多功德境者謂諸有情信樂歌舞伎樂王賊飲食淫蕩街衢等論身及意樂者謂於歌舞等皆得善巧以悲愍心為作種種歌舞等事令其歡喜方便引攝自在隨轉出不善處安立善處由是因緣雖說綺語無所違犯生多功德又此論與大日經除開身語七支外未開意三善現論師云若於自利無少顧戀純行利他普於一切大悲徧轉者除意惡行或除邪見餘皆開許然應觀閱決擇菩薩律儀之經論說須以教而為憑據覺賢論師云若違別解脫性罪尚無違犯能生多福況諸遮罪故見最大利有情時違諸共學遮罪亦無違犯例前可知癸二重於違自分二子初失壞淨命論曰若諸菩薩安住菩薩淨戒律儀生起詭詐虛談現相方便研求假利求利味邪命法無有羞恥堅持不捨是名有犯有所違越是染違犯無違犯者若為除遣生起樂欲發勤精進煩惱熾盛蔽抑其心時時現起頌曰忍受諸邪命謂隨生起詭詐等事五種邪命無有羞恥忍受不捨是染違犯無非染犯若為除彼生起欲樂煩惱熾盛則無違犯如隨欲心轉時所說五邪命相如寶鬘論云詭詐為利敬密護諸根門虛談為利敬現前說輭語巧求為利敬稱讚他財物研逼為利敬現前毀諮他以利求利者稱讚先所得諸釋論云起邪命心自不了知犯惡作罪與本論不符子二失壞軌則論曰若諸菩薩安住菩薩淨戒律儀為掉所動心不寂靜不樂寂靜高聲嬉戲諠譁紛聒輕躁騰躍望他歡笑如此諸緣是名有犯有所違越是染違犯若忘念起非染違犯無違犯者若為除遣生起樂欲廣說如前若欲方便解他所生嫌恨令息若欲遣他所生愁惱若他性好如上諸事方便攝受敬慎將護隨彼而轉若他有情猜阻菩薩內懷嫌恨惡謀憎背外現歡顏表內清淨如是一切皆無違犯頌曰掉舉輕躁等謂由貪分攝不寂靜為相之掉舉動心令不寂靜不樂寂靜高聲嬉戲諠譁紛聒輕躁騰躍令他歡笑是染違犯若由忘念起如上事非染違犯雖高聲等無違犯中就自身者謂為除彼生起欲樂如前應知就所為有五一以此方便除他所生嫌恨之心二為除他所生憂惱三若他性好嬉笑等事為攝受他安立善處四若為將護親友之意隨彼而轉五若他猜阻自有嫌恨惡謀憎背而自於外現歡笑顏表示內心清淨無恨子三味著三有論曰若諸菩薩安住菩薩淨戒律儀起如是見立如是論菩薩不應忻樂涅槃應於涅槃而生厭背於諸煩惱及隨煩惱不應怖畏而求斷滅不應一向心生厭離以諸菩薩三無數劫流轉生死求大菩提若作此說是名有犯有所違越是染違犯何以故如諸聲聞於其涅槃忻樂親近於諸煩惱及隨煩惱深心厭離如是菩薩於大涅槃忻樂親近於諸煩惱及隨煩惱深心厭離其倍過彼百千俱胝以諸聲聞唯為一身證得義利勤修正行菩薩普為一切有情證得義利勤修正行是故菩薩當勤修集無雜染心於有漏事隨順而行成就勝出諸阿羅漢無雜染法頌曰思一向流轉謂見多經說諸菩薩愛樂生死非樂涅槃由誤解彼經故起如是見立如是論菩薩不應忻樂涅槃應生厭背於諸煩惱及隨煩惱不應怖畏深心厭離以諸菩薩三無數劫流轉生死求大菩提是染違犯起如是見何故成犯如諸聲聞忻樂涅槃厭患煩惱如是菩薩應當過彼百千俱胝以諸聲聞唯為一身解脫生死尚應如是勤修正行何況菩薩普為一切有情解脫生死勤修正行是故菩薩應當勤修無雜染心以自未能解脫煩惱則定不能解脫他故如莊嚴經論云頂戴眾生極重擔菩薩緩行非端嚴種種繫縛縛自他應勤修行百千倍如是菩薩雖非羅漢然能成就無雜染法勝出羅漢善權方便於有漏事隨順而行傳釋云聲聞鈍根尚能了知生死過患深生厭離何況菩薩是利根性具無量慧故諸經說不應忻樂涅槃應樂生死者是遮一向背棄生死斷滅涅槃及讚不被惑業所染受生三有非不厭離諸煩惱業及煩惱業所感生死非遮忻樂滅除惑業所得涅槃覺賢論師說上三惡作如其次第失壞律儀戒中淨命具足及不掉舉常樂遠離又說沽酒及賣刀杖毒藥販賣有情壓紫草子胡麻菜子等尚為邪命惡作況耕田等癸三自他俱違分二子初不護自稱論曰若諸菩薩安住菩薩淨戒律儀於自能發不信重言所謂惡聲惡稱惡譽不護不雪其事若實而不避護是名有犯有所違越是染違犯若事不實而不清雪是名有犯有所違越非染違犯無違犯者若他外道若他憎嫉若自出家因行乞行因修善行謗聲流布若忿弊者若心倒者謗聲流布皆無違犯頌曰不避護惡稱謂能引生惡聲惡稱惡譽之事令自言不威肅不堪信重其事於己若實不護不雪是染違犯若事不實而不護雪非染違犯惡聲等三卓壠巴云約所說過輭中重品不避護者謂過將生而不預防不清雪者謂過已生而不斷除此釋與漢文稍異雖有惡聲不護不雪而無違犯中就說者有三一若他外道二若他憎嫉補特伽羅雖善開曉而不信從三若忿蔽者強欲謗說新疏中云若他外道憎嫉合前二為一外道不符本論就所說事有三一因自出家二因行乞食三因修善行謗聲流布子二不作利他猛利加行論曰若諸菩薩安住菩薩淨戒律儀見諸有情應以種種辛楚加行猛利加行而得義利護其憂惱而不現行是名有犯有所違越非染違犯無違犯者觀由此緣於現法中少得義利多生憂惱頌曰雖有惑不治見諸有情應以種種令他憂惱辛楚加行及以身語粗暴不可愛樂調伏方便猛利加行乃得義利護其憂惱而不現行彼方便者是染違犯雖不現行而無違犯謂觀由此現行令他於現法中少得義利多生憂惱諸論亦有釋為令他少得義利而自生大劬勞者新疏云言有惑者謂猛利加行非但用此亦復應以柔和加行是雖字義此釋為非但限用猛利加行即以柔和加行不治亦犯然似誤解文義此是謂他雖有惑或有大過自能治罰而不治除又新疏說上二惡作如其次第失壞攝善法中正念正知正行防守於自愆犯審諦了知知已悔除及饒益有情戒中訶責憶念壬三違犯忍辱分三癸初不住忍因論曰若諸菩薩安住菩薩淨戒律儀他罵報罵他瞋報瞋他打報打他弄報弄是名有犯有所違越是染違犯頌曰他罵報罵等捨離四沙門法是染違犯其中罵者謂發瞋詈之言等字中攝他瞋報瞋者謂以令他憤恚意樂發非愛語他打報打者謂以令他生苦意樂而行捶打他弄報弄者謂互舉過犯癸二不斷瞋心相續分二子初自不斷除論曰若諸菩薩安住菩薩淨戒律儀於他有情有所侵犯或自不為彼疑侵犯由嫌嫉心由慢所執不如理謝而生輕捨是名有犯有所違越是染違犯若由懶惰懈怠放逸不謝輕捨是名有犯有所違越非染違犯無違犯者若欲方便調彼伏彼出不善處安立善處若是外道若彼希望要因現行非法有罪方受悔謝若彼有情性好𩰖諍因悔謝時倍增憤怒若復知彼為性堪忍體無嫌恨若必了他因謝侵犯深生羞恥而不悔謝皆無違犯頌曰輕捨諸恚者若自於他有所侵犯或自未為彼疑侵犯於此二隨一若由嫉妬增上嫌恨之心或憍慢所制羞恥卑下不如理謝是染違犯若由餘二心及放逸心而不謝者非染違犯雖不悔謝無違犯中就所為者謂欲方便調伏就所謝境有五一若是外道二若他希望要因現行非法有罪方受悔謝三若他性好𩰖諍因悔謝時反增憤怒四若性堪忍隨謝不謝心無變異五若他不欲受謝或因悔謝反令羞恥此後二緣論文似一諸釋論中別釋為二此如釋說子二他不斷除論曰若諸菩薩安住菩薩淨戒律儀他所侵犯彼還如法平等悔謝懷嫌恨心欲損惱彼不受其謝是名有犯有所違越是染違犯雖復於彼無嫌恨心不欲損惱然由稟性不能堪忍故不受謝亦名有犯有所違越是染違犯無違犯者若欲方便調彼伏彼廣說一切如前應知若不如法不平等謝不受彼謝亦無違犯頌曰棄捨他諫謝因何𩰖諍他為侵犯彼還如法平等悔謝懷嫌恨心欲損惱彼不受其謝是染違犯若無瞋恚唯由稟性不能堪忍不欲受謝而不受謝非染違犯漢論為亦染違犯雖不受謝無違犯中就所為者謂欲方便調伏就境者謂不如法不平等謝初謂非應正理後謂唯以空言又律儀二十頌新舊二疏俱於後義說為非時謂侵犯無間之時而不悔謝新疏又說若是外道及性好𩰖諍者亦無違犯癸三不住對治論曰若諸菩薩安住菩薩淨戒律儀於他懷忿相續堅持生已不捨是名有犯有所違越是染違犯無違犯者為斷彼故生起樂欲廣說如前頌曰隨逐忿心轉若於他所纔發忿心相續執持不見過患不修對治生已不捨是染違犯若為斷彼生起欲樂雖勤遮遏然未能斷無所違犯如前廣說覺賢論師說此是生起忿恚執持違犯四惡作中新疏說初二如其次第失壞律儀攝善法二戒中希求利他及不忍受本隨煩惱壞攝善法戒之因緣後二違何未見明文丑四違犯精進分三癸初下劣加行論曰若諸菩薩安住菩薩淨戒律儀貪著供事增上力故以愛染心管御徒眾是名有犯有所違越是染違犯無違犯者不貪供侍無愛染心管御徒眾頌曰為供事御眾若以貪著洗浴設座不被差等所有供事及心希望供財物等愛染之心管御徒眾是染違犯以無染心管御徒眾受承事等則無違犯癸二全無加行論曰若諸菩薩安住菩薩淨戒律儀懶惰懈怠躭睡眠樂臥樂倚樂非時非量是名有犯有所違越是染違犯無違犯者若遭疾病若無氣力行路疲極若為斷彼生起樂欲廣說一切如前應知頌曰不除懈怠等謂若生起懶惰懈怠等字攝取貪睡眠樂臥樂倚樂忍受不捨晝中非時雖於夜時除中夜外初後二分亦復非量是染違犯雖復忍受無違犯中就自身有三一病無氣力二行路疲極三為欲斷彼生起欲樂廣如前說癸三貪惡劣事論曰若諸菩薩安住菩薩淨戒律儀懷愛染心談說世事虛度時日是名有犯有所違越是染違犯若由忘念虛度時日是名有犯有所違越非染違犯無違犯者見他談說護彼意故安住正念須臾而聽若事希奇或暫問他或答他問無所違犯頌曰貪說無義論若樂談說王臣盜賊婦女行欲等論以愛染心虛度時日是染違犯若忘念談非染違犯傳釋說此是從他聞虛度時日言度時者謂過上午而至下午及過下午而至初夜等或雖聽說無違犯中就聽聞者謂見他談說安住正念須臾而聽就言論者謂事希奇或暫問他或答他問最勝子等說精勤學時此亦成犯新疏中說上三惡作失壞饒益有情戒中如法御眾攝善法中精進波羅密多律儀戒中雖處雜眾而不樂為不正言論壬五違犯靜慮分三癸初加行過失論曰若諸菩薩安住菩薩淨戒律儀為令心住欲定其心心懷嫌恨憍慢所持不詣師所求請教授是名有犯有所違越是染違犯懶惰懈怠而不請者非染違犯無違犯者若遇疾病若無氣力若知其師顛倒教授若自多聞自有智力能令心定若先已得所應教授而不請者無所違犯頌曰不求三摩地欲定其心懷嫌恨心憍慢所持不詣師所求請住心教授是染違犯以餘二心非染違犯雖不請求無違犯中就自身有三一病無氣力二若知彼顛倒教授三自多聞能令心住或以教授先已成辦所教授事癸二正行過失論曰若諸菩薩安住菩薩淨戒律儀起貪欲蓋忍受不捨是名有犯有所違越是染違犯無違犯者若為斷彼生起樂欲發勤精進煩惱猛利蔽抑心故時時現行如貪欲蓋如是瞋恚昏沉睡眠掉舉惡作及與疑蓋當知亦爾頌曰不捨靜慮障能障靜慮之五蓋隨一生起忍受不捨是染違犯若為斷彼生起欲樂無犯如前五蓋如親友書云掉悔及瞋恚惛睡貪欲疑當知此五蓋是劫善財賊掉舉惡作合為一蓋惛沉睡眠合為一蓋此中分二一明所淨之蓋及能引二如何淨治之法初中貪欲者謂心愛欲色聲等五境隨逐而轉能引此者謂於境增益可愛淨相非理作意瞋恚者謂於他欲作不饒益心及損害心能引此者謂妄增益忿怒因緣非可愛樂非悅意相惛沉者謂癡分所攝內心惛昧無堪能性睡眠者謂癡分所攝心極昧略能引此二者謂心思惟黑闇之相無光明相掉舉者謂貪分所攝不寂靜相惡作者謂心生憂悔能引此二者謂因親屬國土不死尋思及隨憶念昔所經歷戲笑歡娛所行之事疑者謂於三世為有為無及於三寶業果四諦猶豫猜度能引此者謂三世法及緣彼法非理作意二如何淨治之法分二一以何對治淨治二以何威儀淨治初又分三初依對治增上淨治分五貪欲對治者謂修青瘀膿爛等不淨相二瞋恚對治者謂修仁慈三惛沉睡眠對治者謂善取日月等光明之相令心明了或隨念佛法僧戒捨天或住其餘淨信所緣策舉其心或觀四方及月星等或水洗面四掉舉惡作對治者謂心於內正住一趣修三摩地五疑對治者謂觀過去已生及未來當生等全無有我唯法因果如理作意於有謂有於無謂無遠離增益及損減執又於此一切應誦訶責五蓋及能引諸法過患讚歎離彼五蓋勝利之經論文句思惟其義其未生者制令不生生已令斷二依自增上淨治者謂五蓋生已無間當知彼蓋令心雜染令慧劣弱損害善法故不合我法深生羞慚斷除不受三依法增上淨治者謂五蓋中隨一生起或將生時念我起此當為大師及知他心諸天并諸智者之所訶責故未生者令其不生生已斷除二以何威儀對治者謂睡眠惛沉當起經行而為淨治於餘四蓋善結跏趺住念淨治又一切時應不忍受斷除此等非唯定時癸三結行過失論曰若諸菩薩安住菩薩淨戒律儀貪味靜慮於味靜慮見為功德是名有犯有所違越是染違犯無違犯者若為斷彼生起樂欲廣說如前頌曰見味靜慮德若自相續生靜慮時愛著其味於愛味喜樂等見為功德是染違犯若為斷彼生起欲樂無犯如前諸論說為於定喜足之過未見應理又定生已而能障其相續久住及勝進者有四煩惱一有愛味二慢增上三無明增上四見增上新疏中說上三惡作如其次第失壞律儀中引發勝定不應思惟諸惡尋思攝善法中不應忍受等至煩惱及攝善法中不應忍受等至味著
