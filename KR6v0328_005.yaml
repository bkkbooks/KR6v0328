body:
  text: 宗喀巴大師造釋法尊譯壬六違犯般若分二癸初對下劣境二對殊勝境初又分四子初誹謗小乘論曰若諸菩薩安住菩薩淨戒律儀起如是見立如是論菩薩不應聽聲聞乘相應法教不應受持不應修學菩薩何用於聲聞乘相應法教聽聞受持精勤修學是名有犯有所違越是染違犯何以故菩薩尚於外道書論精勤研究況於佛語無違犯者為令一向習小法者捨彼欲故作如是說頌曰毀謗聲聞乘若起如是見立如是論菩薩不應聽聲聞乘相應法教不應受持其文不應修學其義聽聞受持修學全無益故是染違犯此是妄執諸小乘人於聲聞乘須聽聞等菩薩不須非是畢竟謗聲聞乘故與謗別解脫之根本罪有大差別作如是說犯戒之理以諸菩薩於外道論尚須精勤研究況於佛語又制此戒是少知者說大乘人不須修學別解脫戒造集謗法業障從大險坑救護之最勝教授若大乘人一向愛樂聲聞乘法為遮彼欲令樂大乘則無違犯子二一向勤學聲聞乘法論曰若諸菩薩安住菩薩淨戒律儀於菩薩藏未精研究於菩薩藏一切棄捨於聲聞藏一向修學是名有犯有所違越非染違犯頌曰有自法勤彼藏文為是染違犯現有菩薩藏可勤修學而一切棄捨於聲聞藏精勤修學是染違犯須於大乘精進不廢兼學小乘法藏子三一向勤學外道書論論曰若諸菩薩安住菩薩淨戒律儀現有佛教於佛教中未精研究於異道論及諸外論精勤修學是名有犯有所違越是染違犯無違犯者若上聰敏若能速受若經久時能不忘失若於其義能思能達若於佛教如理觀察成就俱行無動覺者於日日中常以二分修學佛語一分學外則無違犯頌曰勤非勤外論現有可精研之佛教未精研究而於自教不勤研究反於不應專究之異論外論精勤修學是染違犯言外論者傳釋說為外道因明聲明等論前戒所應勤修之事謂菩薩藏此戒總說佛教就自身者謂若上聰敏若能速受若經久時能不忘失若於其義能思能達若於佛教如理觀察成就俱行無動覺者於日日中常以二分精學佛語一分學外則無違犯上聰敏者謂少許時便能記念最勝子云能思義者謂慧通利能達義者謂慧明了如理觀察者謂俱生大慧能速受者謂能速學子四於外道論愛樂修學論曰若諸菩薩安住菩薩淨戒律儀越菩薩法於異道論及諸外論研求善巧深心寶玩愛樂味著非如辛藥而習近之是名有犯有所違越是染違犯頌曰精勤復愛樂於異道論及諸外論依上戒軌研究善巧然應如辛樂雖非所愛為利他故而相習近若不如是初心寶玩次則愛樂後復味著是染違犯上四惡作新疏中說初罪失壞攝善法中遠離邪見第二第三失壞攝善法中聞思加行於第四罪未見明說癸二對殊勝境分三子初誹謗慧境論曰若諸菩薩安住菩薩淨戒律儀聞菩薩藏於甚深處最勝甚深真實法義諸佛菩薩難思神力不生信解憎背毀謗不能引義不能引法非如來說不能利益安樂有情是名有犯有所違越是染違犯如是毀謗或由自內非理作意或隨順他而作是說若諸菩薩安住菩薩淨戒律儀若聞甚深最甚深處心不信解菩薩爾時應疆信受應無諂曲應如是學我為非善盲無慧目於如來眼隨所宣說於諸如來密意語言而生誹謗菩薩如是自處無知仰推如來於諸佛法無不現知等隨觀見如是正行無所違犯雖無信解然不誹謗頌曰誹謗大乘法謗菩薩藏是染違犯由聞何事而誹謗耶謂由聽聞菩薩藏中宣說甚深真實法義或佛菩薩難思神力不生信解憎背毀謗非異生境名曰甚深非二乘境名最甚深言真實法義或難思神力者顯隨毀謗深廣一分為惡作罪誹謗有四一謗所詮下劣或非智所依曰不能引義二謗能詮下劣或非福所依曰不能引法三謗說者下劣曰非如來說四由上三緣故謗不能利樂有情誹謗之因謂由自內非理作意或隨順他而作是說從謗法罪護心方便謂聞甚深最甚深處心不信解菩薩爾時應強信解應無諂曲應如是學我今盲無無漏慧眼唯應隨順如來眼行於諸如來密意語言而生誹謗非我應為菩薩如是自處無知仰推如來於彼諸法無不現知正等觀見如是正行雖不信解然不誹謗則無違犯莊嚴經論云意過性惡故尚不瞋惡色況於猶預法故捨置無罪寶鬘論云如來諸密語非易了知故說三乘一乘當捨置自護捨置無罪惡憎唯惡無善初發業者難得一切隨順己意不能信解捨置無犯子二於果邪行論曰若諸菩薩安住菩薩淨戒律儀於他人所有染愛心有瞋恚心自讚毀他是名有犯有所違越是染違犯無違犯者若為摧伏諸惡外道若為住持如來聖教若欲方便調彼伏彼廣說如前或欲令其未淨信者發生淨信已淨信者倍復增長頌曰自讚而毀他有染愛心有瞋恚心對他人所自讚毀他是染違犯有染愛心者新疏及傳釋說為驕醉心即是慢心最勝子說為我愛執心義同憍慢故與他勝處罪有大差別又雖自讚毀他而無違犯中就所為有三一若為住持如來聖教而欲摧伏外道之時二若為方便調彼伏彼三若為令他未淨信者發生淨信已淨信者倍復增長子三失壞慧因分二丑初不往聽聞論曰若諸菩薩安住菩薩淨戒律儀聞說正法論議決擇憍慢所制懷嫌恨心懷恚惱心而不往聽是名有犯有所違越是染違犯若為懶惰懈怠所蔽而不往聽非染違犯無違犯者若不覺知若有疾病若無氣力若知倒說若為護彼說法心者若正了知彼所說義是數所聞所持所了若已多聞具足聞持其聞積集若欲無間於境住心若勤引發菩薩勝定若自了知上品愚鈍其慧鈍濁於所聞法難受難持難於所緣攝心令定不往聽者皆無違犯頌曰不往聽聞法聞他說法論議決擇由驕慢心及二種心而不往聽是染違犯由餘二心而不往聽非染違犯雖不往聽無違犯中就自身有七一若未覺知說正法等二若病無力三若知倒說四若知其法是數所聞所持所了五若自多聞具足聞持其聞積集六若為無間於境住心引發勝定七若慧遲鈍於先聞法為受為持為於所緣攝心令定多聞等三謂聞知究竟難受等三謂聞思修就所為有一謂為將護說法師心丑二於聞境邪行論曰若諸菩薩安住菩薩淨戒律儀於說法師故思輕毀不深恭敬嗤笑調弄但依於文不依於義是名有犯有所違越是染違犯頌曰毀師但依文若於說法補特伽羅故思輕毀心不至誠起大師想善知識想身不恭敬呵責嗤笑惡言調弄樂著言詞但依於文非重正理不依於義是染違犯總謂義善文不善妙亦不依止若義不善文言善妙便依而住有人釋為謗說法師唯宣其文不釋其義或不知義此全未了論之字義菩薩地說四依時義同上說故應如是最勝子及傳釋中說是不敬法罪以上三罪如其次第新疏說為失壞斷除惡見多聞加行攝善法中承事尊長但依文者義為輕毀法師但依文句辛二違犯饒益有情分二壬初對總境二對別境初又分二癸初不與義利論曰若諸菩薩安住菩薩淨戒律儀於諸有情所應作事懷嫌恨心懷恚惱心不為助伴謂於能辦所應作事或於道路若往若來或於正說事業加行或於掌護所有財寶或於和好乖離諍訟或於吉會或於福業不為助伴是名有犯有所違越是染違犯若為懶惰懈怠所蔽不為助伴非染違犯無違犯者若有疹疾若無氣力若了知彼自能成辦若知求者自有依怙若知所作能引非義能引非法若欲方便調彼伏彼廣說如前若先許餘為作助伴若轉請他有力者助若於善品正勤修習不欲暫廢若性愚鈍於所聞法難受難持如前廣說若為將護多有情意若護僧制不為助伴皆無違犯頌曰須伴不往助初從決擇所應作事乃至福業於此八事若由二心不往助伴是染違犯由餘二心非染違犯言正說者卓壠巴云未善方言者教其方言餘如前釋雖不往助無違犯中就自身有五一病無氣力二若先許餘三若轉請餘有力者助四若勤修餘殊勝善品五自性愚鈍不善教授就所作有一謂知所作能引非義能引非法不順正理就境有二一若知求者自力能辦二知有依怙就所為有三一若欲方便調彼伏彼二若為將護餘多有情嫌恨之心三若護僧制癸二不拔損害分二子初不為拔苦二不除苦因初又分二丑初不拔別苦論曰若諸菩薩安住菩薩淨戒律儀見諸有情遭重疾病懷嫌恨心懷恚惱心不往供事是名有犯有所違越是染違犯若為懶惰懈怠所蔽不往供事非染違犯無違犯者若自有病若無氣力若轉請他有力隨順令往供事若知病者有依有怙若知病者自有勢力能自供事若了知彼長病所觸堪自支持若為勤修廣大無上殊勝善品若欲護持所修善品令無間缺若自了知上品愚鈍其慧鈍濁於所聞法難受難持難於所緣攝心令定若先許餘為作供事頌曰不供事病人見遭重病若由二心不往供事作瞻侍等是染違犯由餘二心非染違犯雖不往事無違犯中就自身有四一病無氣力二轉請有力順病人意三若慧鈍濁不善說法自不善持難於所緣攝心令定四若先許餘就境有三一若知病者有依有怙二自有勢力能自供事三長病所觸堪自支持就所為有一謂為勤修廣大善品護其障難丑二不拔總苦論曰如於病者於有苦者為作助伴欲除其苦當知亦爾頌曰不救拔衆苦有犯無犯是染非染如同病者所拔之苦救拔方便俱如前說子二不除苦因論曰若諸菩薩安住菩薩淨戒律儀見諸有情為求現法後法事故廣行非理懷嫌恨心懷恚惱心不為宣說如實正理是名有犯有所違越是染違犯若由懶惰懈怠所蔽不為宣說非染違犯無違犯者若自無知若無氣力若轉請他有力者說若即彼人自有智力若彼有餘善友攝受若欲方便調彼伏彼廣說如前若知為說如實正理起嫌恨心若發惡言若顛倒受若無愛敬若復知彼性弊𢤱悷不為宣說皆無違犯頌曰不誨諸放逸若見有情為求現法及後法事廣行非理由二種心不為宣說稱彼機宜無過正理是染違犯由餘二心非染違犯雖不宣說無違犯中就自身有二一若自不知所應說法自無能力二若轉請餘有力者說就境有四一若知彼自有力能改二若有善友之所攝受三若知於自懷嫌恨心喜出粗言顛倒執受四若性𢤱悷於說正理不生愛敬就所為有一欲以不說方便調伏此戒廣說如前應知壬二對別境分二癸初不作饒益二不作降伏初又分六子初於有恩邪行論曰若諸菩薩安住菩薩淨戒律儀於先有恩諸有情所不知恩惠不了恩惠懷嫌恨心不欲現前如應酬報是名有犯有所違越是染違犯若為懶惰懈怠所蔽不現酬報非染違犯無違犯者勤加功用無力無能不獲酬報若欲方便調彼伏彼廣說如前若欲報恩而彼不受皆無違犯頌曰於恩不報恩若於有恩諸有情所不欲報恩名不知恩惠不憶其恩或不思恩名不了恩惠縱不能增當以或等或下懷嫌恨心不欲現前如應酬報是染違犯由餘二心非染違犯雖不酬報無違犯中就自身有一謂勤加功用欲報其恩無力無能不獲酬報就境有一謂彼不欲受子二於憂惱邪行論曰若諸菩薩安住菩薩淨戒律儀見諸有情墮在喪失財寶眷屬祿位難處多生愁惱懷嫌恨心不往開解是名有犯有所違越是染違犯若為懶惰懈怠所蔽不往開解非染違犯無違犯者應知如前於他事業不為助伴頌曰不解他愁惱見他喪失親屬財寶多生愁惱懷嫌恨心不往開解是染違犯由餘二心非染違犯無違犯者如於事業不為助伴憂惱差別開解方便如前廣說子三於有貧邪行論曰若諸菩薩安住菩薩淨戒律儀有飲食等資生衆具見有求者來正希求飲食等事懷嫌恨心懷恚惱心而不給施是名有犯有所違越是染違犯若由懶惰懈怠放逸不能施與非染違犯無違犯者若現無有可施財物若彼希求不如法物所不宜物若欲方便調彼伏彼廣說如前若來求者王所匪宜將護王意若護僧制而不惠施皆無違犯頌曰不施求財者見有求者如理正求飲食等事若由二心而不給施資生衆具是染違犯由餘二心及放逸心而不施與非染違犯雖不施與無違犯中就自身有一謂現無有可施財物就物有二一不如法物謂於現法後法有過二所不宜物不宜求者就所為有三一若欲以彼不施方便調彼伏彼二若施所求於王匪宜將護王意三為護僧制子四於徒衆邪行論曰若諸菩薩安住菩薩淨戒律儀攝受徒衆懷嫌恨心而不隨時無倒教授無倒教誡知衆匱乏而不為彼從諸淨信長者居士婆羅門等如法追求衣服飲食諸坐臥具病緣醫藥資身什物隨時供給是名有犯有所違越是染違犯若由懶惰懈怠放逸不往教授不往教誡不為追求如法衆具非染違犯無違犯者若欲方便調彼伏彼廣說如前若護僧制若有疹疾若無氣力不任加行若轉請餘有勢力者若知徒衆世所共知有大福德各自有力求衣服等資身衆具若隨所應教授教誡皆已無倒教授教誡若知衆內有本外道為竊法故來入衆中無所堪能不可調伏皆無違犯頌曰不利諸徒衆攝徒衆已懷嫌恨心而不時時教授教誡知衆匱乏而不為彼從諸淨信長者居士婆羅門家如法追求衣服飲食諸坐臥具病緣醫藥資身什物是染違犯由餘二心及放逸故不往教授不往教誡不為追求非染違犯雖不教等無違犯中就自身有二一若病無力不任加行二若轉請餘有勢力者就所為有二一若欲以此不教不求方便調彼二若護僧制就境有三一若知徒衆有大福德或自能求衣食等事二若已無倒教授教誡三若本外道為竊法故來入衆中不堪調伏財法攝受之軌前已廣說子五於隨順邪行論曰若諸菩薩安住菩薩淨戒律儀懷嫌恨心於他有情不隨心轉是名有犯有所違越是染違犯若由懶惰懈怠放逸不隨其轉非染違犯無違犯者若彼所愛非彼所宜若有疾病若無氣力不任加行若護僧制若彼所愛雖彼所宜而於多衆非宜非愛若為降伏諸惡外道若欲方便調彼伏彼廣說如前不隨心轉皆無違犯頌曰不隨他心轉若不隨順他心而轉是染非染如前戒說雖不隨轉無違犯中就自身有一謂病無力不任加行就所為有五一若彼所愛非彼所宜彼後自損或返害己二若彼所愛雖彼所宜而於衆多非宜非愛為護衆多不喜樂心三若護僧制四若降外道五若欲方便調彼伏彼此戒前已廣釋子六於有德邪行論曰若諸菩薩安住菩薩淨戒律儀懷嫌恨心他實有德不欲顯揚他實有譽不欲稱美他實妙說不讚善哉是名有犯有所違越是染違犯若由懶惰懈怠放逸不顯揚等非染違犯無違犯者若知其人性好少欲將護彼意若有疾病若無氣力若欲方便調彼伏彼廣說如前若護僧制若知由此顯揚等緣起彼雜染憍舉無義為遮此過若知彼德雖似功德而非實德若知彼譽雖似善譽而非實譽若知彼說雖似妙說而實非妙若為降伏諸惡外道若為待他言論究竟不顯揚等皆無違犯頌曰不讚揚功德若他實有如前所說信等功德不欲顯揚他實妙說不讚善哉由一種心及餘三心是染非染如前戒說雖不讚揚無違犯中就自身有二一病無氣力不能讚說二若為待他言論究竟就境有一謂若知彼性好少欲讚其功德反令不喜就所說有一謂彼德說相似非實就所為有四一若欲不讚方便調彼二若護僧制三若知由此引彼雜染憍舉無義為遮此過四若為降伏外道癸二不作降伏分二子初不糾行非法者論曰若諸菩薩安住菩薩淨戒律儀見諸有情應可訶責應可治罰應可驅擯懷染汙心而不訶責或雖訶責而不治罰如法教誡或雖治罰如法教誡而不驅擯是名有犯有所違越是染違犯若由懶惰懈怠放逸而不訶責乃至驅擯非染違犯無違犯者若了知彼不可療治不可與語喜出粗言多生嫌恨故應棄捨若觀待時若觀因此鬬訟諍競若觀因此令僧喧雜令僧破壞知彼有情不懷諂曲成就增上猛利慚愧疾疾還淨而不訶責乃至驅擯皆無違犯頌曰不稱緣降伏見諸有情應可訶責應可治罰應可驅擯懷嫌恨心而不訶責或雖訶責而不治罰或雖治罰而不驅擯是染違犯由餘二心及放逸故非染違犯雖不訶等無違犯中就自身有一謂觀待時就境有二一不可療治謂不可與語喜出粗言多生慊恨二知彼成就猛利慚愧疾疾還淨就所為有二一若觀因此訶責等故鬬訟諍競為遮此過二若觀令僧喧雜破壞為遮此過鬬訟等四卓壠巴說初一為總餘三為別相罵相打諍訴法庭子二不轉憎聖教者論曰若諸菩薩安住菩薩淨戒律儀具足成就種種神通變現威力於諸有情應恐怖者能恐怖之應引攝者能引攝之避信施故不現神通恐怖引攝是名有犯有所違越非染違犯無違犯者若知此中諸有情類多著僻執是惡外道誹謗賢聖成就邪見不現神通恐怖引攝無有違犯頌曰不現通怖攝成就種種神變威力應恐怖者能恐怖之應引攝者能引攝之見在聖教不持律儀難消信施若不令彼斷信施故示現神通恐怖引攝非染違犯律儀二十頌新舊二疏有本說此最後惡作是染違犯似是字誤若惡外道多著僻執誹謗神通為咒為藥不現神通亦無違犯新疏說此十二惡作失壞各各饒益有情頌曰具哀愍慈愛及善心無犯二句顯示於前所說開遮諸戒若為哀愍諸有情故及因慈愛欲利欲化諸有情故雖有現行而無違犯覺賢論師說及字攝若心極煩惱重苦受逼切睡眠及狂亂雖犯而無罪意謂此二句文攝此論說若心狂亂若重苦受之所逼切皆無違犯靜命大論師說此頌是攝下文所說貪起無犯此說為善戊二於罪護心之法論曰復次如是所起諸事菩薩學處佛於彼彼素怛纜中隨機散說謂依律儀戒攝善法戒饒益有情戒今於此菩薩藏摩怛理迦綜集而說菩薩於中應起尊重住極恭敬專精修學是諸菩薩從他正受戒律儀已由善清淨求學意樂菩提意樂饒益一切有情意樂生起最極尊重恭敬從初專精不應違犯前說如是菩薩學處皆是經中實出之事謂佛依於三聚淨戒於彼彼經隨機散說無著菩薩而今於此菩薩法藏摩怛履迦一處一貫將彼散文綜集而說由是菩薩於無臆撰諸學處中為修學故應起敬重當由三種圓滿意樂從他正受戒律儀已於諸學處最極尊敬如佛所制勤學不犯三意樂者謂善清淨求學意樂希求菩提意樂饒益有情意樂諸釋論中多說此三學三聚戒若說初是欲學學處自性通三聚戒後二為求菩提及求利他實為善說從初正受戒律儀已即應發起最極尊敬令無違犯菩薩地第十八品云若諸菩薩現前自稱我是菩薩於菩薩學不正修行當知是名相似菩薩非真菩薩若諸菩薩現前自稱我是菩薩於菩薩學能正修行當知是名真實菩薩故莫思云此諸學處能行固善即不能行亦止如是當觀此乃最要教授正受菩薩戒律儀者須行六度四攝為基更當勇進隨逐已達一切佛教深廣道理趣大轍道先覺而行不應釆視未解一切聖教宗要盲修者學戊三犯已還出之方便論曰設有違犯即應如法疾疾悔除令得還淨又此菩薩一切違犯當知皆是惡作所攝應向有力於語表義能覺能受小乘大乘補特伽羅發露悔滅若諸菩薩以上品纏違犯如上他勝處法失戒律儀應當更受若中品纏違犯如上他勝處法應對於三補特伽羅或過是數應如發露除惡作法先當稱述所犯事名應作是說長老專志或言大德我如是名違越菩薩毗奈耶法如所稱事犯惡作罪餘如苾芻發露悔滅惡作罪法應如是說若下品纏違犯如上他勝處法及餘違犯應對於一補特伽羅發露悔法當知如前若無隨順補特伽羅可對發露悔除所犯爾時菩薩以淨意樂起自誓心我當決定防護當來終不重犯如是於犯還出還淨雖初專精令無違犯設由無知放逸多惑不敬四緣違犯即當如法悔除還淨除他勝法菩薩所餘一切違越學處之罪皆惡作攝非如別解脫戒罪有多種犯此戒時應向有力於悔罪法語表文義能覺能受小乘大乘補特伽羅發露悔滅其境若無菩薩律儀唯有別解脫律儀者則須苾芻男女以沙彌等且非悔除犯別解脫所對境故若悔罪者是出家身現有出家可對悔境亦不應向在家菩薩若以上品纏犯他勝處法由此即失淨戒律儀此論中說應當更受藏文為二次重受攝決擇分說若有還得清淨受心復應還受藏師有云可受兩次不應更受有云先受一次重受兩次共許三返過此不許太無慚故此係思惟二次之義然不應理言二次者是待初受說為第二非說以後不許受故梵士教典堪為佐證皆未指定如是量故又傳釋云設由煩惱犯極重罪向僧悔己次以利益衆生意樂發菩提心由淨意樂更當重受言二次者非唯兩次是待初受說後為二設中品纏犯應對三人或過是數悔惡作罪謂住其前先述所犯罪事之名應作是說長老專志我如是名如所稱事違越菩薩毗奈耶法犯惡作罪餘如苾芻悔惡作法應如是說於惡作罪後應添所犯罪名在漢文應添於惡作罪上如云犯自讚惡作罪例如說云犯自讚或毀他所餘文者舊疏中云如是衆罪我於長老發露悔除更不覆藏發露悔除我安樂住不露不悔則不安樂問云汝於此等見罪否應答言見問云後防護否應答言如法如律善為奉持第二第三亦如是說新疏中云知見憶時如法如律善為奉持諸餘釋中問防護否惟說答曰謹善防護爾時身業以何威儀新疏中云先對諸境合掌禮拜次於下方蹲跪合掌若下品纏犯他勝處法及餘違犯對一人前發露悔滅悔法如前若無隨順可對悔除補特伽羅或無可應對悔之境當發誓心防護當來終不重犯由如是行於犯還出最勝子等謂此是顯加持無犯然非論義律儀二十頌攝此義云應更受律儀中纏對三悔餘罪於一前如染非自心其末句義謂染非染諸惡作罪若無隨順補特伽羅應令自心一向慚愧調伏寂靜後不更犯以此意樂增上而行悔除如是亦應對一人前而行悔滅靜命論師說言如自心顯餘出罪方便次引若無隨順補特伽羅等文為證許中下纏理亦如是覺賢論師云中下纏犯與餘惡作還出之法決不相同中下纏犯若於此處不能獲得一人三人當往餘求其惡作罪若於此處不能得一補特伽羅無須餘求由於自心防護即出後境不定前二境定若不爾者說三說一境別決定則不應理若少於三悔旦不淨豈有防護能淨之理菩薩地中未曾宣說如自心故作如是誦乃顛倒誦故應讀為染非於自心菩薩地於中下犯說對三對一於諸餘犯說若無隨順補特伽羅當以心防此係破斥舊疏之軌然不應理菩薩地云若下品纏違犯如上他勝處法及餘違犯應對於一補特伽羅發露悔法當知如前若無隨順補特伽羅可對發露悔除所犯爾時菩薩以淨意樂起自誓心我當決定防護當來終不重犯如是於犯還出還淨明說下品纏犯還出同餘惡作下纏既爾中品纏犯其理亦同要由意樂於犯還出非須決定依仗治罰是還出之通理故又菩薩地雖無如自心之文然說如於一前悔除能淨若無境時防護自心亦能清淨義實有故又有說云諸染惡作若有境時應對一悔諸非染罪雖現有境防心能淨不應道理菩薩地說無差別故故中下纏犯及四十五惡作若有境時唯防護心不能清淨應如論中所說而行所餘違犯若能對一補特伽羅發露悔除易生慚愧故最為善若未遇者應想諸佛菩薩對前悔除此戒品云於自愆犯審諦了知深見過患既審了知深見過已其未犯者專意護持其已犯者於佛菩薩同法者所發露悔除菩薩地第十七品云又諸菩薩過去現在一切誤失一切違犯以淨調柔愛樂隨順所學戒心想對十方佛世尊所至誠發露悔往修來亦勸導他作如是事如是數數發露所犯少用功力一切業障皆得解脫集學論說應對虛空藏前夢中悔除又說悔除菩薩輕重諸罪如塢波離問經所說新譯集學論云塢波離問經云舍利子菩薩違犯有二重罪謂瞋相應及癡相應如是又云舍利子菩薩初犯當對十衆正直悔除復有違犯當對五衆悔除重罪舍利子執母邑手及眼瞻視并損惱心諸輕違犯對一或二補特伽羅發露悔除菩薩若犯五無間罪犯母邑罪依手犯罪犯童子罪依塔犯罪及餘違犯應晝夜專誠對三十五佛悔除重罪別譯經中則云初重違犯應對十衆正直悔除此譯甚善謂如上說二重罪中初瞋相應對十境悔經又改譯云有諸重罪對五衆悔此謂第二重罪愚癡相應經文又說執母邑手所犯重罪當對五衆發露悔除此係誤譯以與集學論說此違犯對一或二補特伽羅發露悔除及經略標并說貪心所起罪輕皆不順故又舊譯集學論於執母邑手等三罪當對一或二悔說為重罪然新譯中說為輕罪似為善確又現在經中無損惱心罪定係經文譯缺以集學論皆譯有故又瞋相應說為重罪而損惱心說為輕罪亦不相違後為略起損惱意樂非憤怒心又說無間重罪當以三十五佛懺晝夜悔除者意謂唯對補特伽羅三說還出儀軌仍不能淨苦異熟果入行論云晝夜各三次讀誦三蘊經依佛菩提心息滅餘違犯此還出法謂除根本所餘之罪或除故思餘由忘念不正知等所犯重罪當誦三蘊依仗佛力及菩提心而令息滅慧生論師說三蘊為悔罪隨喜回向三十五佛懺即具彼義善天論師說餘二事為依止力即皈依及發心菩薩學處無量無邊故此還出法極為須要以除故思所造罪外諸餘違犯皆能淨故若無終不更犯防護之心雖懺先犯亦難清淨如彌勒獅子吼經云彌勒後五百世正法臨沒時頗有自稱我是菩薩出生於世彼等不護身語意業多犯衆罪多行惡業意謂悔除便得清淨而於當來不善防護為盡先造諸惡業故我曾宣說三蘊法門愚人於彼貪造衆罪既造罪已思唯悔除便得清淨不護當來因見還出方便是淨尸羅最要支分故廣解釋諸大轍軌戊四佛說貪心罪輕之密意論曰又於菩薩犯戒道中無無餘犯如世尊說是諸菩薩多分應與瞋所起犯非貪所起當知此中所說密意謂諸菩薩愛諸有情憐諸有情增上力故凡有所作一切皆是菩薩所作非非所作非作所作可得成犯若諸菩薩憎諸有情嫉諸有情不能修行自他利行作諸菩薩所不應作作不應作可得成犯佛說菩薩多分是由瞋起成犯非貪所起其密意為由愛有情及憐有情增上力故凡有所作皆是菩薩所應作事非作所作可得成犯若憎有情則不能修自他利行此非菩薩所應作事作不應作可得成犯莊嚴經論云為利諸有情生貪無違犯瞋恚於一切定違諸有情塢波離問經云若諸菩薩正入大乘犯貪相應罪盡恆河沙與犯一種瞋相應罪依菩薩增上力說瞋罪極重由此瞋罪棄捨有情前能攝受諸有情故若以煩惱能攝有情菩薩於彼不應羞怖故為汝說貪相應犯皆非有犯此事極易誤會寂天菩薩於集學論解其密意云此中密意即能攝有情為其差別義謂說貪相應皆無犯者是如星宿童子因緣利有情時所開之貪非說菩薩一切貪心即彼經前文別說攝受有情之貪故又貪不成犯意說何身集學論云又此所說是須成就增上意樂及悲愍者前經又云塢波離若諸菩薩不善方便怖畏貪欲相應違犯非瞋相應若諸菩薩善權方便怖畏瞋恚相應違犯非貪相應善權方便謂以智慧悲愍二心不捨有情此說堅固大悲為本大菩提心成就通達諸法無性勝智慧力故說貪瞋有犯不犯之差別非說無貪糅雜之慈愛以無智者疑彼與瞋犯罪相同而待決疑故亦非菩薩一切貪心皆無違犯太過失故當如集學論說見於有情有大義利由愛有情貪可無犯若謂為遮無義而瞋云何成犯答如云若暫容許滋養習氣則失悲心若斷悲愍即斷根本下當廣說設由瞋恚利彼有情然由菩薩壞悲愍心即失有情廣大義利故全無開又以菩薩為境如勝德童女由貪作喜菩薩增上力故死生天中若瞋菩薩則如頌云佛說如起惡心量住那落迦經爾劫故絶不相同如集學論解釋貪心無犯密意菩薩地意當知亦爾戊五犯罪大小之差別論曰又諸菩薩軟中上犯如攝事分應當了知如攝毗奈耶摩怛履迦說由五緣所犯成下中上品初由自性建立下品等謂他勝為上衆餘為中所餘為下復有差別謂他勝衆餘為重隕墜別悔是中惡作是輕二由毀犯者無知放逸所犯是下煩惱盛故所犯是中由輕悔故所犯是上三由意樂者謂由下中上品三毒所犯是下中上四由事故者謂雖意樂相同然由其事非一類故應知所犯成下中上如同瞋纏殺傍生趣殺非父母之人或人形或人父母如其次第犯隕墜罪犯他勝罪非無間罪犯他勝罪及無間罪五由積集故成下品等謂犯一至五不能如法速疾悔除是下品罪犯六乃至數尚可知不能如法速疾悔除是中品罪犯無量罪不可知數是上品罪此中除自性及事不可相合餘三皆等由無知故犯所犯罪謂如於犯不聞不悟無有覺慧於其所犯起無犯想而犯衆罪雖已了知犯所犯罪謂於所犯雖有覺慧而住忘念住不正知由不住念而犯衆罪煩惱盛故犯所犯罪謂由三毒性猛利故雖知此事所不應為然無自在而犯重罪由輕慢故犯所犯罪謂於所犯雖有覺慧然由信解極為下劣無有強盛宿善因行於沙門性於涅槃性無有顧戀於佛法僧無敬無憚無有羞恥不樂所學由輕慢故隨欲犯罪當知初二是不染污後二所犯是其染污如是四緣犯所犯罪其能對治謂於所犯學習善巧恆常安住正念正知勤修猛利煩惱對治有慚有愧恭敬大師尊重所學戊六安樂住緣論曰如是菩薩依止一切自毗奈耶勤學所學便得成就三種圓滿安樂而住一者成就加行圓滿二者成就意樂圓滿三者成就宿因圓滿云何名為加行圓滿謂諸菩薩於淨戒中行無缺犯於身語意清淨現行不數毀犯發露自惡如是名為加行圓滿云何名為意樂圓滿謂諸菩薩為法出家不為活命求大菩提非為不求為求沙門為求涅槃非為不求如是求者不住懈怠下劣精進不雜衆多惡不善法雜染後有有諸熾然衆苦異熟當來所有生老病死如是名為意樂圓滿云何名為宿因圓滿謂諸菩薩昔餘生中修福修善故於今世種種衣服飲食臥具病緣醫藥資身什物自無匱乏復能於他廣行惠施如是名為宿因圓滿菩薩如是依毗奈耶勤學所學成就如是三種圓滿安樂而住與此相違當知成就三種衰損危苦而住如是略廣宣說菩薩若在家品若出家品一切戒己自斯已後即於如是一切戒中分出所餘難行戒等差別之相應當了知菩薩於自毗奈耶中勤學所學便得成就三種圓滿安樂而住一加行圓滿謂初於淨戒行無缺犯於三業中清淨現行中於所學尊重恭敬安住上品不放逸行不數毀犯後設毀犯悔除自惡此由自見清淨無犯晝夜歡喜安樂而住二意樂圓滿謂以如法修行意樂而求出家非求活命意樂求大菩提非為不求為求沙門為求涅槃非為不求如是求者於諸善法發勤精進不住懈怠下劣精進不雜衆多惡不善法云何不善謂令現行多生雜染引招後有初之過患謂有熾然熱惱身心第二過患謂感惡趣衆苦異熟是故長夜引生老死言沙門者謂十地中修行三學之道言涅槃者謂無住涅槃最勝子等說彼二法皆是正修加行之果由此能令無雜染故安樂而住三宿因圓滿謂諸菩薩昔餘生中修福行施修善斷除大財位障故令衣服飲食臥具病緣醫藥資身什物自無匱乏復能施他由此永離匱乏苦故安樂而住與彼三種圓滿相違當知成就三種衰損危苦而住如是略就自性廣就一切宣說菩薩在家出家一切戒已餘難行等七即此一切戒中分出乙三釋其差別分七謂從難行乃至清淨丙初難行戒分三丁初難行論曰云何菩薩難行戒當知此戒略有三種謂諸菩薩現在具足大財大族自在增上棄捨如是大財大族自在增上受持菩薩淨戒律儀是名菩薩第一難行戒現在具足大財大族自在增上棄捨彼二正受律儀若能受用自身圓滿共同受用多諸仁慈可意親屬作受用者廣有僕使所受用事食等豐饒由此四緣名為大財或增何故受用為長壽命共為五盛言語威肅如欲而轉名大自在丁二難行論曰又諸菩薩受淨戒已若遭急難乃至失命於所受戒尚無少缺何況全犯是名菩薩第二難行戒雖遭急難乃至失命初所受戒尚無少缺況全犯戒丁三難行論曰又諸菩薩如是如是遍於一切行住作意恆住正念常無放逸乃至命終於所受戒無有誤失尚不犯輕何況犯重是名菩薩第三難行戒從受戒已乃至命存遍於一切行住作意恆住正念正知五不放逸於所受戒尚不誤失毀犯輕罪何況犯重餘論雖說初為難受中是難護後難究竟然德光論師分為難受難護二類後二難行同是難護最為善哉依諸逆緣難守護者乃至命難守護不犯依諸學處及一切時難守護者乃至命終守護不犯微細罪故如是三戒雖於現在不能實學應當發願淨修其心於餘生中能如是行丙二一切門戒論曰云何菩薩一切門戒當知此戒略有四種一者正受戒二者本性戒三者串習戒四者方便相應戒正受戒者謂諸菩薩受先所受三種菩薩淨戒律儀即律儀戒攝善法戒饒益有情戒本性戒者謂諸菩薩住種性位本性仁賢於相續中身語二業恆清淨轉串習戒者謂諸菩薩昔餘生中曾串修習如先所說三種淨戒由宿因力所住持故於現在世一切惡法不樂現行於諸惡法深心厭離樂修善行於善行中深心欣慕方便相應戒者謂諸菩薩依四攝事於諸有情身語善業恆相續轉一正受戒者謂如是加行正受三聚淨戒二本性戒者謂不待思察作行發願醒覺堪能成就六種到彼岸相住種性位於心相續本性仁賢身語二業恆清淨轉三串習戒者謂昔久遠數數串習三聚淨戒即依餘生數數修習宿因之力於諸惡行不樂現行深心厭離於諸善行愛樂欣慕四方便相應戒者謂依四攝調他方便於諸有情身語善業恆相續轉四攝者一財攝之布施二既攝受已教授取捨處之愛語三於所教義勸導修行之利行四如勸他行自亦如是安住之同事以上四戒是能趣入一切戒之門故名一切門丙三善士戒論曰云何菩薩善士戒當知此戒略有五種謂諸菩薩自具尸羅勸他受戒讚戒功德見同法者深心歡喜設有毀犯如法悔除此戒有五一自具尸羅二於處中者勸他受戒三於憎戒者讚戒功德息彼嫌恨四見他正行同法者時深心歡喜無有嫉妬五設有毀犯如法悔除此五於他能斷無義成辦義利具善士業故名善士戒由初及後引發自利由餘三戒引發利他丙四一切種戒論曰云何菩薩一切種戒當知此戒以要言之六種七種總十三種言六種者一回向戒回向大菩提故二廣博戒廣攝一切所學處故三無罪歡喜處戒遠離耽著欲樂自苦二邊行故四恆常戒雖盡壽命亦不棄捨所學處故五堅固戒一切利養恭敬他論本隨煩惱不能伏故不能奪故六尸羅莊嚴具相應戒具足一切戒莊嚴故尸羅莊嚴如聲聞地應知其相言七種者一止息戒遠離一切殺生等故二轉作戒攝一切善故饒益有情故三防護戒隨護止息轉作戒故四大士相異熟戒五增上心異熟戒六可愛趣異熟戒七利有情異熟戒六種七種總十三種於六種中一廣博戒廣攝學處故依處圓滿回向大菩提故果利圓滿二無罪戒斷除耽著欲樂邊故離染污樂三順歡喜處戒斷除自苦疲勞邊故離無義苦四恆常戒乃至盡壽修行不捨所學處故遠離學處所有留難五堅固戒由於利敬不顧視故由於自道得堅決故由能安住斷所斷故利養恭敬他論敵者本隨煩惱不能映覆不能引奪諸論雖說不捨自學受異道戒故諸他論不能映覆不捨所學前戒已說故非此義六尸羅莊嚴即聲聞地所說十七沙門莊嚴如聲聞地嗢柁南曰正信而無諂少病精進慧具少欲喜足易養及易滿杜多德端嚴知量善士法具聰慧者相忍柔和賢善六種開合與漢論不同於七種中一止息戒謂正受取遠離一向不應作事謂殺生等諸惡行故二轉作戒修學一向定應作事謂攝善法饒益有情三防護戒恆不放逸隨護止息轉作二戒四大士相異熟戒能正修行於諸地中所稱妙相五增上心異熟戒能正引生菩薩無量勝三摩地六可愛趣異熟戒能正引生人天之身七利有情異熟戒能生有情義利大果此四是由戒果分別德光論師說四中初戒是攝善法中間二戒是律儀戒後是饒益有情戒德光論師又說六種明具何德七種是明自性及果相差別丙五遂求戒論曰云何菩薩遂求戒當知此戒略有八種謂諸菩薩自諦思惟如我希求勿彼於我現行斷命不與而取穢欲邪行虛妄離間粗惡綺語手塊杖等諸非愛觸加害於我我求是已他若相違而現行者我求不遂我意不悅如我希求他亦如是勿我於彼現行斷命廣說乃至惡觸加害彼求是已我若相違而現行者彼求不遂彼意不悅我之所作若有令他所求不遂意不悅者何現行為菩薩如是審思惟已命難因緣亦不於他現行八種所求不遂不悅意事如是八種說名菩薩遂求戒此有八事自不希求斷命等八違彼八事是所希求若他為作所不希求斷命等八我求不遂我意不悅如我希求其他有情亦復如是比度自心審思惟已乃至命難亦不於他現行八種不遂求事八不求者所謂斷命不與而取穢欲邪行虛妄離間粗惡綺語手塊杖打傷害之觸後三同是非可愛觸八希求者與上相違長壽大財妻妾貞良不受欺誑眷屬不破聞和美言有義利語可愛之觸如是除遣八不遂求引發八種希求之戒名遂求戒丙六此世他世樂戒論曰云何菩薩此世他世樂戒當知此戒略有九種謂諸菩薩為諸有情於應遮處而正遮止於應開處而正開許是諸有情應攝受者正攝受之應調伏者正調伏之菩薩於中身語二業常清淨轉是則名為四種淨戒復有所餘施忍精進靜慮般若波羅蜜多俱行淨戒則為五種總說名為九種淨戒如是菩薩所有淨戒能令自他現法後法皆得安樂是故說名菩薩此世他世樂戒四種五種總有九種四種戒中一若諸有情於苦因轉應遮止處而正遮止於樂因轉應開許處而正開許令修彼因若諸有情於開遮處能正修行應可攝受而攝受之若諸有情於開遮處邪僻而行應可調服而調伏之自於此四身語二業常清淨轉五種謂除尸羅所餘五種波羅蜜多俱行淨戒此令菩薩及他有情現後安樂故名此世他世樂戒丙七清淨戒論曰云何菩薩清淨戒當知此戒略有十種一者初善受戒唯為沙門三菩提故非為命故二者不太沉戒於違犯時遠離微薄生悔愧故及不太舉戒遠離非處生悔愧故三者離懈怠戒於睡眠樂倚樂臥樂不耽著故晝夜勤修諸善品故四者離諸放逸所攝受戒修習如前所說五支不放逸故五者正願戒遠離利養恭敬貪故不願生天而自要期修梵行故六者軌則具足所攝受戒於諸威儀所作衆事善品加行妙善圓滿如法身語正現行故七者淨命具足所攝受戒離矯詐等一切邪命過失法故八者離二邊戒遠離受用欲樂自苦二邊法故九者永出離戒遠離一切外道見故十者於先所受無損失戒於先所受菩薩淨戒無缺減故無破壞故如是十種是名菩薩清淨戒十種戒中初善受戒於修道時為求沙門於究竟位為大菩提而受淨戒非為脫離王等逼迫非為活命而受尸羅不太沈戒於諸學處有違犯時離微薄悔微薄悔愧即是太沉離彼即是生大悔愧聲聞地云云何名為太極沈下謂如有一性無羞恥惡作羸劣為性慢緩於諸學處所作慢緩故無微薄悔愧當知是生極大悔愧若謂微薄悔愧全無由無悔故名不太沈是顛倒說不太舉戒違佛未制非可悔處而生追悔是名大舉故當無彼離懈怠戒於睡眠樂臥樂倚樂不生耽著遍於晝夜勤修善品雜諸放逸所攝受戒習於前說五不放逸正願戒不貪利養非願生天誓修梵行軌則具足所攝受戒於行住等諸威儀路披法衣等所作衆事習讀誦等善品加行不違世間及毗奈耶身語現行妙善圓滿淨命具足所攝受戒離詭詐等五種邪命一切過失離二邊戒從他追求或法非法衣服飲食諸臥具等愛玩受用不觀過患名欲樂邊若臥荊刺及灰坌等若三事火三入水等而自煎逼受極苦楚修自苦行皆當遠離永出離戒遠離一切外道惡見於先所受無損失戒不於一切都無羞恥不顧學處違越佛制而成缺減不犯根本而全破壞如是總標說為十種次廣釋中凡說十一最勝子云此二對治謂如所制正修學故便得清淨此說於所學處不勤修學太沈之過與於未制學處隨轉太舉之過其能對治總合為一故不太沈及不太舉合二為一德光論師云意樂之過略為二種一受時惡受二守護時太沈太舉亦將彼二總合為一漢譯亦爾傳釋則說於先所受無損失戒攝結前十此一切說皆不應理論師自於聲聞地中說十淨違品過失時云放逸懈怠所攝總彼二為一故不放逸與無懈怠二合為一是論意趣一者最初惡受二者太極沈下三者太極浮散四者放逸懈怠所攝五者發起邪願六者軌則虧損所攝七者淨命虧損所攝八者墜在二邊九者不能出離十者所受失壞由離如是十虧損緣當知說名尸羅圓滿尸羅清淨乙四尸羅勝利分二丙初究竟勝利論曰如是菩薩大尸羅藏能起當來大菩提果謂依此故菩薩淨戒波羅蜜多得圓滿已現證無上正等菩提如是菩薩大尸羅藏能生大菩提果謂依此故圓滿戒度證無上覺言大藏者謂是廣大福德資糧或戒廣博無量圓滿丙二現時勝利論曰乃至未證無上菩提依此無量菩薩戒藏正勤修習常能獲得五種勝利一者常為十方諸佛護念二者將捨命時住大歡喜三者身壞已後在在所生常與淨戒若等若增諸菩薩衆為其同分為同法侶為善知識四者成就無量大功德藏能滿淨戒波羅蜜多五者現法後法常得成就自性淨戒戒成其性未成佛時得五勝利一如上所說為佛護念二臨命終時住勝歡喜三身壞已後隨所生處常有淨戒若等若增諸菩薩衆為衆同分為同法侶為善知識四現法成就能滿戒度無量福聚五後法亦得自性淨戒戒為其性第二之義最勝子等釋為由其思惟後世能遇諸佛菩薩超離死畏得大歡喜傳釋說彼及由成就無量善根無惡趣畏共為二緣住大歡喜五利如次德光論師說為增上果離繫果異熟果士用果等流果離繫果者謂伏惡行及由正願能離憂惱又寂天菩薩意第一勝利是通二世所得勝利謂住戒時諸佛菩薩即便念其如子如弟令彼善法增長不退第二第四是現法勝利謂臨命終時不畏惡趣由見能生勝妙善趣故得歡喜及在世時剎那剎那能長無量功德資糧如入行論云何時欲度脫無邊衆生界從受彼心已睡眠或放逸然彼福德力恆常無間斷衆多等虛空第三第五是後生勝利謂善知識之所攝受及經多生不失律儀又多生不失律儀之緣如迦葉問經說不忘失菩提心之因謂斷四黑法等三摩地王經云如人數觀察由住彼分別能令心於彼如是如是住若能數數作意思惟然後內心方能流注故諸智者由見如是無上勝利當送菩薩淨戒律儀勇猛修學乙五尸羅總攝論曰如是如上所說一切自性戒等九種尸羅當知三種淨戒所攝謂律儀戒攝善法戒饒益有情戒如是一切自性戒等九種尸羅當知皆是律儀戒等三戒所攝最勝子及傳釋說九種一一皆通三種淨戒所攝乙六尸羅所作論曰如是三種菩薩淨戒以要言之能為菩薩三所作事謂律儀戒能安住其心攝善法戒能成熟自佛法饒益有情戒能成熟有情如是總攝一切菩薩所應作事所謂欲令現法樂住安住其心身心無倦成熟佛法成熟有情如是菩薩唯有爾所菩薩淨戒唯有爾所淨戒勝利唯有爾所淨戒所作除此無有若過若增過去菩薩求大菩提已於中學未來菩薩求大菩提當於中學普於十方無邊無際諸世界中現在菩薩求大菩提今於中學何故尸羅定為三聚答菩薩所作略唯有三謂於現法無染安樂安住其心由依彼故成熟佛法成熟有情此等即由律儀戒攝善法戒饒益有情戒之所成辦由是因緣若不遮止惡行勤修律儀戒令心堪能安住善緣則後二戒全無基礎故如前引攝決擇分文於律儀戒先應愛護又論說彼即是七衆別解脫戒故諸菩薩於自所受聖教根本別解脫戒當勤修學龍猛菩薩亦珍重宣說如寶鬘論云其次出家者先當敬所學別解脫調伏勤聞決擇義故二大轍於此義理同一意趣餘三戒中先當勤修能自成熟攝善法戒自未成熟能成熟他無有是處唯有爾所菩薩淨戒或九或三唯有爾所淨戒勝利謂前六種唯有爾所淨戒所作即前三種現法樂住安住其心身心無倦成熟佛法成熟有情除此性戒勝利所作三事而外更無過上及除此三更無增多此所不攝過去菩薩等如前所引三世一切菩薩皆唯學此非是一類於此中學及餘一類於餘處學故是如理修學佛道一切菩薩共行之道故於此道應離疑惑此是學習尸羅方便於餘五度及四攝等學習之法皆當了知至心修學雖說爾時若不能學所餘學處無有違犯然樂修學餘學重擔於一切種不應棄捨如是於初發業菩薩最初切要菩薩戒品若引全論照文解釋誠恐太繁故取少義依菩薩地兩部注釋及此戒品二種注釋并依其餘所注義同集學入行本釋等清淨之論及諸契經廣為決擇受護還淨關要難處傳謂雲海之釋者與造菩薩地廣釋之雲海雖係同名然非彼師隨入何大乘成佛所必須大乘道棟梁謂願行二心受已不如誓學習菩薩行非佛菩薩說更有種智道愚者見顯密開遮少有殊錯解增上慢滅大乘淨道故趣金剛道依彌勒龍猛無著釋經義發心受律儀學六度為基次加金剛道愚夫棄圓美大乘受餘道佛菩薩共道淨菩薩戒法除至教正理未染臆造垢能如佛密意以顯言訓釋由敬妙音力故我常敬禮我愚大乘深定有失文義當對聖智悔悲者糾其非佛教尤大乘道命多隱沒為令聖教住精勤所集福維願諸衆生不著相似路見真圓滿道精進勤修行願我一切生妙音尊攝受解大乘度生弘揚諸佛教民國二十四年二月十五日譯於縉雲山世界佛學苑漢藏教理院雙柏精舍
