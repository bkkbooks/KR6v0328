  - {type: xml-element, offset: 11056, content: '', id: pB08p0714a1401, name: p, role: open, attrs: {'xml:id': pB08p0714a1401, style: 'margin-left:2em'}}
  - {type: variant, offset: 11056, length: 0, content: '', 補編: 己初饒益求助伴者。分二。庚初助}
  - {type: variant, offset: 11056, length: 0, content: '', 補編: 伴事業。二助伴有苦。初助伴事業。}
  - {type: variant, offset: 11056, length: 0, content: '', 補編: 論曰。謂諸菩薩。於諸有情彼彼事業。皆為助伴。謂於思量所作事業。及於功用所作事業。悉能與彼而作助伴。或於道}
  - {type: variant, offset: 11056, length: 0, content: '', 補編: 路若往若來。或於無倒事業加行。或於守護所有財物。或於和合展轉乖離。或於義會。或於修福。皆為助伴。}
  - {type: variant, offset: 11056, length: 0, content: '', 補編: 此中分八。一。思量事業者。謂於何事若作不作。能致盛衰。而正思量。二。決擇事業者。謂從現在定作彼事。助伴此二之}
  - {type: variant, offset: 11056, length: 0, content: '', 補編: 法。謂代思量。及自荷負助伴之擔。三。於道路若往若來。諸無侶伴無隨從者。謂當助伴而為導路。四。於事邊際助加行者。}
  - {type: variant, offset: 11056, length: 0, content: '', 補編: 謂正開示善務農等無罪方便。五。護財物者。謂於己集所有財物開示方便。不為盜等之所劫取。六。合乖離者。論曰。又}
  - {type: variant, offset: 11056, length: 0, content: '', 補編: 諸菩薩由十一相。名住一切種饒益有情戒。於一一相中成就一切種。}
  - {type: variant, offset: 11056, length: 0, content: '', 補編: 由十一相名住一切種饒益有情戒。於一一相中成就一切種。此如於一應作助伴。或為助伴一切有情須助伴者。或}
  - {type: variant, offset: 11056, length: 0, content: '', 補編: 作一切助伴之相。又如報恩時說。於十一類一一有情。如其所應皆為成辦十一種事。}
