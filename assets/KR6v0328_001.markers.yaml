  - {type: variant, offset: 10598, length: 336, content: 有二五種，前五度漸次者，如其次第。五度逆品，若於身財少生懼貪尚不忍受，又於一切犯戒因緣，惑及隨惑忿恨等生，亦不忍受。又於惡害怨恨等生，亦不忍受。又生懈怠不修善行，及於睡眠，臥樂倚樂，不敬懶惰，亦不忍受。又於所起靜慮昧著，彼地煩惱，或心沈沒及掉舉等皆不忍受。總此逆品初生之時，定當依止對治滅除，決不隨彼增上而轉。慧漸次者，謂如實知善果勝利，又知善因，又於善果知倒無倒，又如實知攝善法障，斷五無知及諸障礙。其勝利者，謂人天果及三菩提。因者即十善等，增上生因決定勝因，謂依善友，聽聞正法，及思修等。若於所得善果，見為常樂我淨，是為顛倒。與此相違是名無倒。菩薩當于所得善果無顛倒見，由是因緣了知六度善果勝利，及彼善因。又能了知前說障礙六度逆品，斷除逆品攝集六度所有善根，即能速疾攝一切善，以世出世一切善法，於六度中無不攝故。又若斷除六度逆品，能速攝故，此中漸次，義為速生施等之因。, 補編: ''}
